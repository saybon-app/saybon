<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SayBon Admin Clearance</title>
  <link rel="stylesheet" href="/admin/passkey/passkey.css" />
</head>
<body>
  <main class="gate-shell">
    <section class="gate-card">
      <div class="gate-header-wrap">
        <div class="gate-header">ADMIN CLEARANCE</div>
      </div>

      <div class="shield-wrap" aria-hidden="true">
        <svg class="shield-icon" viewBox="0 0 64 64" fill="none">
          <path d="M32 6L50 13V28C50 39.5 42.7 50 32 56C21.3 50 14 39.5 14 28V13L32 6Z" stroke="currentColor" stroke-width="2.6"/>
          <rect x="25" y="28" width="14" height="11" rx="2.2" stroke="currentColor" stroke-width="2.6"/>
          <path d="M28 28V24.8C28 22.1 29.9 20 32 20C34.1 20 36 22.1 36 24.8V28" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="staff-line">
        <span></span>
        <p>AUTHORIZED STAFF ONLY</p>
        <span></span>
      </div>

      <div class="input-wrap">
        <div class="input-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="6" y="11" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M8.5 11V8.8C8.5 6.7 10.05 5 12 5C13.95 5 15.5 6.7 15.5 8.8V11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>

        <input
          id="passkeyInput"
          type="password"
          inputmode="numeric"
          autocomplete="off"
          placeholder="Enter employee passkey"
          aria-label="Enter employee passkey"
        />
      </div>

      <div class="fingerprint-wrap" aria-hidden="true">
        <svg class="fingerprint-frame" viewBox="0 0 120 120" fill="none">
          <path d="M18 42V30H30" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M102 42V30H90" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M18 78V90H30" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M102 78V90H90" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>

          <path d="M60 28C47 28 37 38 37 51C37 58 40 62 40 69C40 78 34 84 34 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M60 35C50 35 42 43 42 53C42 60 45 64 45 72C45 80 41 86 39 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M60 42C54 42 49 47 49 53C49 59 52 64 52 71C52 78 50 85 48 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M60 30C73 30 83 40 83 53C83 60 80 65 80 72C80 81 85 87 85 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M60 37C70 37 78 45 78 55C78 62 75 66 75 73C75 80 79 86 81 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M60 44C66 44 71 49 71 55C71 61 68 66 68 73C68 80 70 86 72 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M60 49C62.9 49 65 51.3 65 54.5C65 61 60 63.5 60 71.5C60 78 61 84 63 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M60 49C57.1 49 55 51.3 55 54.5C55 61 60 63.5 60 71.5C60 78 59 84 57 92" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="brand-row">
        <svg class="brand-mark" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <path d="M25.5 6L40 14.5V33.5L25.5 42L11 33.5V24" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round"/>
          <path d="M22.5 42L8 33.5V14.5L22.5 6" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round" opacity=".55"/>
          <path d="M32 18L16 30" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
        </svg>
        <div class="brand-text">SAYBON</div>
      </div>

      <a class="home-icon" href="/" aria-label="Go to homepage" title="Homepage">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 11.5L12 5L20 11.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 10.8V19H17V10.8" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </a>

      <div id="status" class="sr-only" aria-live="polite"></div>
    </section>
  </main>

  <script src="/admin/passkey/passkey.js"></script>
</body>
</html>
