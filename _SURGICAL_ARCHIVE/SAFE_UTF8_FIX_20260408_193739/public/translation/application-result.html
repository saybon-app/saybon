<!DOCTYPE html>
<html lang="en">

<head>
<script type='module' src='/js/auth-guard.js'></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Application Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
padding:40px;
color:#444;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:30px;
}

.status{
text-align:center;
font-size:22px;
margin-bottom:25px;
font-weight:600;
}

.pass{color:#16a34a}
.fail{color:#dc2626}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
margin-bottom:25px;
}

th,td{
border:1px solid #ddd;
padding:12px;
text-align:left;
font-size:14px;
}

th{
background:#f1f4ff;
}

.passkey-box{
margin-top:30px;
padding:20px;
background:#fff1f2;
border:2px solid #dc2626;
border-radius:10px;
text-align:center;
display:none;
}

.passkey-code{
display:inline-block;
margin-top:12px;
padding:14px 24px;
background:#7f1d1d;
color:white;
font-family:monospace;
font-size:20px;
letter-spacing:3px;
border-radius:6px;
cursor:pointer;
user-select:all;
}

.passkey-note{
margin-top:12px;
font-size:13px;
color:#991b1b;
font-weight:500;
}

.buttons{
margin-top:30px;
display:flex;
gap:20px;
justify-content:center;
}

.btn{
padding:12px 20px;
border-radius:8px;
border:none;
font-size:15px;
cursor:pointer;
background:#2563eb;
color:white;
}

.btn.secondary{
background:#64748b;
}

</style>


<link rel='stylesheet' href='/css/page-transition.css'>
<script type='module' src='/js/nav-engine.js'></script>
</head>

<body>

<div class="container">

<h1>Application Result</h1>

<div id="status" class="status"></div>

<table>

<tr>
<th>Evaluation Area</th>
<th>Score</th>
<th>Status</th>
</tr>

<tr>
<td>Translation Accuracy</td>
<td id="accuracy"></td>
<td id="accuracyStatus"></td>
</tr>

<tr>
<td>Terminology Consistency</td>
<td id="terminology"></td>
<td id="terminologyStatus"></td>
</tr>

<tr>
<td>Grammar & Structure</td>
<td id="grammar"></td>
<td id="grammarStatus"></td>
</tr>

<tr>
<td>Professional Tone</td>
<td id="tone"></td>
<td id="toneStatus"></td>
</tr>

<tr>
<td><strong>Total Score</strong></td>
<td id="totalScore"></td>
<td id="totalStatus"></td>
</tr>

</table>

<div class="passkey-box" id="passkeyBox">

<div><strong>Your Translator Job Key</strong></div>

<div class="passkey-code" id="passkeyCode"></div>

<div class="passkey-note">
This key gives access to SayBon translation jobs.<br>
Do <strong>NOT</strong> share it with anyone.<br>
Treat it like a secure credential.
</div>

</div>

<div class="buttons">

<button id="jobBtn" class="btn" style="display:none">
Go To Job Board
</button>

<button id="dashBtn" class="btn secondary">
Return To Dashboard
</button>

</div>

</div>

<script>

/* ==============================================
   CORRECT TRANSLATIONS (ANSWER KEY)
============================================== */

const correctAnswers = {

q1:[
"any unauthorized use of this document is strictly prohibited and may result in legal action in accordance with applicable laws",
"any unauthorized use of this document is strictly prohibited and may result in legal action under applicable law"
],

q2:[
"le syst�me chiffre automatiquement toutes les informations sensibles avant leur transmission au serveur",
"le syst�me crypte automatiquement toutes les informations sensibles avant qu'elles ne soient transmises au serveur"
]

}

/* ==============================================
   LOAD USER ANSWERS
============================================== */

const answers = JSON.parse(localStorage.getItem("translatorTestAnswers") || "{}")

function normalize(text){

return text
.toLowerCase()
.replace(/[.,]/g,"")
.trim()

}

/* ==============================================
   SCORING ENGINE
============================================== */

function scoreAnswer(user, correctList){

if(!user) return 0

user = normalize(user)

for(let correct of correctList){

if(user.includes(normalize(correct))){
return 100
}

}

return 60
}

const accuracy = scoreAnswer(answers.q1, correctAnswers.q1)
const terminology = scoreAnswer(answers.q2, correctAnswers.q2)

const grammar = Math.max(accuracy - 10,60)
const tone = Math.max(terminology - 10,60)

const total = Math.round((accuracy + terminology + grammar + tone)/4)

/* ==============================================
   DISPLAY RESULTS
============================================== */

document.getElementById("accuracy").innerText = accuracy + "%"
document.getElementById("terminology").innerText = terminology + "%"
document.getElementById("grammar").innerText = grammar + "%"
document.getElementById("tone").innerText = tone + "%"
document.getElementById("totalScore").innerText = total + "%"

function status(score){
return score >= 75 ? "Pass" : "Review"
}

document.getElementById("accuracyStatus").innerText = status(accuracy)
document.getElementById("terminologyStatus").innerText = status(terminology)
document.getElementById("grammarStatus").innerText = status(grammar)
document.getElementById("toneStatus").innerText = status(tone)

/* ==============================================
   PASS / FAIL LOGIC
============================================== */

const statusBox = document.getElementById("status")
const passkeyBox = document.getElementById("passkeyBox")
const jobBtn = document.getElementById("jobBtn")

if(total >= 75){

statusBox.innerHTML = "Status: Accepted Into Translator Pool"
statusBox.classList.add("pass")

const passkey = "SB-" + Math.random().toString(36).substring(2,10).toUpperCase()

document.getElementById("passkeyCode").innerText = passkey

passkeyBox.style.display = "block"

jobBtn.style.display = "inline-block"

}else{

statusBox.innerHTML = "Status: Application Rejected"
statusBox.classList.add("fail")

document.getElementById("totalStatus").innerText = "Below Entry Threshold"

}

/* ==============================================
   COPY PASSKEY
============================================== */

document.getElementById("passkeyCode").onclick = function(){

navigator.clipboard.writeText(this.innerText)

const original = this.innerText

this.innerText = "Copied ?"

setTimeout(()=>{
this.innerText = original
},1500)

}

/* ==============================================
   BUTTONS
============================================== */

jobBtn.onclick = ()=>{
window.location="/translation/translator-dashboard.html"
}

document.getElementById("dashBtn").onclick = ()=>{
window.location="/dashboard/index.html"
}

</script>

</body>
</html>
