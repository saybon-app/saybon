<!DOCTYPE html>
<html>

<head>
<script type='module' src='/js/auth-guard.js'></script>

<meta charset="UTF-8">
<title>SayBon Admin Access</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0c1118;
font-family:Orbitron;
color:#00ffe5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.panel{
background:#111827;
padding:40px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,255,229,0.3);
text-align:center;
}

h1{
letter-spacing:4px;
}

input{
padding:12px;
background:#020617;
border:1px solid #00ffe5;
color:white;
border-radius:6px;
font-size:16px;
}

button{
margin-top:15px;
padding:10px 18px;
background:#00ffe5;
border:none;
border-radius:6px;
cursor:pointer;
font-family:Orbitron;
}

.status{
margin-top:15px;
height:20px;
}

.granted{
color:#00ff9d;
}

.denied{
color:#ff2e63;
}

</style>


<link rel='stylesheet' href='/css/page-transition.css'>
<script type='module' src='/js/nav-engine.js'></script>
</head>

<body>

<div class="panel">

<h1>ADMIN ACCESS</h1>

<input id="code" type="password" placeholder="Enter Passcode">

<br>

<button onclick="check()">Authenticate</button>

<div id="status" class="status"></div>

</div>


<script>

function check(){

let pass=document.getElementById("code").value;

if(pass==="963281"){

document.getElementById("status").innerHTML="<span class='granted'>ACCESS GRANTED</span>";

sessionStorage.setItem("saybonAdmin","true");

setTimeout(()=>{

window.location="/translation/admin-panel.html";

},1200);

}else{

document.getElementById("status").innerHTML="<span class='denied'>ACCESS DENIED</span>";

setTimeout(()=>{

window.location="/translation/index.html";

},1200);

}

}

</script>

</body>
</html>
