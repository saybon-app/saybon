<style>

<body>

</div>

TRANSLATION DESK
</button>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session_id");
const fallbackJob = localStorage.getItem("saybon_last_job");

async function resolveJobId(){
  if(!sessionId){
    return fallbackJob;
  }

  try{
    const res = await fetch("https://saybon-server-1.onrender.com/api/session-job?session_id=" + encodeURIComponent(sessionId));
    const data = await res.json();

    if(data.jobId){
      localStorage.setItem("saybon_last_job", data.jobId);
      return data.jobId;
    }

    return fallbackJob;
  }catch(err){
    console.error("SESSION LOOKUP ERROR:", err);
    return fallbackJob;
  }
}

async function loadInvoice(){
  try{
    const jobId = await resolveJobId();

    if(!jobId){
      document.getElementById("message").innerText = "No job reference was found for this invoice.";
      return;
    }

    const doc = await db.collection("translationJobs").doc(jobId).get();

    if(!doc.exists){
      document.getElementById("message").innerText = "Invoice data could not be found.";
      return;
    }

    const data = doc.data();

    document.getElementById("job").innerText = data.jobId || "-";
    document.getElementById("email").innerText = data.email || "-";
    document.getElementById("plan").innerText = data.plan || "-";
    document.getElementById("language").innerText = data.targetLanguage || "-";

    let rate = data.plan === "express" ? 0.05 : 0.025;
    document.getElementById("rate").innerText = "$" + rate.toFixed(3);
    document.getElementById("words").innerText = data.wordCount ?? "-";
    document.getElementById("price").innerText = "$" + Number(data.price || 0).toFixed(2);
    document.getElementById("subtotal").innerText = "$" + Number(data.price || 0).toFixed(2);
    document.getElementById("total").innerText = "$" + Number(data.price || 0).toFixed(2);

    const words = Number(data.wordCount || 0);
    const isExpress = data.plan === "express";

    let timeline = "";

    if(words <= 300){
      timeline = isExpress ? "30�60 mins" : "1�3 hrs";
    }else if(words <= 1000){
      timeline = isExpress ? "1�3 hrs" : "3�6 hrs";
    }else if(words <= 3000){
      timeline = isExpress ? "3�6 hrs" : "6�12 hrs";
    }else if(words <= 6000){
      timeline = isExpress ? "6�12 hrs" : "12�24 hrs";
    }else if(words <= 10000){
      timeline = isExpress ? "12�24 hrs" : "24�48 hrs";
    }else if(words <= 20000){
      timeline = isExpress ? "24�48 hrs" : "2�4 days";
    }else{
      timeline = "Custom";
    }

    document.getElementById("timeline").innerText = timeline;

    if(data.status === "paid"){
      document.getElementById("message").innerText = "Payment confirmed. Your translation request is now in queue.";
    }else{
      document.getElementById("message").innerText = "";
    }
  }catch(err){
    console.error("INVOICE LOAD ERROR:", err);
    document.getElementById("message").innerText = "There was a problem loading your invoice.";
  }
}

function openDesk(){
  const currentJob = localStorage.getItem("saybon_last_job") || "";
  window.location = "/translation/desk.html?job=" + encodeURIComponent(currentJob);
}

function downloadInvoice(){
  html2pdf().from(document.getElementById("invoice")).save("SayBon-Invoice.pdf");
}

loadInvoice();
</script>

</body>
</html>
