<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Your French Level — SayBon</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/page-transition.css">
  <script type="module" src="/js/nav-engine.js"></script>

  <style>
    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:"Nunito",system-ui,sans-serif;
      color:#eef7ff;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 50% 40%, rgba(30,144,255,.42), transparent 24%),
        radial-gradient(circle at 50% 95%, rgba(68,221,255,.22), transparent 28%),
        linear-gradient(180deg,#080d19 0%,#0d1728 55%,#06101d 100%);
    }

    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.55) 1px, transparent 1px),
        radial-gradient(circle, rgba(91,219,255,.35) 1px, transparent 1px);
      background-size:90px 90px,140px 140px;
      opacity:.18;
      animation:drift 16s linear infinite;
    }

    @keyframes drift{
      from{transform:translateY(0)}
      to{transform:translateY(90px)}
    }

    .reveal-shell{
      width:min(92vw,820px);
      text-align:center;
      position:relative;
      animation:pageEnter 1s ease both;
    }

    @keyframes pageEnter{
      from{opacity:0; transform:translateY(22px) scale(.98)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }

    .kicker{
      font-size:13px;
      font-weight:700;
      letter-spacing:.32em;
      color:#67eaff;
      text-transform:uppercase;
      margin-bottom:18px;
      opacity:.9;
    }

    .stage{
      position:relative;
      padding:42px 32px 36px;
      border-radius:38px;
      background:rgba(7,15,28,.58);
      border:1px solid rgba(133,219,255,.18);
      box-shadow:
        0 30px 90px rgba(0,0,0,.38),
        inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter:blur(22px);
      overflow:hidden;
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:-80px;
      background:
        conic-gradient(from 180deg, transparent, rgba(96,230,255,.15), transparent, rgba(62,132,255,.13), transparent);
      animation:spin 8s linear infinite;
      opacity:.8;
    }

    .stage::after{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:37px;
      background:linear-gradient(180deg,rgba(8,16,30,.91),rgba(7,14,25,.94));
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .content{
      position:relative;
      z-index:2;
    }

    .pretitle{
      font-size:18px;
      font-weight:500;
      letter-spacing:.18em;
      color:#bfeeff;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    h1{
      margin:0 0 20px;
      font-size:clamp(34px,6vw,64px);
      font-weight:600;
      letter-spacing:.06em;
      line-height:1;
      color:#f6fbff;
      text-shadow:0 0 32px rgba(106,226,255,.36);
    }

    .level-orb{
      width:180px;
      height:180px;
      margin:10px auto 24px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:64px;
      font-weight:700;
      letter-spacing:.04em;
      color:#06111f;
      background:
        radial-gradient(circle at 35% 28%, #ffffff 0%, #aef6ff 22%, #35dfff 52%, #1587ff 100%);
      box-shadow:
        0 0 0 10px rgba(89,223,255,.08),
        0 0 48px rgba(63,225,255,.42),
        0 22px 70px rgba(0,0,0,.38);
      animation:orbReveal 1.35s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes orbReveal{
      0%{opacity:0; transform:scale(.3) rotate(-8deg)}
      60%{opacity:1; transform:scale(1.08)}
      100%{opacity:1; transform:scale(1)}
    }

    .description{
      max-width:640px;
      margin:0 auto 22px;
      font-size:19px;
      line-height:1.65;
      font-weight:500;
      color:#d8ecff;
    }

    .result-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      max-width:640px;
      margin:24px auto 28px;
    }

    .chip{
      min-height:78px;
      padding:14px;
      border-radius:22px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(154,221,255,.13);
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
    }

    .chip span{
      color:#83eaff;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:700;
    }

    .chip strong{
      font-size:18px;
      font-weight:600;
      color:#f4fbff;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    button,a{
      text-decoration:none;
      border:none;
      cursor:pointer;
      min-width:180px;
      height:54px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-family:inherit;
      font-size:15px;
      font-weight:700;
      letter-spacing:.04em;
      transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    .primary{
      color:#06111f;
      background:linear-gradient(180deg,#70f3ff,#25cfff);
      box-shadow:0 16px 38px rgba(34,213,255,.25);
    }

    .secondary{
      color:#dff7ff;
      background:rgba(255,255,255,.055);
      border:1px solid rgba(160,226,255,.14);
    }

    button:hover,a:hover{
      transform:translateY(-2px);
    }

    .fade-out{
      animation:pageExit .7s ease both;
    }

    @keyframes pageExit{
      to{opacity:0; transform:translateY(-14px) scale(.98)}
    }

    @media(max-width:700px){
      body{overflow:auto}
      .stage{padding:34px 18px 28px}
      .result-grid{grid-template-columns:1fr}
      .level-orb{width:150px;height:150px;font-size:54px}
      button,a{width:100%}
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <main class="reveal-shell" id="revealShell">
    <div class="kicker">SayBon Placement Reveal</div>

    <section class="stage">
      <div class="content">
        <div class="pretitle">Your French level is</div>

        <h1>REVEALED</h1>

        <div class="level-orb" id="levelBadge">A1</div>

        <p class="description" id="levelText"></p>

        <div class="result-grid">
          <div class="chip">
            <span>Objective</span>
            <strong id="scoreChip">0 / 12</strong>
          </div>

          <div class="chip">
            <span>Speaking</span>
            <strong id="spokenChip">0 responses</strong>
          </div>

          <div class="chip">
            <span>Writing</span>
            <strong id="writtenChip">0 responses</strong>
          </div>
        </div>

        <div class="actions">
          <button class="primary" onclick="continueJourney()">Continue</button>
          <a class="secondary" href="/placement/">Retake Test</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const score = Number(sessionStorage.getItem("placement_score")) || 0;
    const total = Number(sessionStorage.getItem("placement_total")) || 15;
    const level = sessionStorage.getItem("placement_level") || "A1";
    const spokenAnswers = JSON.parse(sessionStorage.getItem("placement_spoken_answers") || "[]");
    const writtenAnswers = JSON.parse(sessionStorage.getItem("placement_written_answers") || "[]");

    const descriptions = {
      A0: "You are at the beginning of your French journey. SayBon will help you build confidence from the very first sounds and words.",
      A1: "You can understand and use simple everyday expressions. This is the perfect stage to grow your speaking confidence.",
      A2: "You can manage familiar situations and communicate in simple ways. Your next goal is smoother expression and stronger listening.",
      B1: "You can handle everyday conversations with growing independence. Now we refine structure, fluency, and confidence.",
      B2: "You can understand more complex French and express yourself with clarity. Now we sharpen precision, elegance, and exam readiness."
    };

    document.getElementById("levelBadge").textContent = level;
    document.getElementById("levelText").textContent = descriptions[level] || descriptions.A1;
    document.getElementById("scoreChip").textContent = `${score} / 12`;
    document.getElementById("spokenChip").textContent = `${spokenAnswers.length} responses`;
    document.getElementById("writtenChip").textContent = `${writtenAnswers.length} responses`;

    function continueJourney(){
      const shell = document.getElementById("revealShell");
      shell.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = "/dashboard/";
      }, 650);
    }
  </script>
</body>
</html>
