<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your level — SayBon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="placement.css" />
  <link rel="stylesheet" href="/css/page-transition.css">
  <script type="module" src="/js/nav-engine.js"></script>
</head>

<body>

  <div class="result-shell">
    <div class="result-box">
      <h1>Your level</h1>

      <div class="result-level-badge" id="levelBadge">A1</div>

      <p class="result-main" id="levelText"></p>

      <div class="result-meta">
        <div class="result-chip" id="scoreChip">Score: 0 / 15</div>
        <div class="result-chip" id="spokenChip">Speaking responses: 0</div>
        <div class="result-chip" id="writtenChip">Writing responses: 0</div>
      </div>

      <div class="result-actions">
        <button class="pill-btn continue-btn" onclick="goDashboard()">Continue</button>
      </div>
    </div>
  </div>

  <script>
    const score = Number(sessionStorage.getItem("placement_score")) || 0;
    const total = Number(sessionStorage.getItem("placement_total")) || 15;
    const level = sessionStorage.getItem("placement_level") || "A1";
    const spokenAnswers = JSON.parse(sessionStorage.getItem("placement_spoken_answers") || "[]");
    const writtenAnswers = JSON.parse(sessionStorage.getItem("placement_written_answers") || "[]");

    const levelDescriptions = {
      A0: "You are at the very beginning stage. You can recognise a few basic French words and expressions.",
      A1: "You can understand and use familiar everyday expressions and simple phrases.",
      A2: "You can handle simple communication and understand common everyday situations.",
      B1: "You can deal with everyday conversations and express ideas with growing independence.",
      B2: "You can understand more complex French and express yourself more clearly and confidently."
    };

    document.getElementById("levelBadge").textContent = level;
    document.getElementById("levelText").textContent =
      levelDescriptions[level] || "Based on your answers, this is your current estimated level.";

    document.getElementById("scoreChip").textContent = `Objective score: ${score} / 12`;
    document.getElementById("spokenChip").textContent = `Speaking responses: ${spokenAnswers.length}`;
    document.getElementById("writtenChip").textContent = `Writing responses: ${writtenAnswers.length}`;

    function goDashboard() {
      window.location.href = "/dashboard/";
    }
  </script>

</body>
</html>
