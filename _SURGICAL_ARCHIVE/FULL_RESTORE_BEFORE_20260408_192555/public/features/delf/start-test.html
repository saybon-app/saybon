<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start DELF Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eaf4f4,#f6efe6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:white;
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);

}

h2{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:25px;
}

input,select{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-bottom:15px;
font-size:14px;

}

button{

width:100%;
padding:14px;
border-radius:30px;
border:none;
background:#3b82f6;
color:white;
font-size:15px;
cursor:pointer;

}

button:hover{
opacity:.9;
}

.codeDisplay{

text-align:center;
margin-top:20px;
font-weight:600;

}

</style>

</head>

<body>

<div class="card">

<h2>Create Candidate</h2>

<div class="subtitle">
Each learner receives a unique DELF candidate code.
</div>

<input id="name" placeholder="Candidate Name">

<select id="ageGroup">

<option value="">Select Candidate Type</option>
<option value="prim">Child (DELF Prim)</option>
<option value="junior">Teenager (DELF Junior)</option>
<option value="adult">Adult (DELF Tout Public)</option>

</select>

<button onclick="createCandidate()">Create Candidate & Start Test</button>

<div id="codeDisplay" class="codeDisplay"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function generateCode(){

const digits=Math.floor(1000+Math.random()*9000)
const letter=String.fromCharCode(65+Math.floor(Math.random()*26))

return `SB-DEL-${digits}${letter}`

}

window.createCandidate = async function(){

const name=document.getElementById("name").value
const ageGroup=document.getElementById("ageGroup").value

if(!name || !ageGroup){

alert("Please complete the form")
return

}

const code=generateCode()

await setDoc(doc(db,"candidates",code),{

name:name,
ageGroup:ageGroup,
createdAt:Date.now(),
recommendedLevel:null

})

document.getElementById("codeDisplay").innerHTML=

`Your Candidate Code: <br><b>${code}</b><br><br>
Save this code to return later.`

setTimeout(()=>{

if(ageGroup==="prim") location.href="tests/prim.html"
if(ageGroup==="junior") location.href="tests/junior.html"
if(ageGroup==="adult") location.href="tests/adult.html"

},3000)

}

</script>

</body>

</html>
