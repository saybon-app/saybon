<!DOCTYPE html>
<html lang="en">

<head>
<script type='module' src='/js/auth-guard.js'></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Admin Translation Control</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:8px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:left;
}

th{
background:#334155;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>


<link rel='stylesheet' href='/css/page-transition.css'>
<script type='module' src='/js/nav-engine.js'></script>
</head>

<body>

<h1>SayBon Translation Control Room</h1>

<table>

<thead>

<tr>
<th>Job ID</th>
<th>Email</th>
<th>Words</th>
<th>Plan</th>
<th>Status</th>
<th>Accepted</th>
<th>Submissions</th>
<th>Action</th>
</tr>

</thead>

<tbody id="jobs"></tbody>

</table>


<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

const table=document.getElementById("jobs");


/* LOAD JOBS */

async function loadJobs(){

table.innerHTML="";

let snapshot=await db.collection("translationJobs").get();

for(const doc of snapshot.docs){

let job=doc.data();

let accepts=await db
.collection("jobAcceptances")
.where("jobId","==",job.jobId)
.get();

let subs=await db
.collection("translationSubmissions")
.where("jobId","==",job.jobId)
.get();

let row=document.createElement("tr");

row.innerHTML=`

<td>${job.jobId}</td>

<td>${job.email||"-"}</td>

<td>${job.wordCount}</td>

<td>${job.plan}</td>

<td>${job.status}</td>

<td>${accepts.size}</td>

<td>${subs.size}</td>

<td>
<button onclick="openJob('${job.jobId}')">
Open
</button>
</td>

`;

table.appendChild(row);

}

}


/* OPEN JOB */

function openJob(jobId){

window.location=
"/translation/admin-job.html?job="+jobId;

}


/* INITIAL LOAD */

loadJobs();

</script>

</body>
</html>
