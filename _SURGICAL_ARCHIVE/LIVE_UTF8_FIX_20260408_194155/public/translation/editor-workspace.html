<!DOCTYPE html>
<html>

<head>
<script type='module' src='/js/auth-guard.js'></script>

<title>SayBon Editing Workspace</title>

<style>

body{
font-family:Arial;
background:#f6f8fb;
margin:0;
padding:40px;
}

.card{

max-width:1100px;
margin:auto;

background:white;

border-radius:14px;

box-shadow:0 10px 40px rgba(0,0,0,0.1);

padding:30px;

}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.segment{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:16px;

border-bottom:1px solid #eee;

}

.source{

background:#f1f4f8;

padding:12px;

border-radius:6px;

}

.edit{

width:100%;

min-height:60px;

border:1px solid #ccc;

border-radius:6px;

padding:10px;

font-size:15px;

}

.keyboard{

margin-top:20px;

font-size:18px;

}

.key{

display:inline-block;

padding:8px 12px;

background:#e9edf3;

border-radius:6px;

margin-right:6px;

cursor:pointer;

}

.progress{

margin-top:20px;

font-weight:bold;

}

.submit{

margin-top:20px;

padding:12px 30px;

font-size:16px;

background:#4a6cf7;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}

</style>


<link rel='stylesheet' href='/css/page-transition.css'>
<script type='module' src='/js/nav-engine.js'></script>
</head>

<body>

<div class="card">

<div class="title">

SAYBON EDITING WORKSPACE

</div>

<div id="segments"></div>

<div class="keyboard">

<span class="key">�</span>
<span class="key">�</span>
<span class="key">�</span>
<span class="key">�</span>
<span class="key">�</span>
<span class="key">�</span>
<span class="key">�</span>
<span class="key">�</span>
<span class="key">�</span>

</div>

<div class="progress" id="progress">
Progress: 0%
</div>

<button class="submit" onclick="submitEdit()">

Submit Editing

</button>

</div>


<script type="module">

import {segmentText} from "./segment-engine.js";

const sampleText = Bonjour tout le monde.
Nous sommes heureux de vous accueillir.
Veuillez lire les instructions attentivement.
Merci beaucoup.;


const segments = segmentText(sampleText);

const container = document.getElementById("segments");


function render(){

container.innerHTML="";

segments.forEach(seg=>{

const row = document.createElement("div");

row.className="segment";

row.innerHTML = 

<div class="source">

<b>Segment \</b><br><br>

\

</div>

<textarea class="edit"

data-id="\"

placeholder="Edit translation here">

\

</textarea>

;

container.appendChild(row);

});

}


render();


document.addEventListener("input",e=>{

if(e.target.classList.contains("edit")){

const id = e.target.dataset.id;

const seg = segments.find(s=>s.id==id);

seg.edit = e.target.value;

updateProgress();

trackStroke();

}

});


function updateProgress(){

const done = segments.filter(s=>s.edit.trim().length>0).length;

const percent = Math.round(done / segments.length * 100);

document.getElementById("progress").innerText =

"Progress: " + percent + "%";

}


async function trackStroke(){

await fetch("/api/trackStroke",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

code:"TESTJOB"

})

});

}


async function submitEdit(){

await fetch("/api/editor/submit",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

editorId:"demo",

jobCode:"TESTJOB",

text:JSON.stringify(segments)

})

});

alert("Editing submitted");

}


document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("paste",e=>e.preventDefault());
document.addEventListener("contextmenu",e=>e.preventDefault());

</script>

</body>

</html>
