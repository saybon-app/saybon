<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="/js/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upgrade — B1 — Intermediate</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      padding:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:"Nunito",sans-serif;
      color:#fff;
      text-align:center;
      background:
        radial-gradient(circle at 50% 34%, color-mix(in srgb, #3A837D 30%, transparent), transparent 22%),
        linear-gradient(145deg,#0d2f35,#071b22);
    }
    .card{
      width:min(92vw,540px);
      padding:36px 26px;
      border-radius:34px;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.20);
      box-shadow:0 28px 80px rgba(0,0,0,.28);
      backdrop-filter:blur(20px);
    }
    h1{margin:0 0 12px;font-size:34px}
    p{margin:0 auto 24px;max-width:390px;line-height:1.55;color:rgba(255,255,255,.78)}
    button,a{
      min-width:190px;
      height:50px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.20);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin:6px;
      font-family:inherit;
      font-weight:900;
      text-decoration:none;
      cursor:pointer;
    }
    button{background:linear-gradient(180deg,#ffffff,#3A837D);color:#0d2f35}
    a{background:rgba(255,255,255,.12);color:#fff}
  </style>
</head>
<body>
  <main class="card">
    <h1>Unlock Lessons 11–25</h1>
    <p>This is the upgrade placeholder for B1 — Intermediate. Payment connection will be added here.</p>

    <button onclick="demoUnlock()">Mark Upgrade Paid</button>
    <a href="/levels/B1/">Back to Hub</a>
  </main>

  <script>
    function demoUnlock(){
      localStorage.setItem("saybon_" + "B1".toLowerCase() + "_adult_upgrade_paid", "true");
      window.location.href = "/levels/B1/";
    }
  </script>
</body>
</html>
