<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="/js/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>A0 Lesson 1 — SayBon</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/page-transition.css">
  <script type="module" src="/js/nav-engine.js"></script>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      padding:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:"Nunito",system-ui,sans-serif;
      color:#fff;
      text-align:center;
      background:
        radial-gradient(circle at 50% 25%, #6F957655, transparent 24%),
        radial-gradient(circle at 18% 78%, rgba(255,255,255,.10), transparent 22%),
        linear-gradient(145deg,#0d2f35,#071b22 60%,#02080b);
    }

    .stage{
      width:min(92vw,720px);
      padding:34px;
      border-radius:44px;
      background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 34px 90px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter:blur(24px);
      animation:enter .8s ease both;
    }

    @keyframes enter{
      from{opacity:0; transform:translateY(18px) scale(.97)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }

    .icon{
      width:110px;
      height:110px;
      border-radius:34px;
      margin:0 auto 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:44px;
      color:#101820;
      background:linear-gradient(180deg,#fff,#6F9576);
      box-shadow:0 24px 60px #6F957655;
      animation:float 3.2s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    .kicker{
      font-size:12px;
      font-weight:900;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(255,255,255,.70);
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:clamp(34px,5vw,56px);
      line-height:1.05;
      font-weight:900;
      letter-spacing:-.02em;
    }

    p{
      max-width:470px;
      margin:16px auto 30px;
      font-size:16px;
      line-height:1.65;
      color:rgba(255,255,255,.78);
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    button,a{
      min-width:180px;
      height:52px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.18);
      text-decoration:none;
      font-family:inherit;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      transition:.22s ease;
    }

    button{
      background:linear-gradient(180deg,#fff,#6F9576);
      color:#101820;
    }

    a{
      background:rgba(255,255,255,.10);
      color:#fff;
    }

    button:hover,a:hover{
      transform:translateY(-3px);
      filter:brightness(1.04);
    }
  </style>
</head>

<body>
  <main class="stage">
    <div class="icon">🌱</div>
    <div class="kicker">A0 Lesson 1</div>
    <h1>First Words Studio</h1>
    <p>A calm first step into French pronunciation, greetings, and confidence.</p>

    <div class="actions">
      <button onclick="completeLesson()">Mark Lesson Complete</button>
      <a href="/levels/A0/tout-public/">Back to Hub</a>
    </div>
  </main>

  <script>
    function completeLesson(){
      localStorage.setItem("saybon_" + "A0".toLowerCase() + "_adult_lesson_1_complete", "true");
      window.location.href = "/levels/A0/tout-public/";
    }
  </script>
</body>
</html>
