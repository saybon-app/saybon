<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="/js/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlock Lessons — SayBon</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:"Nunito",sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,226,133,.35), transparent 22%),
        linear-gradient(145deg,#0e8b91,#074261);
      text-align:center;
    }
    .card{
      width:min(92vw,520px);
      padding:34px 26px;
      border-radius:34px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.24);
      box-shadow:0 28px 80px rgba(0,0,0,.25);
      backdrop-filter:blur(20px);
    }
    h1{margin:0 0 12px;font-size:34px}
    p{margin:0 auto 24px;max-width:390px;line-height:1.55;color:rgba(255,255,255,.82)}
    button,a{
      min-width:190px;
      height:50px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin:6px;
      font-family:inherit;
      font-weight:900;
      text-decoration:none;
      cursor:pointer;
    }
    button{background:#ffe982;color:#074261}
    a{background:rgba(255,255,255,.14);color:#fff}
  </style>
</head>
<body>
  <main class="card">
    <h1>Unlock the Full Kids Path</h1>
    <p>Lessons 11–25 open after a one-time upgrade. Payment connection will be added here.</p>

    <button onclick="demoUnlock()">Mark Upgrade Paid</button>
    <a href="/levels/A0/les-petits/">Back to Lessons</a>
  </main>

  <script>
    function demoUnlock(){
      localStorage.setItem("saybon_a0_littles_upgrade_paid", "true");
      window.location.href = "/levels/A0/les-petits/";
    }
  </script>
</body>
</html>
