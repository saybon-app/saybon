<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="/js/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>A0 — Absolute Beginner | SayBon</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/page-transition.css">
  <script type="module" src="/js/nav-engine.js"></script>

  <style>
    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:"Nunito",system-ui,sans-serif;
      color:#eef8ff;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:auto;
      background:
        radial-gradient(circle at 50% 42%, rgba(99,220,255,.20), transparent 26%),
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.08), transparent 18%),
        linear-gradient(145deg,#052d42 0%,#064c66 48%,#021b29 100%);
    }

    .page{
      width:min(92vw,900px);
      min-height:82vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:38px 22px;
    }

    .kicker{
      font-size:12px;
      font-weight:900;
      letter-spacing:.32em;
      text-transform:uppercase;
      color:rgba(151,232,255,.82);
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:clamp(38px,5vw,64px);
      line-height:1.04;
      font-weight:850;
      letter-spacing:-.02em;
      text-shadow:0 20px 44px rgba(0,0,0,.28);
    }

    .subtitle{
      margin:16px 0 42px;
      font-size:17px;
      font-weight:600;
      color:rgba(238,248,255,.76);
    }

    .path-grid{
      width:min(100%,720px);
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:24px;
      margin-bottom:34px;
    }

    .path-card{
      min-height:170px;
      padding:28px 24px;
      border-radius:34px;
      border:1px solid rgba(255,255,255,.17);
      background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.065));
      color:#f4fbff;
      text-decoration:none;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      box-shadow:0 22px 54px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.18);
      backdrop-filter:blur(20px);
      transition:transform .28s ease, box-shadow .28s ease, background .28s ease;
    }

    .path-card:hover{
      transform:translateY(-7px) scale(1.018);
      background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.09));
      box-shadow:0 30px 72px rgba(0,0,0,.30), 0 0 34px rgba(84,212,255,.16);
    }

    .path-icon{font-size:36px}
    .path-title{font-size:25px;font-weight:900}
    .path-note{font-size:14px;color:rgba(238,248,255,.72);line-height:1.4}

    .back-btn{
      min-width:190px;
      height:48px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:#eef8ff;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:800;
    }

    @media(max-width:720px){
      .path-grid{grid-template-columns:1fr}
      .path-card{min-height:145px}
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="kicker">Choose your learning path</div>
    <h1>A0 — Absolute Beginner</h1>
    <p class="subtitle">Start from the very beginning, the SayBon way.</p>

    <section class="path-grid">
      <a class="path-card" href="/levels/A0/les-petits/">
        <div class="path-icon">👧🏽👶🏽👦🏽</div>
        <div class="path-title">French for Littles</div>
        <div class="path-note">Playful first French for younger learners.</div>
      </a>

      <a class="path-card" href="/levels/A0/tout-public/">
        <div class="path-icon">🌍✨</div>
        <div class="path-title">French for Adults</div>
        <div class="path-note">Clear, calm French for grown learners.</div>
      </a>
    </section>

    <a class="back-btn" href="/levels/">← Back to Levels</a>
  </main>
</body>
</html>
