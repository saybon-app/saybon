<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SayBon — Easy Fun French</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/home.css" />
</head>

<body>

  <!-- AUDIO -->
  <audio id="introAudio" preload="auto">
    <source src="assets/sounds/intro-v2.mp3" type="audio/mpeg">
  </audio>

  <div class="app">

    <!-- LEFT (WHITE SIDE) -->
    <section class="white-area">

      <!-- BIG TEACHER (ONLY THING ON WHITE SIDE) -->
      <div class="teacher-wrap" id="teacher">
        <img src="assets/images/teacher.png" class="teacher-img" />
        <p class="tap-text">Tap 👆🏽</p>
      </div>

    </section>

    <!-- RIGHT (GREEN SIDE) -->
    <section class="green-area">

      <!-- 3D LOGO (BIGGER) -->
      <div class="logo-wrap">
        <img src="assets/images/logo.png" class="logo big-logo" />
      </div>

      <!-- MAIN BUTTONS -->
      <div class="button-group">
        <button id="startBtn" class="main-btn">Start</button>
        <button id="loginBtn" class="main-btn">Login</button>
      </div>

      <!-- SETTINGS ICON -->
      <button id="settingsBtn" class="settings-btn" aria-label="Settings">
        ⚙️
      </button>

    </section>

  </div>

  <!-- OVERLAY (WHAT WE OFFER) -->
  <div id="offerOverlay" class="offer-overlay hidden">
    <div class="offer-card">
      <h2 class="offer-title">What we offer</h2>
      <div class="pills">
        <div class="pill">French Lessons</div>
        <div class="pill">Talkletics</div>
        <div class="pill">DELF Prep</div>
        <div class="pill">Translation</div>
      </div>
      <button id="closeOverlay" class="close-overlay">Close</button>
    </div>
  </div>

  <script src="js/home.js"></script>

</body>
</html>
