<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon DELF Prim Placement</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

.question{
margin-bottom:30px;
}

button{
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>DELF Prim Placement</h1>

<div id="test"></div>

</div>

<script>

async function loadTest(){

const res = await fetch("/placement/delf-prim-config.json")
const data = await res.json()

const container = document.getElementById("test")

data.sections.listening.forEach(q=>{

const div=document.createElement("div")
div.className="question"

div.innerHTML=`

<audio controls src="${q.audio}"></audio>

<p>${q.question}</p>

${q.choices.map((c,i)=>
`<label>
<input type="radio" name="${q.id}" value="${i}">
${c}
</label><br>`
).join("")}

`

container.appendChild(div)

})

}

loadTest()

</script>

</body>
</html>
