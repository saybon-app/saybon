<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Your French Level — SayBon</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/page-transition.css">
  <script type="module" src="/js/nav-engine.js"></script>

  <style>
  *{box-sizing:border-box}

  html,body{
    margin:0;
    min-height:100%;
    font-family:"Nunito",system-ui,sans-serif;
    color:#f7fbfb;
  }

  body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:
      radial-gradient(circle at 50% 48%, rgba(149,194,189,.26), transparent 25%),
      radial-gradient(circle at 18% 16%, rgba(222,89,105,.13), transparent 22%),
      linear-gradient(145deg,#3A837D 0%,#1d4547 52%,#102629 100%);
  }

  .stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.10;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.50) 1px, transparent 1px),
      radial-gradient(circle, rgba(214,185,164,.42) 1px, transparent 1px);
    background-size:92px 92px,150px 150px;
    animation:drift 18s linear infinite;
  }

  @keyframes drift{
    from{transform:translateY(0)}
    to{transform:translateY(90px)}
  }

  .reveal-shell{
    width:min(88vw,700px);
    text-align:center;
    position:relative;
    animation:pageEnter .9s ease both;
  }

  @keyframes pageEnter{
    from{opacity:0; transform:translateY(18px) scale(.985)}
    to{opacity:1; transform:translateY(0) scale(1)}
  }

  .kicker{
    font-size:10px;
    font-weight:600;
    letter-spacing:.42em;
    color:#D6B9A4;
    text-transform:uppercase;
    margin-bottom:10px;
    opacity:.86;
  }

  .stage{
    position:relative;
    padding:26px 26px 24px;
    border-radius:32px;
    background:rgba(16,38,41,.62);
    border:1px solid rgba(214,185,164,.26);
    box-shadow:
      0 24px 70px rgba(0,0,0,.30),
      inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(20px);
    overflow:hidden;
  }

  .stage::before{
    content:"";
    position:absolute;
    inset:-80px;
    background:
      radial-gradient(circle at 50% 20%, rgba(221,162,128,.18), transparent 24%),
      radial-gradient(circle at 50% 70%, rgba(149,194,189,.15), transparent 34%);
    opacity:.75;
  }

  .stage::after{
    content:"";
    position:absolute;
    inset:1px;
    border-radius:31px;
    background:linear-gradient(180deg,rgba(22,50,52,.86),rgba(10,26,29,.91));
  }

  .content{
    position:relative;
    z-index:2;
  }

  .pretitle{
    font-size:12px;
    font-weight:500;
    letter-spacing:.28em;
    color:#DDA280;
    text-transform:uppercase;
    margin-bottom:5px;
  }

  h1{
    margin:0 0 14px;
    font-size:clamp(28px,4.5vw,48px);
    font-weight:500;
    letter-spacing:.13em;
    line-height:1;
    color:rgba(247,251,251,.80);
    text-shadow:none;
  }

  .level-orb{
    width:145px;
    height:145px;
    margin:6px auto 16px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:54px;
    font-weight:600;
    letter-spacing:.05em;
    color:#102629;
    background:
      radial-gradient(circle at 34% 28%, #fff7ef 0%, #D6B9A4 25%, #DDA280 55%, #DE5969 100%);
    box-shadow:
      0 0 0 8px rgba(214,185,164,.12),
      0 0 34px rgba(222,89,105,.34),
      0 18px 54px rgba(0,0,0,.30);
    animation:orbReveal 1.2s cubic-bezier(.2,.8,.2,1) both, orbPulse 2.8s ease-in-out infinite 1.2s;
  }

  @keyframes orbReveal{
    0%{opacity:0; transform:scale(.42)}
    65%{opacity:1; transform:scale(1.06)}
    100%{opacity:1; transform:scale(1)}
  }

  @keyframes orbPulse{
    0%,100%{
      transform:scale(1);
      box-shadow:
        0 0 0 8px rgba(214,185,164,.12),
        0 0 34px rgba(222,89,105,.34),
        0 18px 54px rgba(0,0,0,.30);
    }
    50%{
      transform:scale(1.045);
      box-shadow:
        0 0 0 13px rgba(214,185,164,.10),
        0 0 52px rgba(222,89,105,.46),
        0 20px 58px rgba(0,0,0,.32);
    }
  }

  .description{
    max-width:560px;
    margin:0 auto 16px;
    font-size:15px;
    line-height:1.55;
    font-weight:400;
    color:rgba(247,251,251,.78);
  }

  .result-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    max-width:560px;
    margin:18px auto 20px;
  }

  .chip{
    min-height:62px;
    padding:10px;
    border-radius:18px;
    background:rgba(149,194,189,.07);
    border:1px solid rgba(214,185,164,.18);
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:3px;
  }

  .chip span{
    color:#D6B9A4;
    font-size:10px;
    letter-spacing:.20em;
    text-transform:uppercase;
    font-weight:600;
  }

  .chip strong{
    font-size:15px;
    font-weight:500;
    color:rgba(247,251,251,.88);
  }

  .actions{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  button,a{
    text-decoration:none;
    border:none;
    cursor:pointer;
    min-width:150px;
    height:44px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:.06em;
    transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  }

  .primary{
    color:#102629;
    background:linear-gradient(180deg,#D6B9A4,#DDA280);
    box-shadow:0 12px 28px rgba(221,162,128,.22);
  }

  .secondary{
    color:rgba(247,251,251,.84);
    background:rgba(149,194,189,.08);
    border:1px solid rgba(214,185,164,.18);
  }

  button:hover,a:hover{
    transform:translateY(-2px);
  }

  .fade-out{
    animation:pageExit .7s ease both;
  }

  @keyframes pageExit{
    to{opacity:0; transform:translateY(-14px) scale(.98)}
  }

  @media(max-width:700px){
    body{
      overflow:auto;
      padding:14px;
    }

    .reveal-shell{
      width:100%;
    }

    .stage{
      padding:22px 16px 20px;
      border-radius:26px;
    }

    .stage::after{
      border-radius:25px;
    }

    .result-grid{
      grid-template-columns:1fr;
    }

    .level-orb{
      width:130px;
      height:130px;
      font-size:48px;
    }

    button,a{
      width:100%;
    }
  }
</style>
</head>

<body>
  <div class="stars"></div>

  <main class="reveal-shell" id="revealShell">
    <div class="kicker">SayBon Placement Reveal</div>

    <section class="stage">
      <div class="content">
        <div class="pretitle">Your French level is</div>

        <h1>REVEALED</h1>

        <div class="level-orb" id="levelBadge">A1</div>

        <p class="description" id="levelText"></p>

        <div class="result-grid">
          <div class="chip">
            <span>Objective</span>
            <strong id="scoreChip">0 / 12</strong>
          </div>

          <div class="chip">
            <span>Speaking</span>
            <strong id="spokenChip">0 responses</strong>
          </div>

          <div class="chip">
            <span>Writing</span>
            <strong id="writtenChip">0 responses</strong>
          </div>
        </div>

        <div class="actions">
          <button class="primary" onclick="continueJourney()">Continue</button>
          <a class="secondary" href="/placement/">Retake Test</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const score = Number(sessionStorage.getItem("placement_score")) || 0;
    const total = Number(sessionStorage.getItem("placement_total")) || 15;
    const level = sessionStorage.getItem("placement_level") || "A1";
    const spokenAnswers = JSON.parse(sessionStorage.getItem("placement_spoken_answers") || "[]");
    const writtenAnswers = JSON.parse(sessionStorage.getItem("placement_written_answers") || "[]");

    const descriptions = {
      A0: "You are at the beginning of your French journey. SayBon will help you build confidence from the very first sounds and words.",
      A1: "You can understand and use simple everyday expressions. This is the perfect stage to grow your speaking confidence.",
      A2: "You can manage familiar situations and communicate in simple ways. Your next goal is smoother expression and stronger listening.",
      B1: "You can handle everyday conversations with growing independence. Now we refine structure, fluency, and confidence.",
      B2: "You can understand more complex French and express yourself with clarity. Now we sharpen precision, elegance, and exam readiness."
    };

    document.getElementById("levelBadge").textContent = level;
    document.getElementById("levelText").textContent = descriptions[level] || descriptions.A1;
    document.getElementById("scoreChip").textContent = `${score} / 12`;
    document.getElementById("spokenChip").textContent = `${spokenAnswers.length} responses`;
    document.getElementById("writtenChip").textContent = `${writtenAnswers.length} responses`;

    function continueJourney(){
      const shell = document.getElementById("revealShell");
      shell.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = "/dashboard/";
      }, 650);
    }
  </script>
</body>
</html>
