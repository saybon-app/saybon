<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SayBon Placement Test</title>

  <link rel="stylesheet" href="placement.css" />
  <link rel="stylesheet" href="/css/page-transition.css">

  <script type="module" src="/js/nav-engine.js"></script>
  <script src="placement.js" defer></script>
</head>
<body>

  <div class="placement-shell">

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <main class="placement-card" id="app">

      <div class="question-meta">
        <span id="questionCategory" class="question-category">Understanding</span>
        <span id="questionCounter" class="question-counter">Question 1 of 15</span>
      </div>

      <div class="question-stage">
        <h2 id="questionText"></h2>

        <div id="mediaArea" class="media-area"></div>

        <div id="answers" class="answers"></div>
      </div>

    </main>

    <!-- PREMIUM INTERVENTION -->
    <section id="intervention" class="intervention hidden" aria-hidden="true">
      <div class="intervention-shell">

        <div class="intervention-teacher-wrap">
          <div class="intervention-teacher-ring"></div>
          <div class="intervention-teacher-card">
            <img
              src="/assets/images/teacher-intervention.png"
              alt="SayBon Teacher"
              class="intervention-teacher-img"
            />
          </div>
        </div>

        <div class="intervention-copy">
          <p class="intervention-kicker">A quick pause</p>
          <h2>You may have reached your current comfort zone.</h2>
          <p>
            We can keep going if you'd like, or we can reveal your current estimated level now
            and recommend the best place for you to begin.
          </p>
        </div>

        <audio id="interventionAudio" preload="auto">
          <source src="/assets/sounds/placement/intervention.mp3" type="audio/mpeg">
        </audio>

        <div class="intervention-actions">
          <button id="continueBtn" class="pill-btn continue-btn" type="button">Continue Test</button>
          <button id="revealBtn" class="pill-btn reveal-btn" type="button">Reveal My Level</button>
        </div>

      </div>
    </section>

  </div>

</body>
</html>
