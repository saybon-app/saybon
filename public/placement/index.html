<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SayBon Placement Test</title>

  <link rel="stylesheet" href="placement.css" />
  <link rel="stylesheet" href="/css/page-transition.css">

  <script type="module" src="/js/nav-engine.js"></script>
  <script src="placement.js" defer></script>
</head>

<body>

  <div class="placement-app" id="app">

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- Question -->
    <div class="question-area">

      <h2 id="questionText"></h2>

      <!-- Extra question prompt support -->
      <p id="questionPrompt" class="question-prompt"></p>

      <!-- Media -->
      <div id="mediaArea"></div>

      <!-- Legacy image/audio support -->
      <img
        id="questionImage"
        class="question-image hidden"
        alt="question image"
      />

      <button id="audioBtn" class="audio-btn hidden" type="button">
        🔊 Play audio
      </button>

      <!-- Answers -->
      <div class="answers" id="answers"></div>
      <div class="answers" id="options"></div>

    </div>

  </div>

  <!-- Intervention screen -->
  <div id="intervention" class="hidden">
    <div class="intervention-card">
      <h2>Need a little help?</h2>
      <p>You can continue the test or reveal your current estimated level now.</p>

      <audio id="interventionAudio" preload="auto">
        <source src="/assets/sounds/placement/intervention.mp3" type="audio/mpeg">
      </audio>

      <div class="intervention-actions">
        <button id="continueBtn" type="button">Continue</button>
        <button id="revealBtn" type="button">Reveal My Level</button>
      </div>
    </div>
  </div>

</body>
</html>
