<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/session.js"></script>
  <script src="/js/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financials — SayBon Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      min-height:100vh;
      font-family:'Nunito',system-ui,sans-serif;
      color:#e8f4ff;
      background:
        radial-gradient(circle at 50% 18%, rgba(0,190,255,0.14), transparent 24%),
        linear-gradient(180deg,#08121f 0%, #0c1828 52%, #0a1320 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .shell{
      width:min(880px, 100%);
      padding:26px;
      border-radius:32px;
      background:rgba(10,18,31,0.56);
      border:1px solid rgba(190,225,255,0.09);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter:blur(18px);
    }
    .kicker{
      display:inline-flex;
      min-height:36px;
      align-items:center;
      padding:0 14px;
      border-radius:999px;
      background:rgba(65,224,255,0.10);
      border:1px solid rgba(65,224,255,0.16);
      color:#78e8ff;
      font-size:12px;
      font-weight:900;
      letter-spacing:.12em;
      margin-bottom:16px;
    }
    h1{
      margin:0 0 10px;
      font-size:46px;
      line-height:1;
      letter-spacing:-0.03em;
    }
    p{
      margin:0 0 24px;
      color:#b9cadd;
      font-size:18px;
      line-height:1.65;
      max-width:660px;
    }
    .panel{
      min-height:220px;
      border-radius:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      color:#9fc4df;
      font-size:22px;
      font-weight:800;
      margin-bottom:20px;
      padding:20px;
    }
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .btn{
      text-decoration:none;
      color:#08111c;
      min-height:52px;
      padding:0 18px;
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      font-weight:900;
      background:linear-gradient(180deg,#63f1ff,#2cd7ff);
    }
    .btn.secondary{
      background:rgba(255,255,255,0.05);
      color:#e8f4ff;
      border:1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="kicker">FINANCE MODULE</div>
    <h1>Financials</h1>
    <p>This placeholder is ready for SayBon financial reporting, income tracking, expenses, and summaries.</p>

    <div class="panel">
      Placeholder page ready for the real Financials module.
    </div>

    <div class="actions">
      <a class="btn" href="/features/admin/">Back to Admin</a>
      <a class="btn secondary" href="/">Homepage</a>
    </div>
  </main>
</body>
</html>
