<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="/js/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Choose Your DELF Prep Level — SayBon</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:"Nunito",system-ui,sans-serif;
      color:#1f2933;
      background:
        radial-gradient(circle at 50% 18%, rgba(58,131,125,.12), transparent 24%),
        linear-gradient(180deg,#f8fbfb,#eef5f4);
      display:flex;
      justify-content:center;
      padding:56px 18px;
    }

    .page{
      width:min(94vw,900px);
      text-align:center;
    }

    .kicker{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:#3A837D;
      font-weight:900;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:clamp(34px,5vw,58px);
      line-height:1.03;
      letter-spacing:-.035em;
    }

    .sub{
      margin:14px auto 36px;
      max-width:620px;
      color:#65737a;
      line-height:1.6;
      font-weight:650;
    }

    .category-stack{
      display:grid;
      gap:20px;
      width:min(100%,620px);
      margin:0 auto 30px;
    }

    .category{
      min-height:145px;
      border:0;
      border-radius:28px;
      color:#fff;
      font-family:inherit;
      cursor:pointer;
      padding:24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 22px 55px rgba(0,0,0,.12);
      transition:.25s ease;
    }

    .category:hover{
      transform:translateY(-6px) scale(1.015);
      filter:brightness(1.04);
    }

    .category h2{
      margin:0;
      font-size:28px;
      font-weight:900;
    }

    .category span{
      font-size:15px;
      font-weight:800;
      opacity:.9;
    }

    .prim{background:linear-gradient(135deg,#ba5449,#df7a68)}
    .junior{background:linear-gradient(135deg,#d49a8a,#efb5aa)}
    .public{background:linear-gradient(135deg,#2f8b94,#5cc8d8)}

    .levels-panel{
      width:min(100%,760px);
      margin:34px auto 0;
      padding:28px;
      border-radius:32px;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(58,131,125,.12);
      box-shadow:0 24px 70px rgba(31,41,51,.08);
      display:none;
      animation:panelIn .45s ease both;
    }

    .levels-panel.show{display:block}

    @keyframes panelIn{
      from{opacity:0; transform:translateY(16px)}
      to{opacity:1; transform:translateY(0)}
    }

    .levels-panel h2{
      margin:0 0 8px;
      font-size:30px;
    }

    .levels-panel p{
      margin:0 0 22px;
      color:#66757b;
      font-weight:650;
    }

    .level-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:14px;
    }

    .level-card{
      min-height:110px;
      border-radius:24px;
      border:1px solid rgba(58,131,125,.12);
      background:#f8fbfb;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      text-decoration:none;
      color:#1f2933;
      transition:.22s ease;
      cursor:pointer;
    }

    .level-card:hover{
      transform:translateY(-4px);
      background:#ffffff;
      box-shadow:0 18px 36px rgba(58,131,125,.12);
    }

    .level-code{
      font-size:26px;
      font-weight:900;
      color:#3A837D;
    }

    .price{
      font-size:15px;
      font-weight:900;
      color:#ba5449;
    }

    .back{
      margin-top:28px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 24px;
      border-radius:999px;
      background:#e7efee;
      color:#263238;
      text-decoration:none;
      font-weight:900;
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="kicker">DELF Preparation</div>
    <h1>Choose Your DELF Prep Path</h1>
    <p class="sub">Select your DELF category. Then choose the level you want to prepare for.</p>

    <section class="category-stack">
      <button class="category prim" onclick="showLevels('prim')">
        <h2>DELF Prim</h2>
        <span>Ages 7–12</span>
      </button>

      <button class="category junior" onclick="showLevels('junior')">
        <h2>DELF Junior</h2>
        <span>Ages 12–17</span>
      </button>

      <button class="category public" onclick="showLevels('public')">
        <h2>DELF Tout Public</h2>
        <span>Ages 18+</span>
      </button>
    </section>

    <section id="levelsPanel" class="levels-panel">
      <h2 id="panelTitle">Choose Level</h2>
      <p id="panelSub">Select a level to continue to payment.</p>
      <div id="levelGrid" class="level-grid"></div>
    </section>

    <a class="back" href="/features/delf/">← Back to DELF</a>
  </main>

  <script>
    const DATA = {
      prim: {
        title: "DELF Prim",
        sub: "Child-friendly DELF preparation for younger learners.",
        levels: [
          { level:"A1", price:8 },
          { level:"A2", price:10 }
        ]
      },
      junior: {
        title: "DELF Junior",
        sub: "DELF preparation for teenagers.",
        levels: [
          { level:"A1", price:12 },
          { level:"A2", price:15 },
          { level:"B1", price:18 },
          { level:"B2", price:20 }
        ]
      },
      public: {
        title: "DELF Tout Public",
        sub: "DELF preparation for adults and general candidates.",
        levels: [
          { level:"A1", price:15 },
          { level:"A2", price:20 },
          { level:"B1", price:25 },
          { level:"B2", price:30 },
          { level:"C1", price:40 }
        ]
      }
    };

    function showLevels(category){
      const data = DATA[category];
      const panel = document.getElementById("levelsPanel");
      const title = document.getElementById("panelTitle");
      const sub = document.getElementById("panelSub");
      const grid = document.getElementById("levelGrid");

      title.textContent = data.title;
      sub.textContent = data.sub;
      grid.innerHTML = "";

      data.levels.forEach(item => {
        const a = document.createElement("a");
        a.className = "level-card";
        a.href = `/features/delf/payment.html?category=${encodeURIComponent(category)}&level=${encodeURIComponent(item.level)}&price=${encodeURIComponent(item.price)}`;
        a.innerHTML = `
          <div class="level-code">${item.level}</div>
          <div class="price">$${item.price}</div>
          <div>Start Preparation</div>
        `;
        grid.appendChild(a);
      });

      panel.classList.add("show");
      setTimeout(() => panel.scrollIntoView({ behavior:"smooth", block:"center" }), 80);
    }
  </script>
</body>
</html>
