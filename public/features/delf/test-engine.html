<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SayBon DELF Test Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bgA:#eef4fb;
  --bgB:#dfe9f7;
  --card:#ffffff;
  --line:#dbe6f3;
  --text:#1f2f44;
  --muted:#6c7b90;
  --primary:#4f8cff;
  --primarySoft:#edf4ff;
  --shadow:0 20px 60px rgba(20,40,70,.10);
  --radius:24px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
  font-family:Poppins,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.92), transparent 28%),
    linear-gradient(180deg,var(--bgA),var(--bgB));
}

body{
  padding:24px 12px 40px;
}

.shell{
  max-width:980px;
  margin:0 auto;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:28px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:18px;
}

.brand h1{
  margin:0 0 8px;
  font-size:clamp(30px,4vw,52px);
  line-height:1.02;
  font-weight:700;
  letter-spacing:-.03em;
}

.brand p{
  margin:0;
  color:var(--muted);
  font-size:14px;
}

.candidate{
  margin-top:14px;
  font-size:15px;
  font-weight:700;
  color:#356fdf;
}

.progressMeta{
  text-align:right;
  min-width:120px;
}

.progressMeta .small{
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}

.progressMeta .big{
  font-size:30px;
  line-height:1;
  font-weight:700;
}

.progressWrap{
  margin-bottom:24px;
}

.progressTrack{
  width:100%;
  height:12px;
  background:#ecf1f8;
  border-radius:999px;
  overflow:hidden;
}

.progressFill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,var(--primary),#8db7ff);
  transition:width .25s ease;
}

.stage{
  min-height:360px;
}

.pill{
  display:inline-flex;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:var(--primarySoft);
  color:#356fdf;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:16px;
}

.questionText{
  margin:0 0 20px;
  font-size:clamp(22px,3vw,36px);
  line-height:1.15;
  font-weight:700;
  letter-spacing:-.02em;
}

.passageBox,
.answerBox,
.resultBox,
.errorBox{
  background:#f8fbff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
}

.passageBox{
  white-space:pre-line;
  font-size:17px;
  line-height:1.7;
  color:#32455e;
}

.answerGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.option{
  position:relative;
}

.option input{
  position:absolute;
  opacity:0;
  pointer-events:none;
}

.optionCard{
  width:100%;
  min-height:72px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px;
  border-radius:18px;
  border:2px solid #dbe6f3;
  background:#fff;
  cursor:pointer;
  transition:.16s ease;
  font-size:16px;
  font-weight:500;
  text-align:left;
}

.optionCard:hover{
  border-color:#b9cef2;
  box-shadow:0 12px 24px rgba(79,140,255,.10);
  transform:translateY(-1px);
}

.option input:checked + .optionCard{
  border-color:var(--primary);
  background:var(--primarySoft);
  box-shadow:0 12px 24px rgba(79,140,255,.14);
}

.badge{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#edf4ff;
  color:#356fdf;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:14px;
  font-weight:700;
}

textarea{
  width:100%;
  min-height:180px;
  resize:vertical;
  border:2px solid #dbe6f3;
  border-radius:18px;
  padding:18px;
  background:#fff;
  font:inherit;
  font-size:16px;
  color:var(--text);
  outline:none;
}

textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(79,140,255,.10);
}

.helper{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  margin-top:22px;
}

.navCenter{
  text-align:center;
  color:var(--muted);
  font-size:14px;
}

.btn{
  appearance:none;
  border:none;
  border-radius:16px;
  padding:14px 18px;
  font:inherit;
  font-weight:600;
  cursor:pointer;
  transition:.16s ease;
}

.btnPrimary{
  background:linear-gradient(180deg,#69a4ff,#4f8cff);
  color:#fff;
  box-shadow:0 12px 24px rgba(79,140,255,.22);
}

.btnPrimary:hover{
  transform:translateY(-1px);
}

.btnMuted{
  background:#eff4fb;
  color:#28405f;
}

.btnMuted:hover{
  background:#e5edf9;
}

.hidden{
  display:none !important;
}

@media (max-width:760px){
  body{padding:16px 10px 28px}
  .card{padding:18px;border-radius:18px}
  .topbar{flex-direction:column;align-items:flex-start}
  .progressMeta{text-align:left}
  .answerGrid{grid-template-columns:1fr}
  .nav{flex-direction:column-reverse;align-items:stretch}
  .nav button{width:100%}
}
</style>
</head>
<body>
<div class="shell">
  <div class="card">
    <div class="topbar">
      <div class="brand">
        <h1 id="title">Loading test...</h1>
        <p>One question at a time. Stay calm and work through each step.</p>
        <div class="candidate" id="candidateCodeLine">Candidate ID: ...</div>
      </div>

      <div class="progressMeta">
        <div class="small">Progress</div>
        <div class="big" id="progressLabel">0 / 0</div>
      </div>
    </div>

    <div class="progressWrap">
      <div class="progressTrack">
        <div class="progressFill" id="progressFill"></div>
      </div>
    </div>

    <div class="stage" id="stage"></div>

    <div class="nav" id="nav">
      <button class="btn btnMuted" id="backBtn" type="button">Back</button>
      <div class="navCenter" id="centerNote">Loading test...</div>
      <button class="btn btnPrimary" id="nextBtn" type="button">Next</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/features/delf/test-engine.js?v=force-clean-2"></script>
</body>
</html>
