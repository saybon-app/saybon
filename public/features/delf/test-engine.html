<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SayBon Test Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{
  --bgA:#eef4fb;
  --bgB:#dfe9f7;
  --card:#ffffff;
  --line:#e4ecf7;
  --text:#1f2f44;
  --muted:#6c7b90;
  --primary:#4f8cff;
  --primary-soft:#edf4ff;
  --success:#17a34a;
  --danger:#d55252;
  --shadow:0 20px 60px rgba(20,40,70,.10);
  --radius:24px;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  font-family:Poppins,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.92), transparent 28%),
    linear-gradient(180deg,var(--bgA),var(--bgB));
}
body{padding:26px 14px 40px}
.shell{max-width:980px;margin:0 auto}
.exam-card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:28px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:20px;
}
.brand h1{
  margin:0 0 6px;
  font-size:clamp(28px,4vw,46px);
  line-height:1.04;
  font-weight:700;
  letter-spacing:-.03em;
}
.brand p{
  margin:0;
  color:var(--muted);
  font-size:14px;
}
.progressMeta{text-align:right;min-width:160px}
.progressMeta .small{color:var(--muted);font-size:13px;margin-bottom:8px}
.progressMeta .big{font-size:30px;font-weight:700;line-height:1}
.progressWrap{margin-bottom:24px}
.progressTrack{
  width:100%;
  height:12px;
  background:#ecf1f8;
  border-radius:999px;
  overflow:hidden;
}
.progressFill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,var(--primary),#8db7ff);
  border-radius:999px;
  transition:width .28s ease;
}
.stage{min-height:430px}
.pill{
  display:inline-flex;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:var(--primary-soft);
  color:#356fdf;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:16px;
}
.questionText{
  margin:0 0 20px;
  font-size:clamp(22px,3vw,34px);
  line-height:1.18;
  font-weight:700;
  letter-spacing:-.02em;
}
.readingBox,
.audioBox,
.writingBox,
.speakingBox{
  background:#f8fbff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-bottom:22px;
}
.readingBox{
  white-space:pre-line;
  font-size:18px;
  line-height:1.75;
  color:#32455e;
}
.audioBox audio{width:100%}
.answerGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.option{position:relative}
.option input{
  position:absolute;
  opacity:0;
  pointer-events:none;
}
.optionCard{
  width:100%;
  min-height:72px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px 18px;
  border-radius:18px;
  border:2px solid #dbe6f3;
  background:#fff;
  cursor:pointer;
  transition:.18s ease;
  font-size:17px;
  font-weight:500;
  text-align:left;
}
.optionCard:hover{
  transform:translateY(-1px);
  border-color:#b9cef2;
  box-shadow:0 12px 24px rgba(79,140,255,.10);
}
.option input:checked + .optionCard{
  border-color:var(--primary);
  background:var(--primary-soft);
  box-shadow:0 12px 24px rgba(79,140,255,.14);
}
.badge{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#edf4ff;
  color:#356fdf;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:14px;
  font-weight:700;
}
textarea{
  width:100%;
  min-height:180px;
  resize:vertical;
  border:2px solid #dbe6f3;
  border-radius:18px;
  padding:18px;
  background:#fff;
  font:inherit;
  font-size:16px;
  color:var(--text);
  outline:none;
}
textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(79,140,255,.10);
}
.helper{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
}
.btn{
  appearance:none;
  border:none;
  border-radius:16px;
  padding:14px 18px;
  font:inherit;
  font-weight:600;
  cursor:pointer;
  transition:.18s ease;
}
.btnPrimary{
  background:linear-gradient(180deg,#69a4ff,#4f8cff);
  color:#fff;
  box-shadow:0 12px 24px rgba(79,140,255,.22);
}
.btnPrimary:hover{transform:translateY(-1px)}
.btnDanger{background:#ffe7e7;color:var(--danger)}
.btnDanger:hover{background:#ffdada}
.btnMuted{background:#eff4fb;color:#28405f}
.btnMuted:hover{background:#e5edf9}
.recStatus{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
  min-height:20px;
}
.waveShell{
  width:100%;
  height:92px;
  margin-top:14px;
  background:#eef4ff;
  border-radius:12px;
  overflow:hidden;
}
.waveShell canvas{
  width:100%;
  height:92px;
  display:block;
}
.nav{
  margin-top:22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
}
.navCenter{
  text-align:center;
  color:var(--muted);
  font-size:14px;
}
.finishBox{text-align:center;padding:40px 10px 10px}
.finishBox h2{margin:0 0 10px;font-size:34px}
.finishBox p{margin:0 0 22px;color:var(--muted)}
.errorBox{text-align:center;padding:36px 10px}
.errorBox h2{margin:0 0 8px}
.errorBox p{margin:0;color:var(--muted)}
@media (max-width:760px){
  body{padding:16px 10px 26px}
  .exam-card{padding:18px;border-radius:18px}
  .topbar{flex-direction:column;align-items:flex-start}
  .progressMeta{text-align:left}
  .answerGrid{grid-template-columns:1fr}
  .nav{flex-direction:column-reverse;align-items:stretch}
  .nav button{width:100%}
  .questionText{font-size:28px}
}
</style>
</head>

<body>
<div class="shell">
  <div class="exam-card">
    <div class="topbar">
      <div class="brand">
        <h1 id="title">Loading test...</h1>
        <p>One question at a time. Stay calm and work through each step.</p>
        <p id="candidateCodeLine" style="margin-top:10px;font-weight:600;color:#356fdf;"></p>
      </div>
      <div class="progressMeta">
        <div class="small">Progress</div>
        <div class="big" id="progressLabel">1 / 1</div>
      </div>
    </div>

    <div class="progressWrap">
      <div class="progressTrack">
        <div class="progressFill" id="progressFill"></div>
      </div>
    </div>

    <div class="stage" id="stage"></div>

    <div class="nav" id="nav">
      <button class="btn btnMuted" id="backBtn" type="button" onclick="prevSlide()">Back</button>
      <div class="navCenter" id="centerNote">Choose an answer, then continue.</div>
      <button class="btn btnPrimary" id="nextBtn" type="button" onclick="nextSlide()">Next</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
  authDomain:"saybon-3e3c2.firebaseapp.com",
  projectId:"saybon-3e3c2",
  storageBucket:"saybon-3e3c2.firebasestorage.app",
  messagingSenderId:"75085012344",
  appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const test = params.get("test") || "prim";

let testData = null;
let current = 0;
let answers = {};
let submitting = false;
let candidateCode = null;

/* recorder state */
let recorder = null;
let recorderStream = null;
let recorderChunks = [];
let recorderQuestionIndex = null;
let audioContext = null;
let analyser = null;
let sourceNode = null;
let waveAnimation = null;

function generateCandidateCode(){
  return "SB-CAND-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

async function createCandidateRecord(){
  candidateCode = sessionStorage.getItem("saybon_candidate_code");

  if(!candidateCode){
    candidateCode = generateCandidateCode();
    sessionStorage.setItem("saybon_candidate_code", candidateCode);
  }

  document.getElementById("candidateCodeLine").innerText = "Candidate Code: " + candidateCode;

  const ref = db.collection("delfCandidates").doc(candidateCode);
  const snap = await ref.get();

  if(!snap.exists){
    await ref.set({
      candidateCode,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      activeTest: test,
      source: "placement"
    }, { merge:true });
  }
}

function esc(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function updateProgress(){
  if(!testData || !testData.questions?.length) return;

  const total = testData.questions.length;
  const currentDisplay = Math.min(current + 1, total);
  const percent = ((currentDisplay) / total) * 100;

  document.getElementById("progressLabel").innerText = `${currentDisplay} / ${total}`;
  document.getElementById("progressFill").style.width = `${percent}%`;
}

function updateCenterNote(){
  if(!testData) return;
  const q = testData.questions[current];
  const centerNote = document.getElementById("centerNote");
  const nextBtn = document.getElementById("nextBtn");

  if(!q || !centerNote || !nextBtn) return;

  let answered = false;

  if(q.type === "listening" || q.type === "reading"){
    answered = typeof answers[current] !== "undefined" && answers[current] !== "";
    centerNote.innerText = answered ? "Answer saved. Continue when ready." : "Choose an answer, then continue.";
  }

  if(q.type === "writing"){
    answered = String(answers[current] || "").trim().length > 0;
    centerNote.innerText = answered ? "Writing response saved." : "Write your answer, then continue.";
  }

  if(q.type === "speaking"){
    answered = String(answers[current] || "").trim().length > 0;
    centerNote.innerText = answered ? "Recording saved. Continue when ready." : "Record your speaking answer before continuing.";
  }

  nextBtn.innerText = current === testData.questions.length - 1 ? "Finish" : "Next";
}

function saveCurrentAnswer(){
  if(!testData) return;
  const q = testData.questions[current];
  if(!q) return;

  if(q.type === "listening" || q.type === "reading"){
    const selected = document.querySelector(`input[name="question-${current}"]:checked`);
    if(selected){
      answers[current] = selected.value;
    }
  }

  if(q.type === "writing"){
    const text = document.getElementById("writingAnswer");
    if(text){
      answers[current] = text.value.trim();
    }
  }
}

function renderCurrentSlide(){
  if(!testData || !testData.questions?.length) return;

  const q = testData.questions[current];
  const stage = document.getElementById("stage");
  const backBtn = document.getElementById("backBtn");

  updateProgress();

  if(backBtn){
    backBtn.style.visibility = current === 0 ? "hidden" : "visible";
  }

  let html = `<div class="pill">${esc(q.type || "Question")}</div>`;
  html += `<h2 class="questionText">${esc(q.question || "Untitled question")}</h2>`;

  if(q.type === "reading" && q.passage){
    html += `<div class="readingBox">${esc(q.passage)}</div>`;
  }

  if(q.type === "listening" && q.audio){
    html += `
      <div class="audioBox">
        <audio controls controlsList="nodownload">
          <source src="${esc(q.audio)}" type="audio/mpeg">
        </audio>
      </div>
    `;
  }

  if((q.type === "listening" || q.type === "reading") && Array.isArray(q.options)){
    html += `<div class="answerGrid">`;
    q.options.forEach((option, i)=>{
      const letters = ["A","B","C","D","E","F"];
      const checked = String(answers[current] ?? "") === String(option) ? "checked" : "";
      html += `
        <label class="option">
          <input type="radio" name="question-${current}" value="${esc(option)}" ${checked} onchange="saveCurrentAnswer();updateCenterNote();">
          <div class="optionCard">
            <div class="badge">${letters[i] || i+1}</div>
            <div>${esc(option)}</div>
          </div>
        </label>
      `;
    });
    html += `</div>`;
  }

  if(q.type === "writing"){
    html += `
      <div class="writingBox">
        <textarea id="writingAnswer" placeholder="Write your answer here..." oninput="saveCurrentAnswer();updateCenterNote();">${esc(answers[current] || "")}</textarea>
        <div class="helper">Write as clearly and naturally as you can.</div>
      </div>
    `;
  }

  if(q.type === "speaking"){
    html += `
      <div class="speakingBox">
        <div class="helper" style="margin-bottom:14px;">Record your answer clearly. You can preview it before continuing.</div>

        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn btnPrimary" id="startRecBtn" type="button" onclick="startRecording(${current})">Start Recording</button>
          <button class="btn btnDanger" id="stopRecBtn" type="button" onclick="stopRecording()" disabled>Stop Recording</button>
        </div>

        <div class="recStatus" id="recStatus">${answers[current] ? "Recording already saved." : "Not recording yet."}</div>

        <div class="waveShell">
          <canvas id="waveCanvas" width="1200" height="92"></canvas>
        </div>

        ${
          answers[current]
          ? `
            <div id="savedPreview" style="margin-top:14px;">
              <div class="helper" style="margin-bottom:10px;">A recording is already saved for this question.</div>
              <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <button class="btn btnMuted" type="button" onclick="playSavedRecording()">Play recording</button>
                <button class="btn btnDanger" type="button" onclick="reRecordCurrent()">Re-record</button>
              </div>
            </div>
          `
          : ``
        }
      </div>
    `;
  }

  stage.innerHTML = html;
  updateCenterNote();
}

function nextSlide(){
  if(!testData) return;
  saveCurrentAnswer();

  if(current === testData.questions.length - 1){
    submitTest();
    return;
  }

  current += 1;
  renderCurrentSlide();
}

function prevSlide(){
  if(current <= 0) return;
  saveCurrentAnswer();
  current -= 1;
  renderCurrentSlide();
}

function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onloadend = ()=>{
      const result = String(reader.result || "");
      const base64 = result.includes(",") ? result.split(",")[1] : result;
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function drawWaveLoop(canvas, ctx){
  if(!analyser) return;
  const bufferLength = analyser.fftSize;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    waveAnimation = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(dataArray);

    ctx.fillStyle = "#eef4ff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.lineWidth = 2;
    ctx.strokeStyle = "#4f8cff";
    ctx.beginPath();

    const sliceWidth = canvas.width / bufferLength;
    let x = 0;

    for(let i=0;i<bufferLength;i++){
      const v = dataArray[i] / 128.0;
      const y = v * canvas.height / 2;

      if(i === 0){ ctx.moveTo(x,y); }
      else{ ctx.lineTo(x,y); }

      x += sliceWidth;
    }

    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
  }

  draw();
}

async function startRecording(index){
  try{
    if(recorder || recorderStream) return;

    recorderQuestionIndex = index;
    recorderChunks = [];

    const startBtn = document.getElementById("startRecBtn");
    const stopBtn = document.getElementById("stopRecBtn");
    const status = document.getElementById("recStatus");
    const canvas = document.getElementById("waveCanvas");
    const ctx = canvas.getContext("2d");

    if(startBtn) startBtn.disabled = true;
    if(stopBtn) stopBtn.disabled = false;
    if(status) status.innerText = "Recording...";

    recorderStream = await navigator.mediaDevices.getUserMedia({ audio:true });

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioContext.createMediaStreamSource(recorderStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    sourceNode.connect(analyser);

    drawWaveLoop(canvas, ctx);

    recorder = new MediaRecorder(recorderStream);

    recorder.ondataavailable = (e)=>{
      if(e.data && e.data.size > 0){
        recorderChunks.push(e.data);
      }
    };

    recorder.onstop = async ()=>{
      try{
        const blob = new Blob(recorderChunks, { type:"audio/webm" });
        const base64 = await blobToBase64(blob);
        answers[recorderQuestionIndex] = base64;

        if(status) status.innerText = "Recording saved. You can continue or re-record.";
        renderCurrentSlide();
      }catch(err){
        if(status) status.innerText = "Recording save failed.";
        console.error(err);
      }finally{
        if(recorderStream){
          recorderStream.getTracks().forEach(track=>track.stop());
        }
        if(sourceNode){
          try{ sourceNode.disconnect(); }catch(e){}
        }
        if(analyser){
          try{ analyser.disconnect(); }catch(e){}
        }
        if(audioContext && audioContext.state !== "closed"){
          try{ await audioContext.close(); }catch(e){}
        }

        cancelAnimationFrame(waveAnimation);

        recorder = null;
        recorderStream = null;
        recorderChunks = [];
        recorderQuestionIndex = null;
        audioContext = null;
        analyser = null;
        sourceNode = null;
        waveAnimation = null;
      }
    };

    recorder.start();
  }catch(err){
    const status = document.getElementById("recStatus");
    const startBtn = document.getElementById("startRecBtn");
    const stopBtn = document.getElementById("stopRecBtn");

    if(status) status.innerText = "Microphone access failed.";
    if(startBtn) startBtn.disabled = false;
    if(stopBtn) stopBtn.disabled = true;

    console.error(err);
  }
}

function stopRecording(){
  if(!recorder) return;

  const stopBtn = document.getElementById("stopRecBtn");
  const status = document.getElementById("recStatus");

  if(stopBtn) stopBtn.disabled = true;
  if(status) status.innerText = "Saving recording...";

  try{ recorder.requestData(); }catch(e){}

  setTimeout(()=>{
    try{ recorder.stop(); }catch(err){ console.error(err); }
  }, 120);
}

function playSavedRecording(){
  alert("Saved audio is stored and submitted. Playback preview is only available immediately after recording in this version.");
}

function reRecordCurrent(){
  delete answers[current];
  renderCurrentSlide();
}

async function submitTest(){
  if(submitting) return;
  submitting = true;
  saveCurrentAnswer();

  const nextBtn = document.getElementById("nextBtn");
  const centerNote = document.getElementById("centerNote");

  if(nextBtn) nextBtn.disabled = true;
  if(centerNote) centerNote.innerText = "Submitting and scoring your test...";

  try{
    const response = await fetch("/api/evaluatePlacementTest", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        candidateCode,
        testType: test,
        testTitle: testData.title,
        questions: testData.questions,
        answers
      })
    });

    const result = await response.json();

    if(!response.ok){
      throw new Error(result.message || result.error || "Submission failed");
    }

    document.getElementById("stage").innerHTML = `
      <div class="finishBox">
        <div class="pill" style="margin-bottom:18px;">Result</div>
        <h2 style="margin-bottom:16px;">Placement complete</h2>

        <div class="readingBox" style="text-align:left;max-width:760px;margin:0 auto 18px;">
          <div style="font-size:20px;font-weight:700;margin-bottom:10px;">Candidate Code: ${esc(result.candidateCode || candidateCode)}</div>
          <div style="font-size:20px;font-weight:700;margin-bottom:10px;">Estimated Level: ${esc(result.estimatedLevel || "Pending")}</div>
          <div style="margin-bottom:8px;"><strong>Objective Score:</strong> ${esc(result.objectiveScore)} / ${esc(result.objectiveTotal)} (${esc(result.objectivePercent)}%)</div>
          <div style="margin-bottom:8px;"><strong>Writing Score:</strong> ${esc(result.writingScore)} / 10</div>
          <div style="margin-bottom:8px;"><strong>Speaking Score:</strong> ${esc(result.speakingScore)} / 10</div>
        </div>

        <div class="readingBox" style="text-align:left;max-width:760px;margin:0 auto 18px;">
          <div style="font-size:18px;font-weight:700;margin-bottom:10px;">Writing Feedback</div>
          <div>${esc(result.writingFeedback || "No feedback.")}</div>
        </div>

        <div class="readingBox" style="text-align:left;max-width:760px;margin:0 auto 18px;">
          <div style="font-size:18px;font-weight:700;margin-bottom:10px;">Speaking Feedback</div>
          <div>${esc(result.speakingFeedback || "No feedback.")}</div>
        </div>

        ${result.speakingTranscript ? `
          <div class="readingBox" style="text-align:left;max-width:760px;margin:0 auto 18px;">
            <div style="font-size:18px;font-weight:700;margin-bottom:10px;">Speech Transcript</div>
            <div>${esc(result.speakingTranscript)}</div>
          </div>
        ` : ""}

        <button class="btn btnPrimary" onclick="window.location='/dashboard/index.html'">Return to dashboard</button>
      </div>
    `;

    document.getElementById("backBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("centerNote").innerText = "Scoring complete.";
    document.getElementById("progressFill").style.width = "100%";
    document.getElementById("progressLabel").innerText = `${testData.questions.length} / ${testData.questions.length}`;
  }catch(err){
    submitting = false;
    if(nextBtn) nextBtn.disabled = false;
    if(centerNote) centerNote.innerText = "Submission failed. Please try again.";
    alert("Submission failed: " + (err.message || "Unknown error"));
    console.error(err);
  }
}

async function loadTest(){
  try{
    await createCandidateRecord();

    const res = await fetch(`/features/delf/tests/${test}.json`);
    if(!res.ok){
      throw new Error("Test file not found");
    }

    testData = await res.json();
    document.getElementById("title").innerText = testData.title || "Placement Test";
    renderCurrentSlide();
  }catch(err){
    document.getElementById("title").innerText = "Test unavailable";
    document.getElementById("stage").innerHTML = `
      <div class="errorBox">
        <h2>We couldn't load this test.</h2>
        <p>Please check the test link or try again later.</p>
      </div>
    `;
    document.getElementById("backBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("centerNote").innerText = "No test loaded.";
    console.error(err);
  }
}

loadTest();
</script>
