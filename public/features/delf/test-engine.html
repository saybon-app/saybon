<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SayBon Test Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  padding:24px;
  font-family:Poppins,Arial,sans-serif;
  background:linear-gradient(180deg,#eef4fb,#dfe9f7);
  color:#1f2f44;
}
.card{
  max-width:980px;
  margin:0 auto;
  background:#fff;
  border-radius:24px;
  box-shadow:0 20px 60px rgba(20,40,70,.10);
  padding:28px;
}
h1{
  margin:0 0 8px;
  font-size:48px;
  line-height:1;
}
.muted{
  color:#6c7b90;
}
.code{
  margin-top:12px;
  color:#356fdf;
  font-weight:700;
}
.bar{
  margin:20px 0 26px;
  width:100%;
  height:12px;
  background:#ecf1f8;
  border-radius:999px;
  overflow:hidden;
}
.fill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#4f8cff,#8db7ff);
}
.box{
  background:#f8fbff;
  border:1px solid #e4ecf7;
  border-radius:18px;
  padding:20px;
  margin-top:18px;
}
.option{
  display:block;
  margin:12px 0;
  padding:16px;
  border:2px solid #dbe6f3;
  border-radius:16px;
  cursor:pointer;
  background:#fff;
}
.option:hover{
  border-color:#4f8cff;
}
.btn{
  border:none;
  border-radius:16px;
  padding:14px 18px;
  font:inherit;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(180deg,#69a4ff,#4f8cff);
  color:#fff;
}
.error{
  color:#c53030;
  font-weight:600;
  white-space:pre-wrap;
}
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Loading test...</h1>
  <div class="muted">One question at a time. Stay calm and work through each step.</div>
  <div class="code" id="candidateCodeLine"></div>
  <div class="bar"><div class="fill" id="progressFill"></div></div>
  <div id="stage"></div>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
  authDomain:"saybon-3e3c2.firebaseapp.com",
  projectId:"saybon-3e3c2",
  storageBucket:"saybon-3e3c2.firebasestorage.app",
  messagingSenderId:"75085012344",
  appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const test = params.get("test") || "prim";

let testData = null;
let candidateCode = null;

function generateCandidateCode(){
  return "CAND-" + Math.floor(100000 + Math.random() * 900000);
}

async function createCandidateRecord(){
  candidateCode = sessionStorage.getItem("saybon_candidate_code");

  if(!candidateCode){
    candidateCode = generateCandidateCode();
    sessionStorage.setItem("saybon_candidate_code", candidateCode);
  }

  document.getElementById("candidateCodeLine").innerText = "Candidate Code: " + candidateCode;

  const ref = db.collection("delfCandidates").doc(candidateCode);
  const snap = await ref.get();

  if(!snap.exists){
    await ref.set({
      candidateCode,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      activeTest: test,
      source: "placement"
    }, { merge:true });
  }
}

function esc(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

async function loadTest(){
  const stage = document.getElementById("stage");

  try{
    await createCandidateRecord();

    const fetchUrl = `/features/delf/tests/${test}.json?ts=${Date.now()}`;
    const res = await fetch(fetchUrl);
    const rawText = await res.text();

    if(!res.ok){
      throw new Error(
        "HTTP " + res.status + "\n\n" +
        "FETCH URL: " + fetchUrl + "\n\n" +
        "RAW RESPONSE:\n" + rawText
      );
    }

    try{
      testData = JSON.parse(rawText);
    }catch(parseErr){
      throw new Error(
        "JSON PARSE FAILED\n\n" +
        "FETCH URL: " + fetchUrl + "\n\n" +
        "RAW RESPONSE:\n" + rawText
      );
    }

    document.getElementById("title").innerText = testData.title || "Placement Test";
    document.getElementById("progressFill").style.width = "100%";

    const q = testData.questions?.[0];

    if(!q){
      stage.innerHTML = `
        <div class="box">
          <div class="error">Test file loaded but contains no questions.</div>
        </div>
      `;
      return;
    }

    let html = `<div class="box"><div style="font-size:28px;font-weight:700;margin-bottom:18px;">${esc(q.question)}</div>`;

    if(Array.isArray(q.options)){
      q.options.forEach(opt=>{
        html += `<label class="option">${esc(opt)}</label>`;
      });
    }

    html += `</div>`;
    stage.innerHTML = html;

  }catch(err){
    console.error("LOAD TEST ERROR:", err);
    document.getElementById("title").innerText = "Test unavailable";
    stage.innerHTML = `
      <div class="box">
        <div class="error">REAL ERROR:\n\n${esc(err.message || String(err))}</div>
      </div>
    `;
  }
}

loadTest();
</script>
</body>
</html>
