<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Test Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>

body{
font-family:Poppins;
background:#eef4fb;
margin:0;
padding:30px;
}

.shell{
max-width:900px;
margin:auto;
}

.exam-card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

.question-text{
font-size:34px;
font-weight:600;
margin-bottom:30px;
}

.speaking-box{
background:#f8fbff;
border:1px solid #e6edf7;
padding:25px;
border-radius:18px;
}

.record-controls{
display:flex;
gap:12px;
margin-bottom:15px;
}

.btn{
padding:14px 22px;
border:none;
border-radius:14px;
font-size:16px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#4f8cff;
color:white;
}

.btn-danger{
background:#ffdede;
color:#c63b3b;
}

.rec-status{
margin-top:12px;
font-size:14px;
color:#6b7a90;
}

#waveCanvas{
width:100%;
height:80px;
margin-top:15px;
background:#eef4ff;
border-radius:10px;
}

</style>

</head>

<body>

<div class="shell">

<div class="exam-card">

<h2 class="question-text">
Say your name and age in French.
</h2>

<div class="speaking-box">

<div class="record-controls">

<button class="btn btn-primary" onclick="startRecording(1)">
Start recording
</button>

<button class="btn btn-danger" onclick="stopRecording()">
Stop
</button>

</div>

<canvas id="waveCanvas"></canvas>

<div class="rec-status" id="rec1">
Press start and speak clearly.
</div>

</div>

</div>

</div>

<script>

/* ===============================
FIREBASE CONFIG
================================ */

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"YOUR_SENDER",
appId:"YOUR_APP"
}

firebase.initializeApp(firebaseConfig)

const storage=firebase.storage()


/* ===============================
GLOBAL VARIABLES
================================ */

let recorder=null
let stream=null
let audioChunks=[]
let activeQuestion=null
let animationId=null

let audioContext
let analyser
let source

const canvas=document.getElementById("waveCanvas")
const ctx=canvas.getContext("2d")

canvas.width=800
canvas.height=80


/* ===============================
DRAW WAVEFORM
================================ */

function drawWave(){

const bufferLength=analyser.fftSize
const dataArray=new Uint8Array(bufferLength)

function draw(){

animationId=requestAnimationFrame(draw)

analyser.getByteTimeDomainData(dataArray)

ctx.fillStyle="#eef4ff"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.lineWidth=2
ctx.strokeStyle="#4f8cff"

ctx.beginPath()

let sliceWidth=canvas.width/bufferLength
let x=0

for(let i=0;i<bufferLength;i++){

let v=dataArray[i]/128.0
let y=v*canvas.height/2

if(i===0){
ctx.moveTo(x,y)
}else{
ctx.lineTo(x,y)
}

x+=sliceWidth

}

ctx.lineTo(canvas.width,canvas.height/2)
ctx.stroke()

}

draw()

}


/* ===============================
START RECORDING
================================ */

async function startRecording(index){

if(recorder){
return
}

activeQuestion=index

stream=await navigator.mediaDevices.getUserMedia({audio:true})

audioContext=new AudioContext()

source=audioContext.createMediaStreamSource(stream)

analyser=audioContext.createAnalyser()
analyser.fftSize=2048

source.connect(analyser)

drawWave()

recorder=new MediaRecorder(stream)

audioChunks=[]

recorder.ondataavailable=e=>{
if(e.data.size>0){
audioChunks.push(e.data)
}
}

recorder.onstop=uploadRecording

recorder.start()

document.getElementById("rec"+index).innerText="Recording..."

}


/* ===============================
STOP RECORDING
================================ */

async function stopRecording(){

if(!recorder){
return
}

/* STOP MICROPHONE FIRST */

stream.getTracks().forEach(track=>track.stop())

/* STOP RECORDER */

recorder.stop()

/* STOP WAVE ANIMATION */

cancelAnimationFrame(animationId)

ctx.clearRect(0,0,canvas.width,canvas.height)

}


/* ===============================
UPLOAD RECORDING
================================ */

async function uploadRecording(){

try{

const blob=new Blob(audioChunks,{type:"audio/webm"})

const path="placement-audio/"+Date.now()+".webm"

const ref=storage.ref(path)

await ref.put(blob)

const url=await ref.getDownloadURL()

document.getElementById("rec"+activeQuestion).innerText="Recording saved"

}catch(err){

document.getElementById("rec"+activeQuestion).innerText="Upload failed"

console.error(err)

}

/* RESET VARIABLES */

recorder=null
audioChunks=[]
activeQuestion=null
stream=null

}

</script>

</body>
</html>
