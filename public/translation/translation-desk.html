<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translation Desk</title>
  <link rel="stylesheet" href="/css/page-transition.css" />
  <script type="module" src="/js/nav-engine.js"></script>
</head>
<body>
<div style="max-width:900px;margin:60px auto;padding:32px;">
  <h1>Translation Desk</h1>
  <input id="translatorName" type="text" placeholder="Translator name" style="width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-bottom:16px;" />
  <button id="claimBtn">Claim Job</button>

  <div style="margin-top:24px;">
    <textarea id="translationText" placeholder="Paste translated content here..." style="width:100%;height:260px;padding:16px;border-radius:18px;border:1px solid #ddd;"></textarea>
  </div>

  <button id="submitBtn" style="margin-top:16px;">Submit for Review</button>
  <p id="status" style="margin-top:18px;"></p>
</div>
<script src="/js/translation-desk.js"></script>
</body>
</html>
