<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{

font-family:"Manrope",sans-serif;
background:#0b1220;
color:white;
margin:0;
padding:40px;

}

.container{

max-width:700px;
margin:auto;

}

input,textarea{

width:100%;
padding:12px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #334155;
background:#020617;
color:white;

}

button{

width:100%;
padding:14px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;

}

button:disabled{

background:#334155;

}

.timer{

color:red;
margin-bottom:10px;

}


.overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);

display:none;
align-items:center;
justify-content:center;

}


.card{

background:white;
color:black;
padding:40px;
border-radius:10px;

}

</style>

</head>

<body>


<div class="container">


<h2>Translator Registration</h2>


<input id="name" placeholder="Full Name" required>

<input id="email" placeholder="Email" required>

<input type="file" required>


<h3>
Translation Test
</h3>


<p>
Global cooperation is essential for economic stability and cultural understanding.
</p>


<div class="timer" id="timer">
Time remaining: 01:30
</div>


<textarea id="translation"></textarea>


<label>

<input type="checkbox" id="nda">

I agree to NDA

</label>


<br><br>


<button id="submit" disabled onclick="submitForm()">

Submit Registration

</button>


</div>



<div class="overlay" id="overlay">

<div class="card">

<h3>
Registration Received
</h3>

<p>
Your application is under review.
Decision will be sent to your email.
</p>

</div>

</div>



<script>


let seconds=90;


let timer=setInterval(()=>{

seconds--;

let m=Math.floor(seconds/60);

let s=seconds%60;

document.getElementById("timer").innerText=

"Time remaining: "+m+":"+s;

if(seconds<=0){

clearInterval(timer);

}

},1000);



document.querySelectorAll("input,textarea").forEach(el=>{

el.addEventListener("input",validate);

});


function validate(){

let valid=

name.value &&
email.value &&
translation.value &&
nda.checked;


submit.disabled=!valid;

}



function submitForm(){

overlay.style.display="flex";

setTimeout(()=>{

location.href="dashboard.html";

},5000);

}


</script>



</body>

</html>
