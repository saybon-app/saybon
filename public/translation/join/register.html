<!DOCTYPE html>
<html>
<head>
<title>Translator Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope&display=swap" rel="stylesheet">

<style>

body{
font-family:Manrope;
background:#0b1220;
color:white;
padding:40px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#111827;
border:none;
color:white;
}

button{
padding:12px;
width:100%;
background:#3b82f6;
border:none;
color:white;
margin-top:20px;
cursor:pointer;
}

.accent button{
width:auto;
margin:3px;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.card{
background:white;
color:black;
padding:30px;
border-radius:10px;
}

</style>

</head>

<body>


<h2>Register to Join SayBon Translator Pool</h2>


<input placeholder="Full Name" id="name">

<input placeholder="Email" id="email">

<input placeholder="Address" id="address">

<textarea placeholder="Professional Background" id="bio"></textarea>


<label>Upload CV</label>
<input type="file" id="cv">

<label>Upload Certificates</label>
<input type="file" id="cert">

<label>Upload National ID</label>
<input type="file" id="id">




<h3>Live Translation Test</h3>

<p>

Translate to French:

Global cooperation strengthens economic and cultural stability.

</p>


<div class="accent">

<button onclick="add('é')">é</button>

<button onclick="add('è')">è</button>

<button onclick="add('ê')">ê</button>

<button onclick="add('à')">à</button>

<button onclick="add('ç')">ç</button>

</div>


<textarea id="translation" onclick="startTimer()"></textarea>

<div id="timer">3:00</div>



<label>

<input type="checkbox" id="nda">

I agree to NDA

</label>



<button onclick="submit()">

Submit Registration

</button>




<div id="overlay">

<div class="card">

Registration received.

<br><br>

Decision will be sent via email.

</div>

</div>



<script>

let time=180;
let started=false;


function add(x){

translation.value+=x;

}



function startTimer(){

if(started)return;

started=true;

const t=setInterval(()=>{

time--;

timer.innerHTML=

Math.floor(time/60)+":"+("0"+time%60).slice(-2);

if(time<=0){

clearInterval(t);

translation.disabled=true;

}

},1000);

}



async function submit(){


if(

!name.value||

!email.value||

!address.value||

!bio.value||

!cv.files[0]||

!cert.files[0]||

!id.files[0]||

!translation.value||

!nda.checked

){

alert("Complete all fields");

return;

}



overlay.style.display="flex";



setTimeout(()=>{

location.href="dashboard.html";
},5000);



}

</script>


</body>
</html>
