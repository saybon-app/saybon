<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SayBon Translator Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Manrope",sans-serif;
background:#0b1220;
color:#e2e8f0;
}

.wrapper{
max-width:900px;
margin:auto;
padding:100px 40px;
}

h1{
font-size:38px;
margin-bottom:60px;
}

.card{

background:#111827;

padding:40px;

border-radius:12px;

margin-bottom:30px;

border:1px solid #1f2937;

}

.card h2{
margin-bottom:10px;
}

.card p{
color:#94a3b8;
margin-bottom:20px;
}

.btn{

display:inline-block;

padding:12px 26px;

border-radius:6px;

border:1px solid #334155;

background:transparent;

color:white;

cursor:pointer;

font-size:15px;

}

.btn:hover{

background:#1e293b;

}

</style>
</head>

<body>


<div class="wrapper">


<h1>Translator Dashboard</h1>


<div class="card">

<h2>Register to Join Our Pool</h2>

<p>
Apply to become a verified SayBon translator.
Submit your credentials, national ID, and complete the translation test.
</p>

<button class="btn" onclick="register()">
Register to Join Our Pool
</button>


</div>



<div class="card">

<h2>Access Jobs</h2>

<p>
Already approved?
Enter your translator passkey to access available translation jobs.
</p>

<button class="btn" onclick="login()">
Access Jobs
</button>


</div>


</div>


<script>

function register(){

window.location.href="/translation/join/register.html"

}

function login(){

window.location.href="/translation/join/login.html"

}

</script>


</body>
</html>
