<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Translator Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>

body{

background:#0b1220;
color:#e2e8f0;
font-family:Manrope;
padding:60px;

}

h1{

margin-bottom:40px;

}

.job{

background:#1e293b;
padding:25px;
margin-bottom:20px;
border-radius:10px;

}

button{

background:#2563eb;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;

}

textarea{

width:100%;
height:200px;
margin-top:10px;
background:#0b1220;
color:white;
border:1px solid #334155;
padding:10px;

}

</style>

</head>

<body>

<h1>Translator Dashboard</h1>

<div id="jobs"></div>


<script>


const translatorName = prompt("Enter your translator name");



async function loadJobs(){

const res =
await fetch("https://saybon-production.up.railway.app/jobs");


const data =
await res.json();


const container =
document.getElementById("jobs");


container.innerHTML="";


data.jobs.forEach(job=>{


const div=document.createElement("div");

div.className="job";


div.innerHTML=`

<h3>Payment: $${job.payment}</h3>

<p>Status: ${job.status}</p>

<p>Deadline: ${new Date(job.deadline).toLocaleString()}</p>


<button onclick="accept('${job.id}')">
Accept Job
</button>


<br><br>

<textarea id="text-${job.id}">
${job.phase1}
</textarea>


<br>

<label>

<input type="checkbox" id="nda-${job.id}">

I agree to NDA

</label>


<br><br>

<button onclick="submitJob('${job.id}')">
Submit Translation
</button>

`;


container.appendChild(div);

});


}



async function accept(id){

await fetch(

"https://saybon-production.up.railway.app/accept",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

jobId:id,

translator:translatorName

})

});

alert("Accepted");

loadJobs();

}



async function submitJob(id){

const text =
document.getElementById("text-"+id).value;


const nda =
document.getElementById("nda-"+id).checked;



if(!nda){

alert("You must agree to NDA");

return;

}


await fetch(

"https://saybon-production.up.railway.app/submit",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

jobId:id,

translator:translatorName,

text,

ndaSigned:true

})

});


alert("Submitted");

loadJobs();

}


loadJobs();


</script>


</body>
</html>
