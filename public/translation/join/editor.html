<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Translation Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{

font-family:Manrope;
background:#020617;
color:white;
margin:0;
padding:30px;

}

textarea{

width:100%;
height:300px;
background:black;
color:white;
border-radius:10px;
padding:20px;
border:1px solid #334155;

}

button{

margin-top:20px;
padding:14px;
width:100%;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;

}

</style>

</head>

<body>

<h2>

Secure Translation Editor

</h2>

<p>

Complete your translation below. Activity is monitored.

</p>

<div id="original"></div>

<textarea id="translation"></textarea>

<label>

<input type="checkbox" id="nda">

I certify this translation was completed personally

</label>

<button onclick="submitTranslation()">

Submit Translation

</button>

<script>

const params=new URLSearchParams(location.search);

const jobId=params.get("job");

const translator=params.get("translator");



async function load(){

const res=await fetch(

"https://saybon-production.up.railway.app/job/"+jobId

);

const data=await res.json();

document.getElementById("original").innerHTML=

"<p>"+data.job.originalText+"</p>";

}


load();


async function submitTranslation(){

const translation=

document.getElementById("translation").value;

const nda=

document.getElementById("nda").checked;

const res=await fetch(

"https://saybon-production.up.railway.app/submit",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

jobId,

translator,

translation,

ndaSigned:nda

})

});

const data=await res.json();

alert(

"Score: "+data.score+

"\nWinner: "+data.winner

);

location.href="dashboard.html";

}

</script>

</body>
</html>
