<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>SayBon Translation Request</title>

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
      background:linear-gradient(180deg,#eef2ff,#f8fafc);
      display:flex;
      justify-content:center;
      min-height:100vh;
    }

    .container{
      max-width:700px;
      width:100%;
      padding:40px 20px;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:16px;
      box-shadow:0 15px 40px rgba(0,0,0,0.12);
    }

    h2{ margin:0 0 14px 0; }

    input[type="file"]{
      width:100%;
      margin:10px 0 16px 0;
    }

    button{
      padding:12px 16px;
      border:none;
      border-radius:10px;
      background:linear-gradient(90deg,#2563eb,#4f46e5);
      color:white;
      cursor:pointer;
      font-weight:600;
    }

    button:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }

    .muted{
      color:#64748b;
      font-size:14px;
      margin-top:12px;
    }

    .pricing{
      margin-top:18px;
      display:none;
    }

    .quoteBox{
      padding:14px 14px;
      margin-top:12px;
      border-radius:12px;
      cursor:pointer;
      user-select:none;
      transition:transform 0.08s ease;
    }

    .quoteBox:active{ transform:scale(0.99); }

    .standard{ border:2px solid #16a34a; }
    .express{ border:2px solid #dc2626; }

    .row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      font-weight:600;
    }

    .small{
      font-size:13px;
      font-weight:500;
      color:#475569;
      margin-top:6px;
      line-height:1.4;
    }

    .error{
      margin-top:14px;
      color:#b91c1c;
      font-size:14px;
      display:none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h2>Upload Document</h2>

      <input type="file" id="fileInput" />

      <button id="quoteBtn">Get Quote</button>

      <div class="muted" id="statusText">Select a file and tap “Get Quote”.</div>
      <div class="error" id="errorText"></div>

      <div class="pricing" id="pricingSection">
        <div class="muted">Word count: <span id="wordCount">0</span></div>

        <div class="quoteBox standard" id="standardBox"></div>
        <div class="quoteBox express" id="expressBox"></div>
      </div>
    </div>
  </div>

  <script>
    // ✅ IMPORTANT:
    // This is the endpoint your repo already references in requestTranslation.js
    // Change this ONLY if your backend URL is different.
    const API_URL = "https://saybon-backend.onrender.com/request";

    const fileInput = document.getElementById("fileInput");
    const quoteBtn = document.getElementById("quoteBtn");
    const statusText = document.getElementById("statusText");
    const errorText = document.getElementById("errorText");

    const pricingSection = document.getElementById("pricingSection");
    const wordCountEl = document.getElementById("wordCount");
    const standardBox = document.getElementById("standardBox");
    const expressBox = document.getElementById("expressBox");

    function showError(msg){
      errorText.style.display = "block";
      errorText.textContent = msg;
    }

    function clearError(){
      errorText.style.display = "none";
      errorText.textContent = "";
    }

    function goPay(type, amount){
      // Payment page in your repo expects ?amount=
      // We also include type for your own use if you want.
      window.location.href =
        "/translation/payment.html" +
        "?type=" + encodeURIComponent(type) +
        "&amount=" + encodeURIComponent(amount);
    }

    async function getQuote(){
      clearError();

      const file = fileInput.files && fileInput.files[0];
      if (!file){
        showError("Please select a file first.");
        return;
      }

      quoteBtn.disabled = true;
      statusText.textContent = "Getting quote...";

      try{
        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch(API_URL, {
          method: "POST",
          body: formData
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok){
          showError(data.message || "Request failed. Check backend endpoint.");
          statusText.textContent = "Failed to get quote.";
          quoteBtn.disabled = false;
          return;
        }

        // Your backend may return { words } only — we handle both cases.
        const words = Number(data.words || 0);

        // If backend provides prices, use them. Otherwise calculate locally.
        const standardPrice = (data.standardPrice != null)
          ? Number(data.standardPrice)
          : Number((words * 0.025).toFixed(2));

        const expressPrice = (data.expressPrice != null)
          ? Number(data.expressPrice)
          : Number((words * 0.05).toFixed(2));

        wordCountEl.textContent = String(words);

        standardBox.innerHTML = `
          <div class="row">
            <span>Standard</span>
            <span>$${standardPrice.toFixed(2)}</span>
          </div>
          <div class="small">Regular turnaround • Best value</div>
        `;
        standardBox.onclick = () => goPay("standard", standardPrice.toFixed(2));

        expressBox.innerHTML = `
          <div class="row">
            <span>Express</span>
            <span>$${expressPrice.toFixed(2)}</span>
          </div>
          <div class="small">Faster turnaround • Priority handling</div>
        `;
        expressBox.onclick = () => goPay("express", expressPrice.toFixed(2));

        pricingSection.style.display = "block";
        statusText.textContent = "Choose a service to proceed to payment.";
      }
      catch(err){
        console.error(err);
        showError("Network/server error. Confirm backend is reachable.");
        statusText.textContent = "Failed to get quote.";
      }
      finally{
        quoteBtn.disabled = false;
      }
    }

    quoteBtn.addEventListener("click", getQuote);
  </script>
</body>
</html>
