<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Request Translation — SayBon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Inter", sans-serif;
  background: #f6f8fb;
  color: #1e293b;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 24px;
}

.hero {
  margin-bottom: 40px;
}

.hero h1 {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 14px;
}

.hero p {
  font-size: 15px;
  color: #64748b;
  max-width: 600px;
  line-height: 1.6;
}

.badges {
  margin-top: 18px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.badge {
  background: #e2e8f0;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.upload-box {
  border: 2px dashed #cbd5e1;
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  margin-bottom: 30px;
  background: #f8fafc;
}

.upload-box input {
  margin-top: 15px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.full {
  grid-column: span 2;
}

label {
  font-size: 13px;
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
  color: #475569;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  font-family: inherit;
  font-size: 14px;
}

textarea {
  resize: vertical;
  min-height: 90px;
}

.pricing {
  margin-top: 25px;
  padding: 20px;
  background: #f1f5f9;
  border-radius: 12px;
}

.pricing p {
  font-size: 14px;
  margin-bottom: 8px;
}

.price-amount {
  font-size: 20px;
  font-weight: 700;
  color: #0f172a;
}

button {
  margin-top: 25px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  background: #0f172a;
  color: white;
  transition: 0.2s;
}

button:hover {
  background: #1e293b;
}

.status {
  margin-top: 15px;
  font-size: 14px;
}

@media(max-width: 900px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
  .full {
    grid-column: span 1;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>Request a Professional Translation</h1>
    <p>
      Secure, confidential French ↔ English translation delivered with accuracy,
      cultural intelligence, and rigorously vetted language experts.
    </p>

    <div class="badges">
      <div class="badge">100% Confidential</div>
      <div class="badge">Vetted Professionals</div>
      <div class="badge">Standard & Express Options</div>
    </div>
  </div>

  <div class="card">

    <div class="upload-box">
      <strong>Upload Your Document</strong>
      <div>
        <input type="file" id="fileInput" />
      </div>
      <div id="uploadStatus" class="status"></div>
    </div>

    <div class="form-grid">

      <div>
        <label>Service Speed</label>
        <select id="serviceType">
          <option value="0.025">Standard — $0.025 / word</option>
          <option value="0.05">Express — $0.05 / word</option>
        </select>
      </div>

      <div>
        <label>Word Count</label>
        <input type="number" id="wordCount" placeholder="Enter word count">
      </div>

      <div>
        <label>Source Language</label>
        <select>
          <option>French</option>
          <option>English</option>
        </select>
      </div>

      <div>
        <label>Target Language</label>
        <select>
          <option>English</option>
          <option>French</option>
        </select>
      </div>

      <div class="full">
        <label>Additional Notes</label>
        <textarea placeholder="Any specific instructions..."></textarea>
      </div>

    </div>

    <div class="pricing">
      <p>Estimated Price</p>
      <div class="price-amount" id="priceDisplay">$0.00</div>
    </div>

    <button id="submitBtn">Submit Translation Request</button>

  </div>

</div>

<!-- FIREBASE PRODUCTION SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
  authDomain: "saybon-3e3c2.firebaseapp.com",
  projectId: "saybon-3e3c2",
  storageBucket: "saybon-3e3c2.firebasestorage.app",
  messagingSenderId: "75085012344",
  appId: "1:75085012344:web:0b18581cb0a30c3df47c8d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);

const fileInput = document.getElementById("fileInput");
const uploadStatus = document.getElementById("uploadStatus");
const wordCount = document.getElementById("wordCount");
const serviceType = document.getElementById("serviceType");
const priceDisplay = document.getElementById("priceDisplay");

let currentUser = null;

// AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    sessionStorage.setItem("saybon_next", "/translation/request.html");
    window.location.href = "/loader.html";
  } else {
    currentUser = user;
  }
});

// WORD COUNT PRICE CALC
function updatePrice() {
  const words = parseInt(wordCount.value) || 0;
  const rate = parseFloat(serviceType.value);
  const total = words * rate;
  priceDisplay.innerText = "$" + total.toFixed(2);
}

wordCount.addEventListener("input", updatePrice);
serviceType.addEventListener("change", updatePrice);

// FILE UPLOAD
fileInput.addEventListener("change", async (e) => {
  if (!currentUser) return;

  const file = e.target.files[0];
  if (!file) return;

  uploadStatus.innerText = "Uploading securely...";

  const fileRef = ref(
    storage,
    `translations/${currentUser.uid}/${Date.now()}-${file.name}`
  );

  try {
    await uploadBytes(fileRef, file);
    uploadStatus.innerText = "Upload successful ✔";
  } catch (err) {
    uploadStatus.innerText = "Upload failed ❌";
  }
});

</script>

</body>
</html>
