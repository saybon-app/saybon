<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SayBon Request</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

</head>

<body>

<input type="file" id="file">

<button onclick="calculate()">UPLOAD</button>

<div id="words">WORDS: 0</div>

<button onclick="goPayment('standard')" id="standard">STANDARD</button>

<button onclick="goPayment('express')" id="express">EXPRESS</button>

<script>

let storedWords=0;

async function calculate(){

let file=document.getElementById("file").files[0];

if(!file)return;

let words=0;

if(file.name.endsWith(".pdf")){

const pdf=await pdfjsLib.getDocument(await file.arrayBuffer()).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i);

let content=await page.getTextContent();

text+=content.items.map(s=>s.str).join(" ");

}

words=text.split(/\s+/).length;

}

else if(file.name.endsWith(".docx")){

let result=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});

words=result.value.split(/\s+/).length;

}

else{

let text=await file.text();

words=text.split(/\s+/).length;

}

storedWords=words;

document.getElementById("words").innerText="WORDS: "+words;

document.getElementById("standard").innerText="STANDARD $"+(words*0.025).toFixed(2);

document.getElementById("express").innerText="EXPRESS $"+(words*0.05).toFixed(2);

}

function goPayment(plan){

location.href="/translation/payment.html?plan="+encodeURIComponent(plan)+"&words="+encodeURIComponent(storedWords);

}

</script>

</body>
</html>
