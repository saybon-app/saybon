<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Manrope;
background:#f1f5f9;
margin:0;
display:flex;
justify-content:center;
padding:40px 15px;
color:#0f172a;
}


/* MAIN WRAPPER */

.wrapper{

width:100%;
max-width:520px;
background:white;
border-radius:18px;
padding:30px;
box-shadow:
0 10px 30px rgba(0,0,0,0.08);

position:relative;

}



/* QR */

.qr{

position:absolute;
top:20px;
left:20px;

}

.qr img{

width:70px;

}



/* HEADER */

h1{

font-size:26px;
font-weight:600;
margin-top:40px;
margin-bottom:20px;

}



/* TRUST */

.trust{

display:flex;
flex-wrap:wrap;
gap:15px;
font-size:14px;
color:#64748b;
margin-bottom:25px;

}

.dot{

width:7px;
height:7px;
background:#10b981;
border-radius:50%;
display:inline-block;
margin-right:6px;

}



/* PRICING CARD */

.pricing{

border:1px solid #e2e8f0;
padding:20px;
border-radius:14px;
margin-bottom:25px;

}

.pricing h2{

font-size:18px;
margin-bottom:15px;

}

.row{

display:flex;
justify-content:space-between;
margin-bottom:12px;

}

.standard{

color:#059669;
font-weight:600;

}

.express{

color:#dc2626;
font-weight:600;

}

.small{

font-size:13px;
color:#64748b;

}



/* UPLOAD */

.upload button{

width:100%;
padding:14px;
background:#0f172a;
color:white;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;

}

input{

display:none;

}



/* QUOTE */

.quote{

display:none;
margin-top:20px;
background:#ecfeff;
padding:20px;
border-radius:12px;

}

.submit{

display:none;
margin-top:15px;

}

.submit button{

width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;

}


</style>

</head>

<body>


<div class="wrapper">


<div class="qr">

<img src="/assets/images/saybon-qr.png">

</div>



<h1>SayBon Translation Services</h1>



<div class="trust">

<div><span class="dot"></span>Human translated</div>

<div><span class="dot"></span>Certification-ready quality</div>

<div><span class="dot"></span>Confidential & secure</div>

</div>



<div class="pricing">

<h2>Pricing & Delivery</h2>


<div class="row">

<div>

<div class="standard">Standard</div>

<div class="small">

Delivery: 24–48 hrs

</div>

</div>

<div class="standard">$0.025 / word</div>

</div>



<div class="row">

<div>

<div class="express">Express</div>

<div class="small">

Delivery: 6–24 hrs

</div>

</div>

<div class="express">$0.05 / word</div>

</div>


</div>



<div class="upload">

<input type="file" id="file">

<button onclick="chooseFile()">

Upload Document to Get Quote

</button>

</div>



<div class="quote" id="quoteBox">

<h3>Quote</h3>

<div id="quoteText"></div>

</div>



<div class="submit" id="submitBox">

<button onclick="submitJob()">

Continue to Submit Job

</button>

</div>


</div>


<script>


let fileText=""
let wordCount=0
let price=0
let delivery=""


function chooseFile(){

document.getElementById("file").click()

}



document.getElementById("file")
.addEventListener("change", async function(){


const file=this.files[0]

if(!file)return


fileText=await file.text()


wordCount=fileText.trim().split(/\s+/).length


price=(wordCount*0.025).toFixed(2)



/* DELIVERY LOGIC */

if(wordCount<=2000)

delivery="24 hours"

else if(wordCount<=5000)

delivery="48 hours"

else

delivery="3–4 days"



document.getElementById("quoteBox")
.style.display="block"


document.getElementById("submitBox")
.style.display="block"



document.getElementById("quoteText")
.innerHTML=

"Word Count: <b>"+wordCount+"</b><br><br>"+

"Price: <b>$"+price+"</b><br><br>"+

"Estimated Delivery: <b>"+delivery+"</b>"


})



async function submitJob(){


await fetch(

"https://saybon-production.up.railway.app/upload",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

text:fileText

})

})


alert("Job submitted successfully")


window.location.href="/dashboard/"


}


</script>


</body>
</html>
