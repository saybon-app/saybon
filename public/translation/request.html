<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Secure Translation Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Manrope;
background:#020617;
color:white;
margin:0;
padding:40px;
}


/* CONTAINER */

.container{

max-width:900px;
margin:auto;

}


/* HEADER */

.header{

margin-bottom:20px;

}

.header h2{

font-weight:500;

}


/* EDITOR */

textarea{

width:100%;
height:320px;

background:black;

color:white;

border:1px solid #334155;

border-radius:10px;

padding:20px;

font-size:16px;

outline:none;

resize:none;

}


/* CERTIFY */

.certify{

margin-top:15px;

font-size:14px;

color:#94a3b8;

}


/* BUTTON */

button{

margin-top:20px;

width:100%;

padding:14px;

background:#2563eb;

border:none;

border-radius:8px;

color:white;

font-size:16px;

cursor:pointer;

}


/* KEYBOARD */

.keyboard{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

background:black;

padding:10px;

border-radius:10px;

border:1px solid #334155;

display:none;

}


.key{

display:inline-block;

padding:10px 14px;

margin:4px;

border:1px solid #334155;

border-radius:6px;

cursor:pointer;

}


.key:hover{

background:#2563eb;

}


/* OVERLAY */

.overlay{

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

background:black;

display:none;

align-items:center;

justify-content:center;

font-size:24px;

}


</style>

</head>

<body>

<div class="overlay" id="overlay">

Screen capture disabled

</div>


<div class="container">

<div class="header">

<h2>Secure Translation Editor</h2>

<p>

Complete your translation below.

All activity is monitored.

</p>

</div>


<textarea id="editor"></textarea>


<div class="certify">

<input type="checkbox" id="nda">

I certify this translation was completed personally and confidentially.

</div>


<button onclick="submit()">

Submit Translation

</button>


</div>



<!-- KEYBOARD -->

<div class="keyboard" id="keyboard">

<span class="key">é</span>

<span class="key">è</span>

<span class="key">ê</span>

<span class="key">à</span>

<span class="key">ç</span>

<span class="key">ù</span>

<span class="key">ô</span>

<span class="key">î</span>

</div>




<script>


const editor = document.getElementById("editor");

const keyboard = document.getElementById("keyboard");



/* =======================
SECURITY LOCKS
======================= */


/* DISABLE COPY */

editor.oncopy = e => e.preventDefault();

editor.oncut = e => e.preventDefault();

editor.onpaste = e => e.preventDefault();



/* DISABLE RIGHT CLICK */

document.oncontextmenu = e => e.preventDefault();



/* DISABLE SELECT */

document.onselectstart = e => e.preventDefault();



/* DISABLE DEV TOOLS */

document.onkeydown = function(e){

if(

e.key=="F12" ||

(e.ctrlKey && e.shiftKey && e.key=="I") ||

(e.ctrlKey && e.key=="u")

){

return false;

}

};



/* SCREENSHOT PROTECTION */

document.addEventListener("visibilitychange",()=>{

if(document.hidden){

document.getElementById("overlay").style.display="flex";

}

else{

document.getElementById("overlay").style.display="none";

}

});



/* =======================
ACCENT KEYBOARD
======================= */


editor.addEventListener("focus",()=>{

keyboard.style.display="block";

});


document.querySelectorAll(".key")

.forEach(key=>{

key.onclick=()=>{

insert(key.innerText);

};

});



function insert(text){

const start = editor.selectionStart;

editor.value =

editor.value.slice(0,start)

+ text +

editor.value.slice(start);

}



/* =======================
AUTO ACCENT
======================= */


const dict = {

francais:"français",

etre:"être",

deja:"déjà",

eleve:"élève"

};



editor.addEventListener("input",()=>{

let words = editor.value.split(" ");

let last = words.pop();

if(dict[last]){

words.push(dict[last]);

editor.value = words.join(" ");

}

});



/* =======================
TRACK WORK TIME
======================= */


let startTime = Date.now();



/* =======================
SUBMIT
======================= */


async function submit(){


if(!nda.checked){

alert("You must certify");

return;

}



let workTime = Date.now() - startTime;


if(workTime < 60000){

alert("Work time too short");

return;

}



await fetch(

"https://saybon-production.up.railway.app/submit",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

translator:"demo",

translation:editor.value,

ndaSigned:true,

jobId:1

})

});



alert("Submitted");


}


</script>

</body>
</html>
