<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
  <title>SayBon Translation Request</title>
  <link rel="stylesheet" href="/css/request.css" />
  <link rel="stylesheet" href="/css/page-transition.css" />
  <script type="module" src="/js/nav-engine.js"></script>
</head>
<body>

<div class="request-shell">
  <div class="request-card">
    <h1>Translation Request</h1>
    <p>Upload your file, generate your quote, and proceed to payment.</p>

    <div style="margin:20px 0;">
      <input type="file" id="fileInput" />
    </div>

    <div style="margin:12px 0;">
      <input id="clientEmail" type="email" placeholder="Your email" style="width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;" />
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;">
      <input id="sourceLanguage" type="text" placeholder="Source language (e.g. English)" style="padding:12px;border-radius:12px;border:1px solid #ddd;" />
      <input id="targetLanguage" type="text" placeholder="Target language (e.g. French)" style="padding:12px;border-radius:12px;border:1px solid #ddd;" />
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;">
      <button id="standardBtn">Standard</button>
      <button id="expressBtn">Express</button>
    </div>

    <div id="quoteBox" style="display:none;margin-top:24px;padding:20px;border-radius:18px;background:rgba(255,255,255,0.8);backdrop-filter:blur(16px);box-shadow:0 10px 30px rgba(0,0,0,0.08);">
      <h3>Your Quote</h3>
      <p><strong>Words:</strong> <span id="wordCount">0</span></p>
      <p><strong>Plan:</strong> <span id="planLabel">Standard</span></p>
      <p><strong>Price:</strong> $<span id="priceLabel">0.00</span></p>
      <p><strong>Delivery:</strong> <span id="timelineLabel">-</span></p>
      <button id="continueBtn" style="margin-top:16px;">Continue to Payment</button>
    </div>

    <p id="status" style="margin-top:18px;"></p>
  </div>
</div>

<script src="/js/request.js"></script>
</body>
</html>
