<!DOCTYPE html>
<html>
<head>

<title>SayBon Translation Services</title>

<style>

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;

background:linear-gradient(to bottom,#cfe8ff,#eaf4ff);

text-align:center;

padding:40px;

}

.card{

background:white;

padding:25px;

border-radius:16px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

display:inline-block;

}

button{

background:linear-gradient(45deg,#3b5bff,#5f7bff);

border:none;

color:white;

padding:12px 20px;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.quoteCard{

padding:15px;

margin:10px;

border-radius:12px;

cursor:pointer;

transition:.3s;

}

.quoteCard:hover{

transform:scale(1.05);

}

.standard{

border:2px solid green;

}

.express{

border:2px solid red;

}

</style>

</head>

<body>

<h1>SayBon Translation Services</h1>

<div class="card">

<input type="file" id="file">

<br><br>

<button id="uploadBtn">

Upload Document To Get Quote

</button>

<div id="quote"></div>

</div>


<script>


const btn=document.getElementById("uploadBtn");

btn.onclick=function(){

const file=document.getElementById("file").files[0];

if(!file){

alert("Please select file");

return;

}


showGetting();

setTimeout(generateQuote,2000);

};



function showGetting(){

let dots=0;

btn.disabled=true;

const interval=setInterval(()=>{

dots++;

if(dots>3)dots=0;

btn.innerText="Getting Quote"+ ".".repeat(dots);

},500);


setTimeout(()=>{

clearInterval(interval);

btn.innerText="See Quote 👇🏽";

},2000);


setTimeout(()=>{

btn.innerText="Upload Document To Get Quote";

btn.disabled=false;

},7000);

}


function generateQuote(){

const words=1500;

const standard=words*0.025;

const express=words*0.05;


document.getElementById("quote").innerHTML=

<div>

 words

</div>


<div class="quoteCard standard"

onclick="pay('standard',,,'6-12 hrs')">

Standard

<br>

deploy{standard}

<br>

6-12 hrs

</div>


<div class="quoteCard express"

onclick="pay('express',,,'3-6 hrs')">

Express

<br>

deploy{express}

<br>

3-6 hrs

</div>

;

}



function pay(type,words,amount,time){

localStorage.setItem("paymentData",

JSON.stringify({

type,

words,

amount,

time

}));

window.location.href="payment.html";

}



</script>

</body>

</html>
