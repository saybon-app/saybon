<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SayBon Translation</title>

<style>

body{
font-family:Arial;
background:#eef3f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:340px
}

button{
width:100%;
padding:12px;
background:#6fa4c7;
border:none;
color:white;
border-radius:6px;
margin-top:20px
}

</style>

</head>

<body>

<div class="card">

<h2>SayBon Translation</h2>

<input type="number" id="words" placeholder="Word count">

<select id="plan">

<option value="standard">Standard</option>
<option value="express">Express</option>

</select>

<button id="createJob">Create Job</button>

</div>

<script>

document.getElementById("createJob").onclick = async ()=>{

const words = Number(document.getElementById("words").value)

const plan = document.getElementById("plan").value

const rate = plan==="express"?0.05:0.025

const price = words * rate

const res = await fetch(

"https://saybon-server.onrender.com/api/createJob",

{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
words,
plan,
price
})
})

const data = await res.json()

window.location =
"/translation/job.html?jobCode="+data.jobCode

}

</script>

</body>

</html>
