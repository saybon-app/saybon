<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>


body{

margin:0;

font-family:Inter;

background:
linear-gradient(
135deg,
#667eea,
#764ba2,
#f093fb,
#f5576c
);

padding:40px;

}


.main{

background:white;

border-radius:20px;

padding:40px;

max-width:1100px;

margin:auto;

box-shadow:0 50px 100px rgba(0,0,0,0.2);

}


/* HEADER */

.header{

text-align:center;

margin-bottom:30px;

}

.header h1{

margin:0;

font-size:32px;

}

.header p{

font-size:12px;

color:#555;

letter-spacing:1px;

}


/* GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

}


/* DROPZONE */

.dropzone{

border:2px dashed #ccc;

border-radius:20px;

padding:50px;

text-align:center;

cursor:pointer;

transition:.3s;

}

.dropzone.drag{

background:#f0f4ff;

border-color:#667eea;

}


.fileList{

margin-top:20px;

}


.fileItem{

background:#f7f7f7;

padding:10px;

border-radius:10px;

margin-top:10px;

display:flex;

justify-content:space-between;

align-items:center;

}


/* BUTTON */

.btn{

margin-top:20px;

background:
linear-gradient(
90deg,
#667eea,
#764ba2
);

color:white;

border:none;

padding:14px 30px;

border-radius:10px;

font-weight:600;

cursor:pointer;

}

.btn:hover{

transform:translateY(-2px);

}

.btn:active{

transform:scale(.96);

}


/* PRICES */

.price{

background:#fff;

border-radius:14px;

padding:20px;

margin-bottom:20px;

cursor:pointer;

transition:.3s;

}

.standard{

border:2px solid #16a34a;

}

.express{

border:2px solid #dc2626;

}

.price:hover{

transform:translateY(-4px);

box-shadow:0 20px 40px rgba(0,0,0,0.2);

}


/* QUOTE */

.quote{

display:none;

margin-top:30px;

background:#fff;

padding:20px;

border-radius:14px;

border:2px solid #667eea;

animation:slide .4s;

}

@keyframes slide{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:none;

}

}


</style>

</head>


<body>


<div class="main">


<div class="header">

<h1>SayBon Translation Services</h1>

<p>

TRANSLATED BY EXPERTS • QUICK DELIVERY • SECURE • CONFIDENTIAL

</p>

</div>


<div class="grid">


<!-- LEFT -->

<div>


<div
class="dropzone"
id="dropzone"
onclick="file.click()"
>

Drop file to upload

<input
type="file"
id="file"
hidden
>

</div>


<div
class="fileList"
id="fileList"
></div>


<button
class="btn"
onclick="upload()"
>

Upload Document To Get Quote

</button>


</div>



<!-- RIGHT -->

<div>


<div
class="price standard"
onclick="pay('standard')"
>

Standard — $0.025 / word

</div>


<div
class="price express"
onclick="pay('express')"
>

Express — $0.05 / word

</div>


</div>


</div>



<div
class="quote"
id="quote"
>

<h3>Quote</h3>

<p id="quoteText"></p>

</div>



</div>



<script>


let selectedFile



file.onchange=()=>{

selectedFile=file.files[0]

showFile()

}



dropzone.ondragover=e=>{

e.preventDefault()

dropzone.classList.add("drag")

}


dropzone.ondragleave=()=>{

dropzone.classList.remove("drag")

}


dropzone.ondrop=e=>{

e.preventDefault()

dropzone.classList.remove("drag")

selectedFile=e.dataTransfer.files[0]

showFile()

}



function showFile(){

fileList.innerHTML=

`

<div class=fileItem>

${selectedFile.name}

<span onclick="remove()">✕</span>

</div>

`

}



function remove(){

selectedFile=null

fileList.innerHTML=""

}



async function upload(){


let form=new FormData()

form.append("file",selectedFile)


let res=await fetch(

"https://saybon-backend.onrender.com/api/quote",

{

method:"POST",

body:form

})


let data=await res.json()


quote.style.display="block"


quoteText.innerHTML=

"Standard: $"+data.standard+
"<br>Express: $"+data.express

}


function pay(type){

window.location="payment.html?type="+type

}


</script>


</body>

</html>
