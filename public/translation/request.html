<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Manrope;
background:#f8fafc;
margin:0;
color:#0f172a;
}


/* QR */

.qr{
position:absolute;
top:20px;
left:20px;
}

.qr img{
width:65px;
}


/* HEADER */

.header{
padding:80px 25px 20px 25px;
}

.header h1{
font-size:26px;
font-weight:600;
margin-bottom:15px;
}


/* TRUST */

.trust{
display:flex;
gap:20px;
font-size:14px;
color:#64748b;
}

.dot{
width:7px;
height:7px;
background:#10b981;
border-radius:50%;
display:inline-block;
margin-right:6px;
}


/* CONTAINER */

.container{
padding:25px;
}


/* PRICING */

.pricing{
background:white;
border-radius:14px;
padding:25px;
border:1px solid #e2e8f0;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
}

.pricing h2{
font-size:18px;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.standard{
color:#059669;
font-weight:600;
}

.express{
color:#dc2626;
font-weight:600;
}

.price{
font-weight:600;
}

.small{
font-size:13px;
color:#64748b;
}


/* UPLOAD */

.upload{
margin-top:30px;
}

.upload button{
width:100%;
padding:14px;
background:#0f172a;
color:white;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.upload input{
display:none;
}


/* QUOTE */

.quote{
margin-top:20px;
display:none;
background:#ecfeff;
padding:20px;
border-radius:10px;
}

.submit{
display:none;
margin-top:15px;
}

.submit button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

</style>

</head>


<body>


<div class="qr">
<img src="/assets/images/saybon-qr.png">
</div>



<div class="header">

<h1>SayBon Translation Services</h1>

<div class="trust">

<div>
<span class="dot"></span>
Human translated
</div>

<div>
<span class="dot"></span>
Certification-ready quality
</div>

<div>
<span class="dot"></span>
Confidential & secure
</div>

</div>

</div>



<div class="container">


<div class="pricing">

<h2>Pricing & Delivery</h2>

<div class="row">

<div>

<div class="standard">Standard</div>

<div class="small">
Delivery: 24–48 hours
</div>

</div>

<div class="price">$0.025 / word</div>

</div>


<div class="row">

<div>

<div class="express">Express</div>

<div class="small">
Delivery: 6–24 hours
</div>

</div>

<div class="price express">$0.05 / word</div>

</div>

</div>



<div class="upload">

<input type="file" id="file">

<button onclick="selectFile()">

Upload Document to Get Quote

</button>

</div>



<div class="quote" id="quote">

<h3>Quote</h3>

<div id="quoteText"></div>

</div>



<div class="submit" id="submit">

<button onclick="submitJob()">

Continue to Submit Job

</button>

</div>



</div>



<script>


let fileText=""
let wordCount=0
let price=0



function selectFile(){

document.getElementById("file").click()

}



document.getElementById("file").addEventListener("change", async function(){

const file=this.files[0]

if(!file)return


const text=await file.text()

fileText=text


wordCount=text.split(/\s+/).length


price=(wordCount*0.025).toFixed(2)


document.getElementById("quote").style.display="block"

document.getElementById("submit").style.display="block"


document.getElementById("quoteText").innerHTML=

"Words: "+wordCount+"<br>"+
"Price: $"+price+"<br>"+
"Delivery: 24-48 hours"


})




async function submitJob(){


const response=await fetch(

"https://saybon-production.up.railway.app/upload",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

text:fileText

})

})



const result=await response.json()



alert("Job submitted successfully")


window.location.href="/dashboard/"


}



</script>



</body>
</html>
