<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
color:#6e6e73;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
display:flex;
gap:40px;
justify-content:center;
}

.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:420px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d2d2d7;
margin-top:6px;
margin-bottom:18px;
font-size:14px;
}

button{
padding:10px 18px;
border-radius:10px;
border:none;
background:#1d1d1f;
color:white;
cursor:pointer;
}

.quote{
border:1px solid #d2d2d7;
padding:18px;
border-radius:14px;
margin-top:12px;
cursor:pointer;
}

.express{
border-color:#ff6b6b;
}

.small{
font-size:13px;
color:#8e8e93;
margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<input type="file" id="fileInput">
<button onclick="processFile()">UPLOAD</button>

<div class="small">
Minimum order: 100 words. Documents under 100 words are billed as 100 words.
</div>

<h3 id="wordCount">WORDS: 0</h3>

<label>Customer Email</label>
<input id="email" placeholder="your@email.com">

<label>Translate Into</label>
<select id="targetLang">
<option value="English">English</option>
<option value="French">French</option>
</select>

<div id="quoteArea" style="display:none">

<div class="quote" onclick="pay('standard')">
<strong>STANDARD</strong>
<div id="standardPrice"></div>
<div class="small">Delivery: 1–3 hrs</div>
</div>

<div class="quote express" onclick="pay('express')">
<strong>EXPRESS</strong>
<div id="expressPrice"></div>
<div class="small">Delivery: 30–60 mins</div>
</div>

</div>

</div>

</div>

<script>

function processFile(){

const file=document.getElementById("fileInput").files[0]

if(!file)return

const reader=new FileReader()

reader.onload=function(e){

const text=e.target.result

let words=text.trim().split(/\s+/).length

if(words<100)words=100

document.getElementById("wordCount").innerText="WORDS: "+words

const standard=(words*0.025).toFixed(2)
const express=(words*0.05).toFixed(2)

document.getElementById("standardPrice").innerText="$"+standard
document.getElementById("expressPrice").innerText="$"+express

document.getElementById("quoteArea").style.display="block"

}

reader.readAsText(file)

}

function pay(type){
alert("Stripe checkout will open here")
}

</script>

</body>
</html>
