<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SayBon Translation Services</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
display:flex;
gap:40px;
}

.card{
background:white;
padding:30px;
border-radius:16px;
width:420px;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
}

button{
background:#2c2c2c;
color:white;
padding:10px 20px;
border-radius:10px;
border:none;
cursor:pointer;
}

.quote{
border:1px solid #ccc;
border-radius:12px;
padding:16px;
margin-top:10px;
cursor:pointer;
}

.express{
border-color:#ff6b6b;
}

.small{
font-size:13px;
color:#777;
margin-bottom:15px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<input type="file" id="fileInput">
<button onclick="processFile()">UPLOAD</button>

<div class="small">
Minimum order: 100 words. Documents under 100 words are billed as 100 words.
</div>

<h3 id="wordCount">WORDS: 0</h3>

<label>Customer Email</label>
<input placeholder="your@email.com">

<label>Translate Into</label>
<select>
<option>English</option>
<option>French</option>
</select>

<div id="quotes" style="display:none">

<div class="quote" id="standard">
<strong>STANDARD</strong>
<div id="standardPrice"></div>
<div class="small">Delivery: 1–3 hrs</div>
</div>

<div class="quote express">
<strong>EXPRESS</strong>
<div id="expressPrice"></div>
<div class="small">Delivery: 30–60 mins</div>
</div>

</div>

</div>

</div>

<script>

function processFile(){

const file=document.getElementById("fileInput").files[0]

if(!file)return

const reader=new FileReader()

reader.onload=function(e){

let words=e.target.result.trim().split(/\s+/).length

if(words<100)words=100

document.getElementById("wordCount").innerText="WORDS: "+words

document.getElementById("standardPrice").innerText="$"+(words*0.025).toFixed(2)
document.getElementById("expressPrice").innerText="$"+(words*0.05).toFixed(2)

document.getElementById("quotes").style.display="block"

}

reader.readAsText(file)

}

</script>

</body>
</html>
