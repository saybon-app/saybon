<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<style>

/* YOUR DESIGN — UNTOUCHED */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
color:#6e6e73;
}

*{
-webkit-tap-highlight-color: transparent;
}

a{
text-decoration:none !important;
color:inherit !important;
}

a:visited{
text-decoration:none !important;
color:inherit !important;
}

h1{
text-align:center;
margin-top:40px;
letter-spacing:3px;
color:#3a3a3c;
}

.sub{
text-align:center;
margin-bottom:40px;
font-size:14px;
letter-spacing:2px;
color:#6e6e73;
white-space:nowrap;
}

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:20px;
}

.glass{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(20px);
border-radius:30px;
padding:30px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.uploadRow{
display:flex;
gap:10px;
margin-bottom:15px;
}

.uploadBtn{
background:#1e8e8e;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

.words{
margin:15px 0;
font-weight:600;
}

.quote{
padding:15px;
border-radius:12px;
margin-bottom:15px;
cursor:pointer;
color:#6e6e73;
}

.standard{
border:2px solid #34a853;
}

.express{
border:2px solid #ea4335;
}

table{
width:100%;
border-collapse:collapse;
color:#6e6e73;
}

th,td{
border:1px solid #d0d0d0;
padding:10px;
text-align:left;
color:#6e6e73;
}

th.standardHead{
color:#34a853;
}

th.expressHead{
color:#ea4335;
}

</style>

</head>

<body>

<h1>SAYBON TRANSLATION SERVICES</h1>

<div class="sub">
TRANSLATED BY EXPERTS • QUICK DELIVERY • CONFIDENTIAL
</div>

<div class="container">

<div class="glass">

<div class="uploadRow">

<input type="file" id="file">

<button class="uploadBtn" onclick="calculate()">
UPLOAD
</button>

</div>

<div class="words" id="wordCount">
WORDS: 0
</div>

<div class="quote standard"
id="standardQuote"
onclick="goPayment('standard')">
STANDARD
</div>

<div class="quote express"
id="expressQuote"
onclick="goPayment('express')">
EXPRESS
</div>

</div>

</div>


<!-- ADD ONLY THESE LIBRARIES (no design change) -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>


<script>

/* KEEP YOUR EXISTING FUNCTIONS */

let storedWords=0;

function timelineStandard(words){
if(words<=300) return "1–3 hrs";
if(words<=1000) return "3–6 hrs";
if(words<=3000) return "6–12 hrs";
if(words<=6000) return "12–24 hrs";
if(words<=10000) return "24–48 hrs";
if(words<=20000) return "2–4 days";
return "Custom";
}

function timelineExpress(words){
if(words<=300) return "30–60 mins";
if(words<=1000) return "1–3 hrs";
if(words<=3000) return "3–6 hrs";
if(words<=6000) return "6–12 hrs";
if(words<=10000) return "12–24 hrs";
if(words<=20000) return "24–48 hrs";
return "Custom";
}



/* ONLY THIS FUNCTION IS FIXED */

async function calculate(){

let file=document.getElementById("file").files[0];

if(!file) return;

let ext=file.name.split('.').pop().toLowerCase();

let text="";



if(ext==="txt"){

text=await file.text();

}



else if(ext==="pdf"){

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const pdf=await pdfjsLib.getDocument(await file.arrayBuffer()).promise;

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i);

const content=await page.getTextContent();

text+=content.items.map(i=>i.str).join(" ");

}

}



else if(ext==="docx"){

const result=
await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});

text=result.value;

}



storedWords=text.trim().split(/\s+/).length;



document.getElementById("wordCount").innerText=
"WORDS: "+storedWords;



document.getElementById("standardQuote").innerText=
"STANDARD $"+(storedWords*0.025).toFixed(2)
+" • "+timelineStandard(storedWords);



document.getElementById("expressQuote").innerText=
"EXPRESS $"+(storedWords*0.05).toFixed(2)
+" • "+timelineExpress(storedWords);

}



function goPayment(plan){

window.location.href=
"/translation/payment.html?plan="
+plan+
"&words="
+storedWords;

}

</script>


</body>
</html>
