<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Request Translation</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Manrope",sans-serif;
background:#0b1220;
color:#e2e8f0;
padding:60px;
}

.container{
max-width:700px;
margin:auto;
}

textarea{
width:100%;
height:200px;
background:#020617;
border:1px solid #334155;
border-radius:8px;
padding:15px;
color:white;
font-size:15px;
resize:none;
}

button{
margin-top:20px;
padding:12px 24px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* Accent helper */

.accent-bar{

margin-top:10px;

display:flex;

flex-wrap:wrap;

gap:6px;

}

.accent-btn{

background:#020617;

border:1px solid #334155;

padding:6px 10px;

border-radius:6px;

cursor:pointer;

font-size:14px;

}

.accent-btn:hover{

background:#1e293b;

}

.status{

margin-top:20px;

font-size:14px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="container">

<h2>Submit Text for Translation</h2>


<textarea id="text" placeholder="Paste your text here..."></textarea>


<!-- FRENCH ACCENTS HELPER -->

<div class="accent-bar">

<span class="accent-btn" onclick="insertAccent('é')">é</span>

<span class="accent-btn" onclick="insertAccent('è')">è</span>

<span class="accent-btn" onclick="insertAccent('ê')">ê</span>

<span class="accent-btn" onclick="insertAccent('ë')">ë</span>

<span class="accent-btn" onclick="insertAccent('à')">à</span>

<span class="accent-btn" onclick="insertAccent('â')">â</span>

<span class="accent-btn" onclick="insertAccent('î')">î</span>

<span class="accent-btn" onclick="insertAccent('ï')">ï</span>

<span class="accent-btn" onclick="insertAccent('ô')">ô</span>

<span class="accent-btn" onclick="insertAccent('ù')">ù</span>

<span class="accent-btn" onclick="insertAccent('û')">û</span>

<span class="accent-btn" onclick="insertAccent('ç')">ç</span>

<span class="accent-btn" onclick="insertAccent('œ')">œ</span>

<span class="accent-btn" onclick="insertAccent('æ')">æ</span>

</div>


<button onclick="submitText()">Submit</button>

<div class="status" id="status"></div>

</div>



<script>


function insertAccent(char){

const textarea=document.getElementById("text");

const start=textarea.selectionStart;

const end=textarea.selectionEnd;

const text=textarea.value;

textarea.value=text.substring(0,start)+char+text.substring(end);

textarea.focus();

textarea.selectionStart=textarea.selectionEnd=start+1;

}




async function submitText(){

const text=document.getElementById("text").value;

const status=document.getElementById("status");

status.innerText="Submitting...";


const response=await fetch(

"https://saybon-production.up.railway.app/upload",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({text})

}

);


const data=await response.json();

if(data.success){

status.innerText="Translation job created successfully.";

}

else{

status.innerText="Error creating job.";

}

}


</script>

</body>
</html>
