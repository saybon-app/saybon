<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SayBon Translation Request</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Manrope;
background:#0b1220;
color:#e2e8f0;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
position:relative;
}

.qr{
position:absolute;
top:20px;
left:20px;
width:60px;
}

h1{
text-align:center;
font-weight:500;
margin-top:60px;
}

.badge{
background:#111827;
padding:15px;
border-radius:10px;
margin-top:30px;
font-size:14px;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:12px;
margin-top:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card h3{
margin-top:0;
font-size:16px;
}

.quote-card{
border:2px solid #3b82f6;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-top:15px;
font-size:15px;
cursor:pointer;
}

.upload{
background:#3b82f6;
color:white;
}

.continue{
background:#16a34a;
color:white;
display:none;
}

.quote-result{
margin-top:15px;
font-size:16px;
font-weight:500;
}

</style>
</head>

<body>

<div class="container">

<img src="/assets/images/qr.png" class="qr">

<h1>Professional Translation Services</h1>


<div class="badge">

✔ Trusted by global institutions  
<br>
✔ Human verified accuracy  
<br>
✔ Confidential and secure  

</div>


<div class="card">

<h3>Why choose SayBon</h3>

<p>

Our translators undergo rigorous vetting, quality scoring, and competitive selection to ensure professional-grade results.

</p>

</div>



<div class="card quote-card">

<h3>Get Your Instant Quote</h3>

<input type="file" id="file">

<button class="upload" onclick="getQuote()">

Upload Document to Get Quote

</button>

<div id="quote" class="quote-result"></div>

<button id="continueBtn" class="continue" onclick="submitJob()">

Continue to Submit Job

</button>

</div>

</div>



<script>

let price=0;

function getQuote(){

const file=document.getElementById("file").files[0];

if(!file)return;

const words=file.size/6;

price=(words*0.08).toFixed(2);

document.getElementById("quote").innerHTML=

"Quote: $"+price;

document.getElementById("continueBtn").style.display="block";

}



async function submitJob(){

const file=document.getElementById("file").files[0];

const text=await file.text();

await fetch("/upload",{

method:"POST",

headers:{

"Content-Type":"application/json"
},

body:JSON.stringify({

text:text

})

});

alert("Job submitted successfully");

}

</script>


</body>
</html>
