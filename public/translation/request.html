<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SayBon Translation Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
background:linear-gradient(to bottom,#eef1f6,#e3e8f0);
color:#333;
}

h1{
text-align:center;
margin-top:40px;
letter-spacing:3px;
font-weight:500;
}

.sub{
text-align:center;
letter-spacing:2px;
font-size:12px;
margin-bottom:40px;
color:#666;
}

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}


.glass{

width:420px;
height:420px;

border-radius:28px;

background:rgba(255,255,255,.25);

backdrop-filter:blur(30px);

box-shadow:
0 8px 32px rgba(0,0,0,.15),
inset 0 0 20px rgba(255,255,255,.3);

padding:40px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}



/* PRICE CARD CONTAINER */


.price-wrap{

display:flex;
gap:20px;

justify-content:center;
align-items:center;

}



/* INDIVIDUAL PRICE CARDS */


.price-card{

width:170px;
height:240px;

border-radius:18px;

background:white;

padding:18px;

font-size:12px;

line-height:1.6;

}


.green{

border:2px solid #2e7d32;

}


.red{

border:2px solid #c62828;

}



/* MOBILE */


@media(max-width:900px){

.container{

flex-direction:column-reverse;
align-items:center;

}

}


</style>

</head>

<body>


<h1>SAYBON TRANSLATION SERVICES</h1>




</div>


</div>



</div>


</body>

</html>
