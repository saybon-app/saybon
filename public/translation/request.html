<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Manrope;
background:#f1f5f9;
display:flex;
justify-content:center;
padding:40px 15px;
}

.wrapper{

max-width:520px;
width:100%;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
position:relative;

}

#qrcode{

position:absolute;
top:20px;
left:20px;

}

h1{

margin-top:60px;
font-size:26px;

}

.trust{

display:flex;
gap:15px;
font-size:14px;
color:#64748b;
margin-bottom:25px;

}

.dot{

width:7px;
height:7px;
background:#10b981;
border-radius:50%;
display:inline-block;
margin-right:6px;

}

.card{

border:1px solid #e2e8f0;
padding:20px;
border-radius:14px;
margin-bottom:20px;

}

.row{

display:flex;
justify-content:space-between;
margin-bottom:8px;

}

.standard{

color:#059669;
font-weight:600;

}

.express{

color:#dc2626;
font-weight:600;

}

.timeline{

font-size:13px;
color:#475569;
margin-top:10px;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
cursor:pointer;

}

input{

display:none;

}

.quote{

display:none;
margin-top:20px;
background:#ecfeff;
padding:15px;
border-radius:12px;

}

.submit{

display:none;
margin-top:10px;

}

</style>

</head>

<body>


<div class="wrapper">

<div id="qrcode"></div>


<h1>SayBon Translation Services</h1>


<div class="trust">

<div><span class="dot"></span>Human translated</div>

<div><span class="dot"></span>Certification-ready</div>

<div><span class="dot"></span>Confidential & secure</div>

</div>


<div class="card">

<h3>Pricing & Delivery</h3>


<div class="row">

<div class="standard">Standard</div>

<div class="standard">$0.025 / word</div>

</div>


<div class="row">

<div class="express">Express</div>

<div class="express">$0.05 / word</div>

</div>


<div class="timeline">

Standard timelines:<br>

0-300 words: 1-3 hrs<br>
300-1000 words: 3-8 hrs<br>
1000-3000 words: 8-24 hrs<br>
3000-5000 words: 24-48 hrs<br>
5000+ words: 48-72 hrs

</div>


</div>



<input type="file" id="file">

<button onclick="pickFile()">

Upload Document to Get Quote

</button>



<div class="quote" id="quoteBox"></div>



<div class="submit" id="submitBox">

<button onclick="submitJob()">

Continue to Submit Job

</button>

</div>



</div>


<script>


new QRCode(

document.getElementById("qrcode"),

{

text:"https://saybonapp.com",

width:70,

height:70

}

)



let words=0

let price=0

let delivery=""


function pickFile(){

file.click()

}


file.onchange=async function(){

let text=await this.files[0].text()

words=text.trim().split(/\s+/).length

price=(words*0.025).toFixed(2)



if(words<=300) delivery="1-3 hrs"

else if(words<=1000) delivery="3-8 hrs"

else if(words<=3000) delivery="8-24 hrs"

else if(words<=5000) delivery="24-48 hrs"

else delivery="48-72 hrs"



quoteBox.style.display="block"

submitBox.style.display="block"



quoteBox.innerHTML=

`

Word count: <b>${words}</b><br><br>

Price: <b>$${price}</b><br><br>

Delivery: <b>${delivery}</b>

`

}



function submitJob(){

alert("Job Submitted")

}



</script>


</body>
</html>
