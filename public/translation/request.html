<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Request Translation — SayBon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Inter", sans-serif;
  background: #0f172a;
  color: #111827;
  padding: 60px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

h1 {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 10px;
}

.subtitle {
  color: #6b7280;
  margin-bottom: 30px;
}

label {
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
}

textarea {
  resize: vertical;
  min-height: 150px;
}

.price-box {
  background: #f3f4f6;
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 20px;
}

.price-box strong {
  font-size: 18px;
}

button {
  background: linear-gradient(135deg, #111827, #374151);
  color: white;
  border: none;
  padding: 14px 20px;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  font-size: 15px;
  transition: 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
}

.note {
  font-size: 13px;
  color: #6b7280;
  margin-top: 8px;
}

@media (max-width: 768px) {
  .container {
    padding: 25px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Request Translation</h1>
<p class="subtitle">Professional human translation. Fast. Accurate. Reliable.</p>

<form id="requestForm">

<label>Your Email</label>
<input type="email" id="email" required />

<label>Service Type</label>
<select id="service">
  <option value="standard">Standard — $0.025 / word</option>
  <option value="express">Express — $0.05 / word</option>
</select>

<label>Paste Your Text</label>
<textarea id="textInput" placeholder="Paste text here or upload document..."></textarea>

<label>Or Upload Document</label>
<input type="file" id="fileUpload" />

<div class="price-box">
  Words: <strong id="wordCount">0</strong><br>
  Estimated Price: <strong>$<span id="price">0.00</span></strong>
</div>

<button type="submit">Submit Request</button>

<p class="note">Files are securely stored. Payment link will be sent after review.</p>

</form>

</div>

<script type="module">

// =======================
// FIREBASE CONFIG
// =======================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
  authDomain: "saybon-3e3c2.firebaseapp.com",
  projectId: "saybon-3e3c2",
  storageBucket: "saybon-3e3c2.appspot.com",
  messagingSenderId: "75085012344",
  appId: "1:75085012344:web:0b18581cb0a30c3df47c8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// =======================
// WORD COUNTER + PRICING
// =======================

const textInput = document.getElementById("textInput");
const service = document.getElementById("service");
const wordCountEl = document.getElementById("wordCount");
const priceEl = document.getElementById("price");

function updatePrice() {
  const words = textInput.value.trim().split(/\s+/).filter(w => w.length > 0);
  const count = words.length;
  wordCountEl.textContent = count;

  const rate = service.value === "express" ? 0.05 : 0.025;
  const total = count * rate;

  priceEl.textContent = total.toFixed(2);
}

textInput.addEventListener("input", updatePrice);
service.addEventListener("change", updatePrice);

// =======================
// FORM SUBMIT
// =======================

document.getElementById("requestForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const text = textInput.value;
  const serviceType = service.value;
  const file = document.getElementById("fileUpload").files[0];

  let fileURL = null;

  if (file) {
    const fileRef = ref(storage, "translation_requests/" + Date.now() + "_" + file.name);
    await uploadBytes(fileRef, file);
    fileURL = await getDownloadURL(fileRef);
  }

  await addDoc(collection(db, "translation_requests"), {
    email,
    text,
    serviceType,
    wordCount: wordCountEl.textContent,
    price: priceEl.textContent,
    fileURL,
    createdAt: new Date()
  });

  alert("Request submitted successfully!");
  e.target.reset();
  updatePrice();
});

</script>

</body>
</html>
