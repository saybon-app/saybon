<!DOCTYPE html>
<html>

<head>

<title>SayBon Translation Services</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

font-family: Inter, system-ui;
background: linear-gradient(135deg,#f5f7fa,#e4ecf5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.card{

background:white;
padding:40px;
border-radius:20px;
width:500px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);

}

h2{

font-weight:600;
margin-bottom:20px;

}

.price{

margin-bottom:20px;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#4e8cff,#2563eb);
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

transform:scale(1.03);

}

.result{

margin-top:20px;
font-size:18px;

}

</style>

</head>

<body>

<div class="card">

<h2>Pricing & Delivery</h2>

<div class="price">

Standard — 0.025 / word

<br>

Express — 0.05 / word

</div>

<input type="file" id="file">

<br><br>

<button onclick="upload()">

Upload Document To Get Quote

</button>

<div class="result" id="result">

</div>

</div>

<script>

async function upload(){

const file=document.getElementById("file").files[0];

const form=new FormData();

form.append("file",file);

const res=await fetch(

"https://saybon-backend.onrender.com/api/quote",

{

method:"POST",

body:form

});

const data=await res.json();

document.getElementById("result").innerHTML=

"Words: "+data.wordCount+

"<br>Standard: $"+data.standard+

"<br>Express: $"+data.express;

}

</script>

</body>

</html>
