<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{

font-family:Poppins;
background:linear-gradient(to bottom,#cfd9df,#e2ebf0);
margin:0;
padding:40px;

}

.header{

text-align:center;

}

.header h1{

font-size:48px;

}

.header p{

font-size:14px;
letter-spacing:3px;

}

.glass{

background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;

}

.uploadBtn{

background:linear-gradient(145deg,#8fd3c8,#6fc3b2);
color:white;
border:none;
padding:15px 30px;
border-radius:12px;
cursor:pointer;
font-size:16px;

}

.uploadBtn:hover{

transform:translateY(-2px);

}

.quoteCard{

margin-top:20px;
padding:20px;
border-radius:12px;
cursor:pointer;

}

.standard{

border:2px solid green;

}

.express{

border:2px solid red;

}

</style>

</head>

<body>

<div class="header">

<h1>SayBon Translation Services</h1>

<p>TRANSLATED BY EXPERTS • QUICK DELIVERY • CONFIDENTIAL</p>

</div>

<div class="glass">

<input type="file" id="fileInput">

<br><br>

<button class="uploadBtn" onclick="getQuote()">

Upload Document To Get Quote

</button>

<div id="quoteStatus"></div>

<div id="quoteCards"></div>

</div>

<script>

function getQuote(){

let words=1000;

let status=document.getElementById("quoteStatus");

status.innerHTML="Quote Ready Below";

renderQuoteCards(words);

}

function renderQuoteCards(words){

let container=document.getElementById("quoteCards");

let standard=(words*0.025).toFixed(2);

let express=(words*0.05).toFixed(2);

container.innerHTML=

<div class="quoteCard standard"

onclick="goPay()">

Standard: public/translation/request.html{standard}

</div>

<div class="quoteCard express"

onclick="goPay()">

Express: public/translation/request.html{express}

</div>

;

}

function goPay(amount){

localStorage.setItem("amount",amount);

window.location.href="/translation/payment.html";

}

</script>

</body>

</html>
