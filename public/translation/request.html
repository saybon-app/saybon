<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Request Translation — SayBon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<style>

body{
font-family:Inter;
background:#f8fafc;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

h1{
font-size:28px;
margin-bottom:8px;
}

.subtitle{
color:#64748b;
margin-bottom:30px;
}

.upload{
border:2px dashed #cbd5e1;
padding:40px;
text-align:center;
border-radius:12px;
cursor:pointer;
}

.upload:hover{
background:#f1f5f9;
}

.result{
margin-top:30px;
display:none;
}

.price-card{
border:1px solid #e2e8f0;
padding:20px;
border-radius:12px;
margin-top:12px;
cursor:pointer;
}

.price-card:hover{
border-color:#0f766e;
background:#f0fdfa;
}

.price{
font-size:24px;
font-weight:700;
}

.timeline{
color:#64748b;
}

button{
margin-top:20px;
padding:14px 28px;
border:none;
background:#0f766e;
color:white;
font-weight:600;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#115e59;
}

</style>

</head>
<body>

<div class="container">

<h1>Request Translation</h1>

<div class="subtitle">
Upload your document to receive instant quote and delivery timeline.
</div>


<input type="file" id="fileInput" hidden>

<div class="upload" onclick="fileInput.click()">

Upload Document

<br><br>

PDF • DOCX • TXT

</div>


<div class="result" id="result">

<h2>Document Analysis</h2>

<div id="stats"></div>


<div id="standard" class="price-card"></div>

<div id="express" class="price-card"></div>

<button onclick="proceed()">Continue to Payment</button>

</div>


</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getStorage,
ref,
uploadBytes
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";



const firebaseConfig = {

apiKey: "AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",

authDomain: "saybon-3e3c2.firebaseapp.com",

projectId: "saybon-3e3c2",

storageBucket: "saybon-3e3c2.firebasestorage.app",

messagingSenderId: "75085012344",

appId: "1:75085012344:web:0b18581cb0a30c3df47c8d"

};



const app=initializeApp(firebaseConfig);

const storage=getStorage(app);



let selectedFile;

let wordCount;

let selectedSpeed="standard";



fileInput.onchange=async e=>{

selectedFile=e.target.files[0];

uploadFile();

detectWords(selectedFile);

};



async function uploadFile(){

const storageRef=ref(storage,"translations/"+Date.now()+"_"+selectedFile.name);

await uploadBytes(storageRef,selectedFile);

}



async function detectWords(file){

let text="";



if(file.name.endsWith(".txt")){

text=await file.text();

}



if(file.name.endsWith(".docx")){

const arrayBuffer=await file.arrayBuffer();

const result=await mammoth.extractRawText({arrayBuffer});

text=result.value;

}



if(file.name.endsWith(".pdf")){

const pdf=await pdfjsLib.getDocument(await file.arrayBuffer()).promise;

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i);

const content=await page.getTextContent();

text+=content.items.map(i=>i.str).join(" ");

}

}



wordCount=text.trim().split(/\s+/).length;



showQuote();

}



function showQuote(){

result.style.display="block";



stats.innerHTML=`

Words: ${wordCount}

<br>

Pages: ${Math.ceil(wordCount/300)}

`;



const standardPrice=(wordCount*0.025).toFixed(2);

const expressPrice=(wordCount*0.05).toFixed(2);



standard.innerHTML=`

<h3>Standard</h3>

<div class="price">$${standardPrice}</div>

<div class="timeline">

Delivery:

${wordCount<=2000?"24 hours":"48 hours"}

</div>

`;



express.innerHTML=`

<h3>Express</h3>

<div class="price">$${expressPrice}</div>

<div class="timeline">

Delivery:

${wordCount<=1500?"6-12 hours":"12-24 hours"}

</div>

`;



standard.onclick=()=>{

selectedSpeed="standard";

};



express.onclick=()=>{

selectedSpeed="express";

};

}



function proceed(){

alert("Payment integration ready next");

}



</script>



</body>

</html>
