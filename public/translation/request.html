<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Translation Services</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>

body{
font-family:Poppins, sans-serif;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
text-align:center;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:400px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#1e8e8e;
color:white;
cursor:pointer;
}

.plan{
border:1px solid #ccc;
padding:10px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>SAYBON TRANSLATION SERVICES</h1>

<div class="card">

<input type="file" id="file">

<br><br>

<button id="uploadBtn">Upload</button>

<p id="words">Words: 0</p>

<div id="standard" class="plan">Standard</div>
<div id="express" class="plan">Express</div>

<button id="payBtn" style="display:none">Proceed to Payment</button>

</div>

<script>

let wordCount=0
let plan=null

async function extractText(file){

const ext=file.name.split('.').pop().toLowerCase()

if(ext==="txt"){
return await file.text()
}

if(ext==="docx"){
const buffer=await file.arrayBuffer()
const result=await mammoth.extractRawText({arrayBuffer:buffer})
return result.value
}

if(ext==="pdf"){
const typed=new Uint8Array(await file.arrayBuffer())
const pdf=await pdfjsLib.getDocument(typed).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const content=await page.getTextContent()

content.items.forEach(item=>{
text+=item.str+" "
})

}

return text
}

return ""

}

document.getElementById("uploadBtn").onclick=async()=>{

const file=document.getElementById("file").files[0]

const text=await extractText(file)

wordCount=text.split(/\s+/).length

document.getElementById("words").innerText="Words: "+wordCount

}

document.getElementById("standard").onclick=()=>{

plan="standard"
document.getElementById("payBtn").style.display="block"

}

document.getElementById("express").onclick=()=>{

plan="express"
document.getElementById("payBtn").style.display="block"

}

document.getElementById("payBtn").onclick=async()=>{

const response=await fetch(
"https://saybon-server.onrender.com/api/createCheckout",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
words:wordCount,
plan
})
})

const data=await response.json()

window.location=data.url

}

</script>

</body>
</html>
