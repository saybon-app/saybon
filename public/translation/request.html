<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
color:#6e6e73;
}

.page{padding:30px;}

.title{
text-align:center;
letter-spacing:3px;
font-weight:500;
}

.subtitle{
text-align:center;
font-size:12px;
margin-bottom:30px;
}

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.left-card,.right-card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(20px);
border-radius:30px;
padding:25px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.upload-row{display:flex;gap:10px;}

#uploadBtn{
background:#1e8e8e;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

.word-count{margin-top:15px;font-weight:500;}

.quote-card{
margin-top:15px;
padding:15px;
border-radius:15px;
cursor:pointer;
border:1px solid;
}

.standard{border-color:#34a853;}
.express{border-color:#ea4335;}

#continueBtn{
display:none;
margin-top:20px;
width:100%;
background:#1e8e8e;
color:white;
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="page">

<h1 class="title">SAYBON TRANSLATION SERVICES</h1>

<p class="subtitle">
TRANSLATED BY EXPERTS • QUICK DELIVERY • CONFIDENTIAL
</p>

<div class="container">

<div class="left-card">

<div class="upload-row">

<input type="number" id="words" placeholder="Word count">

</div>

<div class="quote-card standard" id="standardCard">
STANDARD $<span id="standardPrice">0</span>
</div>

<div class="quote-card express" id="expressCard">
EXPRESS $<span id="expressPrice">0</span>
</div>

<button id="continueBtn">CONTINUE</button>

</div>

</div>

</div>

<script>

let selectedPlan=null

const wordsInput=document.getElementById("words")

const standardCard=document.getElementById("standardCard")
const expressCard=document.getElementById("expressCard")

const continueBtn=document.getElementById("continueBtn")

wordsInput.oninput=()=>{

const words=Number(wordsInput.value)

document.getElementById("standardPrice").innerText=(words*0.025).toFixed(2)
document.getElementById("expressPrice").innerText=(words*0.05).toFixed(2)

}

standardCard.onclick=()=>{
selectedPlan="standard"
continueBtn.style.display="block"
}

expressCard.onclick=()=>{
selectedPlan="express"
continueBtn.style.display="block"
}

continueBtn.onclick=async()=>{

const words=Number(wordsInput.value)

const price=selectedPlan==="express"?words*0.05:words*0.025

const res=await fetch(
"https://saybon-server.onrender.com/api/createJob",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
words,
plan:selectedPlan,
price
})
})

const data=await res.json()

window.location.href=
"/translation/job.html?jobCode="+data.jobCode

}

</script>

</body>
</html>
