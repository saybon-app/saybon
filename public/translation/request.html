<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
color:#6e6e73;
}

.page{
padding:40px;
text-align:center;
}

.title{
letter-spacing:3px;
font-weight:500;
}

.subtitle{
font-size:12px;
margin-bottom:40px;
}

.card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
width:420px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:20px;
font-size:16px;
}

.quote{
padding:15px;
border-radius:15px;
margin-bottom:15px;
cursor:pointer;
border:1px solid;
}

.standard{
border-color:#34a853;
}

.express{
border-color:#ea4335;
}

.selected{
background:#e9f6f2;
}

.price{
font-weight:500;
}

.delivery{
font-size:12px;
margin-top:5px;
}

#continueBtn{
display:none;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e8e8e;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

</style>

</head>

<body>

<div class="page">

<h1 class="title">
SAYBON TRANSLATION SERVICES
</h1>

<p class="subtitle">
TRANSLATED BY EXPERTS • QUICK DELIVERY • CONFIDENTIAL
</p>

<div class="card">

<input
type="number"
id="words"
placeholder="Enter word count"
/>

<div class="quote standard" id="standardCard">

<div class="price" id="standardPrice">
STANDARD $0.00
</div>

<div class="delivery" id="standardDelivery">
Delivery: —
</div>

</div>

<div class="quote express" id="expressCard">

<div class="price" id="expressPrice">
EXPRESS $0.00
</div>

<div class="delivery" id="expressDelivery">
Delivery: —
</div>

</div>

<button id="continueBtn">
CONTINUE
</button>

</div>

</div>

<script>

let selectedPlan=null
let wordCount=0

const wordsInput=document.getElementById("words")

const standardPrice=document.getElementById("standardPrice")
const expressPrice=document.getElementById("expressPrice")

const standardDelivery=document.getElementById("standardDelivery")
const expressDelivery=document.getElementById("expressDelivery")

const standardCard=document.getElementById("standardCard")
const expressCard=document.getElementById("expressCard")

const continueBtn=document.getElementById("continueBtn")

function deliveryTime(words){

if(words<=300){
return{
standard:"1 – 3 hrs",
express:"30 – 60 mins"
}
}

if(words<=1000){
return{
standard:"3 – 6 hrs",
express:"1 – 3 hrs"
}
}

if(words<=3000){
return{
standard:"6 – 12 hrs",
express:"3 – 6 hrs"
}
}

if(words<=6000){
return{
standard:"12 – 24 hrs",
express:"6 – 12 hrs"
}
}

return{
standard:"24 – 48 hrs",
express:"12 – 24 hrs"
}

}

wordsInput.addEventListener("input",()=>{

wordCount=Number(wordsInput.value)

const standard=(wordCount*0.025).toFixed(2)
const express=(wordCount*0.05).toFixed(2)

standardPrice.innerText="STANDARD $"+standard
expressPrice.innerText="EXPRESS $"+express

const delivery=deliveryTime(wordCount)

standardDelivery.innerText="Delivery: "+delivery.standard
expressDelivery.innerText="Delivery: "+delivery.express

})

standardCard.onclick=()=>{

selectedPlan="standard"

standardCard.classList.add("selected")
expressCard.classList.remove("selected")

continueBtn.style.display="block"

}

expressCard.onclick=()=>{

selectedPlan="express"

expressCard.classList.add("selected")
standardCard.classList.remove("selected")

continueBtn.style.display="block"

}

continueBtn.onclick=async()=>{

const price = selectedPlan==="express"
? wordCount*0.05
: wordCount*0.025

const res = await fetch(
"https://saybon-server.onrender.com/api/createJob",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
words:wordCount,
plan:selectedPlan,
price
})
})

const data=await res.json()

window.location.href=
"/translation/job.html?jobCode="+data.jobCode

}

</script>

</body>

</html>
