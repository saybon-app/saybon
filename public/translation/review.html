<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Translation</title>
  <link rel="stylesheet" href="/css/page-transition.css" />
  <script type="module" src="/js/nav-engine.js"></script>
</head>
<body>
<div style="max-width:900px;margin:60px auto;padding:32px;">
  <h1>Review Translation</h1>

  <textarea id="reviewedTranslation" placeholder="Reviewed / corrected translation..." style="width:100%;height:220px;padding:16px;border-radius:18px;border:1px solid #ddd;"></textarea>
  <textarea id="reviewFeedback" placeholder="Feedback..." style="width:100%;height:120px;padding:16px;border-radius:18px;border:1px solid #ddd;margin-top:16px;"></textarea>
  <input id="reviewScore" type="number" placeholder="Score (e.g. 92)" style="width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-top:16px;" />

  <div style="display:flex;gap:12px;margin-top:18px;">
    <button id="approveBtn">Approve</button>
    <button id="reviseBtn">Send for Revision</button>
  </div>

  <p id="status" style="margin-top:18px;"></p>
</div>
<script src="/js/review.js"></script>
</body>
</html>
