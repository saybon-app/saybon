<!DOCTYPE html>
<html lang="en">
<head>
<script type='module' src='/js/auth-guard.js'></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Application Result</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
}

.status{
text-align:center;
font-size:22px;
margin-bottom:20px
}

.pass{color:green}
.fail{color:red}

table{
width:100%;
border-collapse:collapse
}

th,td{
border:1px solid #ddd;
padding:10px
}

.passkey{
margin-top:30px;
padding:20px;
background:#fff1f2;
border:2px solid red;
display:none;
text-align:center
}

.code{
font-family:monospace;
font-size:20px;
background:#7f1d1d;
color:white;
padding:10px;
margin-top:10px;
display:inline-block;
cursor:pointer
}

</style>


<link rel='stylesheet' href='/css/page-transition.css'>
<script type='module' src='/js/nav-engine.js'></script>
</head>

<body>

<div class="container">

<h1>Application Result</h1>

<div id="status" class="status"></div>

<table>

<tr>
<th>Evaluation</th>
<th>Score</th>
</tr>

<tr>
<td>Accuracy</td>
<td id="accuracy"></td>
</tr>

<tr>
<td>Terminology</td>
<td id="terminology"></td>
</tr>

<tr>
<td>Grammar</td>
<td id="grammar"></td>
</tr>

<tr>
<td>Tone</td>
<td id="tone"></td>
</tr>

<tr>
<td>Total</td>
<td id="total"></td>
</tr>

</table>

<div class="passkey" id="passkeyBox">

<div>Your Translator Job Key</div>

<div id="code" class="code"></div>

<p>Do not share this key</p>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search)

const id=params.get("id")

async function load(){

if(!id){

document.getElementById("status").innerHTML="Result unavailable"

return

}

const res=await fetch("/api/applicationResult?id="+id)

const data=await res.json()

document.getElementById("accuracy").innerText=data.accuracy+"%"
document.getElementById("terminology").innerText=data.terminology+"%"
document.getElementById("grammar").innerText=data.grammar+"%"
document.getElementById("tone").innerText=data.tone+"%"
document.getElementById("total").innerText=data.finalScore+"%"

if(data.finalScore>=75){

document.getElementById("status").innerHTML="Accepted"
document.getElementById("status").className="status pass"

document.getElementById("passkeyBox").style.display="block"

document.getElementById("code").innerText=data.passkey

}else{

document.getElementById("status").innerHTML="Rejected"
document.getElementById("status").className="status fail"

}

}

load()

</script>

</body>
</html>
