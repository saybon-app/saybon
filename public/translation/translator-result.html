<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Application Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
padding:40px;
color:#444;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:30px;
}

.status{
text-align:center;
font-size:22px;
margin-bottom:25px;
font-weight:600;
}

.pass{color:#16a34a}
.fail{color:#dc2626}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
margin-bottom:25px;
}

th,td{
border:1px solid #ddd;
padding:12px;
text-align:left;
font-size:14px;
}

th{
background:#f1f4ff;
}

.passkey{
background:#ecfdf5;
padding:15px;
border-radius:8px;
margin-top:20px;
font-weight:600;
}

.docs{
background:#f9fafb;
padding:15px;
border-radius:8px;
margin-top:20px;
}

.buttons{
margin-top:30px;
display:flex;
gap:20px;
justify-content:center;
}

.btn{
padding:12px 20px;
border-radius:8px;
border:none;
font-size:15px;
cursor:pointer;
background:#2563eb;
color:white;
}

.btn.secondary{
background:#64748b;
}

</style>

</head>

<body>

<div class="container">

<h1>Application Result</h1>

<div id="status" class="status"></div>

<table>

<tr>
<th>Evaluation Area</th>
<th>Score</th>
<th>Status</th>
</tr>

<tr>
<td>Translation Accuracy</td>
<td id="accuracy"></td>
<td id="accuracyStatus"></td>
</tr>

<tr>
<td>Terminology Consistency</td>
<td id="terminology"></td>
<td id="terminologyStatus"></td>
</tr>

<tr>
<td>Grammar & Structure</td>
<td id="grammar"></td>
<td id="grammarStatus"></td>
</tr>

<tr>
<td>Professional Tone</td>
<td id="tone"></td>
<td id="toneStatus"></td>
</tr>

<tr>
<td><strong>Total Score</strong></td>
<td id="totalScore"></td>
<td id="totalStatus"></td>
</tr>

</table>

<div class="docs">

<h3>Document Verification</h3>

<table>

<tr>
<th>Document</th>
<th>Type</th>
<th>Status</th>
</tr>

<tr>
<td>National Identification</td>
<td id="idType"></td>
<td>Verified</td>
</tr>

<tr>
<td>Certification</td>
<td id="certType"></td>
<td>Verified</td>
</tr>

</table>

</div>

<div id="passkeyBox" class="passkey" style="display:none"></div>

<div class="buttons">

<button id="jobBtn" class="btn" style="display:none">
Go To Job Board
</button>

<button id="dashBtn" class="btn secondary">
Return To Dashboard
</button>

</div>

</div>

<script>

/* =========================================
SIMULATED AI RESULTS (replace later)
========================================= */

const accuracy = Math.floor(Math.random()*30)+60
const terminology = Math.floor(Math.random()*30)+60
const grammar = Math.floor(Math.random()*30)+60
const tone = Math.floor(Math.random()*30)+60

const total = Math.round((accuracy+terminology+grammar+tone)/4)

/* =========================================
DISPLAY SCORES
========================================= */

document.getElementById("accuracy").innerText = accuracy+"%"
document.getElementById("terminology").innerText = terminology+"%"
document.getElementById("grammar").innerText = grammar+"%"
document.getElementById("tone").innerText = tone+"%"
document.getElementById("totalScore").innerText = total+"%"

function status(score){
return score>=75 ? "Pass" : "Review"
}

document.getElementById("accuracyStatus").innerText=status(accuracy)
document.getElementById("terminologyStatus").innerText=status(terminology)
document.getElementById("grammarStatus").innerText=status(grammar)
document.getElementById("toneStatus").innerText=status(tone)

/* =========================================
DOCUMENT TYPE DETECTION (SIMULATED)
========================================= */

document.getElementById("idType").innerText="Passport"
document.getElementById("certType").innerText="DELF B2"

/* =========================================
FINAL RESULT
========================================= */

const statusBox=document.getElementById("status")
const passkeyBox=document.getElementById("passkeyBox")
const jobBtn=document.getElementById("jobBtn")

if(total>=75){

statusBox.innerHTML="Status: Accepted Into Translator Pool"
statusBox.classList.add("pass")

const passkey="SB-"+Math.random().toString(36).substring(2,10).toUpperCase()

passkeyBox.style.display="block"
passkeyBox.innerHTML="Translator Passkey: "+passkey

jobBtn.style.display="inline-block"

}else{

statusBox.innerHTML="Status: Application Rejected"
statusBox.classList.add("fail")

document.getElementById("totalStatus").innerText="Below Entry Threshold"

}

/* =========================================
BUTTONS
========================================= */

jobBtn.onclick=()=>{
window.location="/translation/translator-dashboard.html"
}

document.getElementById("dashBtn").onclick=()=>{
window.location="/public/dashboard/index.html"
}

</script>

</body>
</html>
