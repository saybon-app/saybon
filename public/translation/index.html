<!DOCTYPE html>
<html lang='en'>
<head>

<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>

<title>SayBon Translation</title>

<link rel='stylesheet' href='translation.css'>

</head>

<body>

<div class='page'>

<h1>SayBon Translation Services</h1>

<div class='subtitle'>

TRANSLATED BY EXPERTS • QUICK DELIVERY • CONFIDENTIAL

</div>


<!-- MAIN CARD -->

<div class='glass-card'>

<!-- UPLOAD -->

<div class='upload-section'>

<div class='upload-icon'>📤</div>

<div class='upload-text'>

Drop file to upload  
Supported: PDF, DOCX, TXT

</div>

<input type='file' id='fileInput'>

<button id='uploadBtn' onclick='generateQuote()'>

Upload Document To Get Quote

</button>

</div>


<!-- WORD COUNT -->

<div id='quoteArea' class='hidden'>

<div class='word-count' id='wordCount'></div>

<div class='select-text'>

Select your preferred quote to proceed to payment

</div>


<!-- QUOTE CARDS -->

<div class='quote-container'>

<div id='standardCard' class='quote-card standard' onclick='goPay("standard")'></div>

<div id='expressCard' class='quote-card express' onclick='goPay("express")'></div>

</div>

</div>

</div>


<!-- PAYMENT -->

<div id='paymentArea' class='hidden'>

<div class='payment-card'>

<h2>Payment</h2>

<div>Words: <span id='payWords'></span></div>

<div>Delivery: <span id='payDelivery'></span></div>

<div>

Currency

<select id='currency'>

<option value='USD'>USD</option>

<option value='GHS'>GHS</option>

<option value='EUR'>EUR</option>

</select>

</div>

<div>

Amount: <span id='payAmount'></span>

</div>


<button class='stripe' onclick='payStripe()'>

Pay with Stripe

</button>

<button class='paystack' onclick='payPaystack()'>

Pay with Paystack

</button>

</div>

</div>

</div>

<script src='translation.js'></script>

</body>

</html>
