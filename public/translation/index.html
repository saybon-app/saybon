<!DOCTYPE html>
<html lang="en">
<head>
<script type='module' src='/js/auth-guard.js'></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f1115;
color:#e6e6e6;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* SETTINGS BUTTON */

.settings{

position:fixed;
top:20px;
right:25px;

font-size:24px;
cursor:pointer;

padding:10px 14px;
border-radius:8px;

background:#1f242d;
transition:.25s;

}

.settings:hover{

background:#4ecdc4;
color:white;
transform:rotate(25deg);

}

/* LAYOUT */

.wrapper{

display:flex;
gap:60px;
align-items:center;

max-width:1100px;
width:90%;

}

/* IMAGE */

.hero{

width:420px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.6);

}

/* BUTTON COLUMN */

.actions{

display:flex;
flex-direction:column;
gap:25px;
width:300px;

}

button{

padding:16px;
font-size:16px;

border:none;
border-radius:12px;
cursor:pointer;

transition:.25s;

}

/* PRIMARY */

.request{

background:linear-gradient(135deg,#4ecdc4,#5dade2);
color:white;

}

.request:hover{

transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,.4);

}

/* SECONDARY */

.translators{

background:#1f242d;
color:#e5e5e5;

}

.translators:hover{

background:#323844;

}

/* DASHBOARD */

.dashboard{

margin-top:40px;
font-size:14px;
opacity:.7;

cursor:pointer;

}

.dashboard:hover{

opacity:1;

}

/* ADMIN MODAL */

.modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.7);

display:none;
align-items:center;
justify-content:center;

}

.modalCard{

background:#1b1f26;
padding:40px;
border-radius:16px;
width:320px;
text-align:center;

}

.modalCard input{

width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:none;

}

.modalCard button{

margin-top:15px;
width:100%;
padding:12px;

background:#4ecdc4;
border:none;
border-radius:10px;
color:white;

}

.error{

color:#ff6b6b;
margin-top:10px;

}

</style>

<link rel='stylesheet' href='/css/page-transition.css'>
<script type='module' src='/js/nav-engine.js'></script>
</head>

<body>

<div class="settings" onclick="openSettings()">?</div>

<div class="wrapper">

<img src="/assets/images/translation-hero.jpg" class="hero">

<div class="actions">

<button class="request"
onclick="location.href='/translation/request.html'">
Request Translation
</button>

<button class="translators"
onclick="location.href='/translation/translators.html'">
Join Our Pool of Translators
</button>

<div class="dashboard"
onclick="location.href='/dashboard/index.html'">
? Back to Dashboard
</div>

</div>

</div>

<!-- ADMIN ACCESS -->

<div id="settingsModal" class="modal">

<div class="modalCard">

<h3>Admin Access</h3>

<input
type="password"
id="adminCode"
placeholder="Enter passcode..."
>

<button onclick="checkCode()">Enter</button>

<div id="error" class="error"></div>

</div>

</div>

<script>

function openSettings(){

document.getElementById("settingsModal").style.display="flex"

}

function checkCode(){

let code=document.getElementById("adminCode").value

if(code==="963281"){

window.location="/translation/admin.html"

}else{

document.getElementById("error").innerText="Incorrect passcode"

}

}

</script>

</body>
</html>
