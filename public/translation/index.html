<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SayBon Translation Services</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* KEEP ALL YOUR EXISTING STYLE */

* {box-sizing:border-box;margin:0;padding:0;}

body {
font-family:"Manrope",sans-serif;
background:#0b1220;
color:#e2e8f0;
}

.wrapper {
max-width:1200px;
margin:auto;
padding:100px 60px;
}

.split {
display:grid;
grid-template-columns:1.05fr 1fr;
gap:80px;
align-items:center;
}

.btn {
padding:10px 22px;
border:1px solid #334155;
border-radius:6px;
background:transparent;
color:#e2e8f0;
cursor:pointer;
margin-right:10px;
}

.btn:hover {
background:#1e293b;
}

/* TRANSLATOR PANEL */

#translatorPanel {

display:none;
margin-top:60px;
padding:30px;

background:#020617;
border:1px solid #334155;
border-radius:10px;

}

.job {

margin-top:25px;
padding:20px;

border:1px solid #475569;
border-radius:8px;

}

textarea {

width:100%;
height:200px;

background:#020617;
color:#e2e8f0;

border:1px solid #334155;
padding:10px;

}

/* NDA BOX */

.nda {

margin-top:15px;
padding:15px;

background:#020617;
border:1px solid #ef4444;
border-radius:8px;

}

</style>
</head>
<body>


<div class="wrapper">


<h1>SayBon Translation Services</h1>


<button class="btn"
onclick="togglePanel()">

Translator Pool Login

</button>


<div id="translatorPanel">


<h2>Available Jobs</h2>


<div id="jobs"></div>


</div>


</div>


<script>


function togglePanel(){

const panel=
document.getElementById("translatorPanel")

panel.style.display=
panel.style.display==="block"?"none":"block"

loadJobs()

}



async function loadJobs(){

const res=
await fetch("http://localhost:4000/jobs")

const data=
await res.json()

const container=
document.getElementById("jobs")

container.innerHTML=""



data.jobs.forEach(job=>{


const div=
document.createElement("div")

div.className="job"


div.innerHTML=

`

<h3>Job ID: ${job.id}</h3>


<p><b>Translator Payment:</b> $${job.payment}</p>


<p><b>Bonus:</b> 2nd & 3rd translators receive bonus payment</p>


<p><b>Deadline:</b> ${job.deadline}</p>


<p><b>Status:</b> ${job.status}</p>


<div class="nda">

<b>CONFIDENTIALITY AGREEMENT</b>

<br><br>

This document is protected under SayBon NDA.

Unauthorized copying, saving, screenshotting or disclosure

may result in permanent ban and legal action.

<br><br>

<label>

<input type="checkbox"
id="nda-${job.id}">

I agree to NDA

</label>

</div>


<br>


<textarea id="text-${job.id}">

${job.phase1}

</textarea>


<br><br>


<label>

<input type="checkbox"
id="cert-${job.id}">

I certify I personally worked on this translation

</label>


<br><br>


<button class="btn"
onclick="accept('${job.id}')">

Accept Job

</button>



<button class="btn"
onclick="submit('${job.id}')">

Submit Translation

</button>


`


container.appendChild(div)

})


}



async function accept(id){

const nda=
document.getElementById("nda-"+id)


if(!nda.checked){

alert("You must accept NDA")

return

}


await fetch(

"http://localhost:4000/jobs/"+id+"/accept",

{method:"POST"}

)

alert("Job Accepted")


loadJobs()

}



async function submit(id){


const nda=
document.getElementById("nda-"+id)

const cert=
document.getElementById("cert-"+id)


if(!nda.checked){

alert("NDA Required")
return

}


if(!cert.checked){

alert("Certification Required")
return

}



const text=
document.getElementById("text-"+id).value



const res=

await fetch(

"http://localhost:4000/jobs/"+id+"/submit",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:

JSON.stringify({

translation:text

})

}

)



const data=
await res.json()


alert(data.message)


loadJobs()

}


</script>


</body>
</html>
