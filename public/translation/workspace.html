<!DOCTYPE html>
<html lang="en">

<head>
<script type='module' src='/js/auth-guard.js'></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Translation Workspace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6fb;
}

.topbar{
background:#1f2937;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.workspace{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:500px;
border:1px solid #ddd;
border-radius:6px;
padding:10px;
font-family:Poppins;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#16a34a;
color:white;
cursor:pointer;
}

</style>


<link rel='stylesheet' href='/css/page-transition.css'>
<script type='module' src='/js/nav-engine.js'></script>
</head>

<body>

<div class="topbar">

<div>
Job: <span id="jobId"></span>
</div>

<div>
Deadline: <span id="deadline"></span>
</div>

<div>
<button onclick="submitTranslation()">Submit</button>
</div>

</div>


<div class="workspace">

<div class="box">

<h3>Source Document</h3>

<textarea id="source" readonly></textarea>

</div>


<div class="box">

<h3>Your Translation</h3>

<textarea id="translation"></textarea>

</div>

</div>



<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();


/* GET JOB */

const params=new URLSearchParams(window.location.search);

const jobId=params.get("job");

document.getElementById("jobId").innerText=jobId;


/* LOAD JOB */

async function loadJob(){

let doc=await db.collection("translationJobs").doc(jobId).get();

let job=doc.data();

document.getElementById("deadline").innerText=job.deadline||"-";

document.getElementById("source").value=job.sourceText||"";

}

loadJob();


/* SUBMIT TRANSLATION */

async function submitTranslation(){

let text=document.getElementById("translation").value;

await fetch("https://saybon-server.onrender.com/api/submitTranslation",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

jobId:jobId,

translatorId:"TR-2041",

translation:text

})

});

alert("Translation submitted");

}

</script>

</body>
</html>
