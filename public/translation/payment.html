<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Payment</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:linear-gradient(180deg,#eef2ff,#f8fafc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:white;
padding:35px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
width:420px;
text-align:center;

}

h1{
margin-bottom:5px;
}

.sub{
color:#64748b;
font-size:14px;
margin-bottom:25px;
}

.amountBox{

background:#f1f5f9;
padding:20px;
border-radius:10px;
margin-bottom:20px;

}

.amount{

font-size:32px;
font-weight:bold;
margin-bottom:10px;

}

select{

padding:8px;
border-radius:8px;
border:1px solid #cbd5e1;
font-size:14px;

}


button{

width:100%;
padding:13px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
margin-top:12px;
transition:all 0.15s ease;

}


/* Stripe */

.stripe{

background:linear-gradient(145deg,#2563eb,#1d4ed8);
color:white;

box-shadow:
0 6px 12px rgba(0,0,0,0.2);

}

.stripe:hover{

transform:translateY(-2px);
box-shadow:
0 10px 18px rgba(0,0,0,0.25);

}

.stripe:active{

transform:translateY(2px);
box-shadow:
0 3px 6px rgba(0,0,0,0.2);

}


/* Paystack */

.paystack{

background:linear-gradient(145deg,#10b981,#059669);
color:white;

box-shadow:
0 6px 12px rgba(0,0,0,0.2);

}

.paystack:hover{

transform:translateY(-2px);
box-shadow:
0 10px 18px rgba(0,0,0,0.25);

}

.paystack:active{

transform:translateY(2px);
box-shadow:
0 3px 6px rgba(0,0,0,0.2);

}


.secure{

margin-top:18px;
font-size:12px;
color:#64748b;

}

</style>

</head>
<body>



<div class="card">


<h1>Complete Payment</h1>

<div class="sub">

Secure checkout powered by Stripe & Paystack

</div>



<div class="amountBox">

Service Amount

<div class="amount" id="amount">$0.00</div>


<select id="currency" onchange="changeCurrency()">

<option value="USD">$ USD</option>

<option value="GHS">₵ GHS</option>

<option value="EUR">€ EUR</option>

<option value="GBP">£ GBP</option>

</select>


</div>



<button class="stripe" onclick="payStripe()">

Pay with Card (Stripe)

</button>



<button class="paystack" onclick="payPaystack()">

Pay with Mobile Money / Bank

</button>



<div class="secure">

256-bit encryption • Secure • Confidential

</div>


</div>



<script>


/* ===============================
LOAD PAYMENT DATA
=============================== */

const paymentData =
JSON.parse(localStorage.getItem("saybon_payment"));


let baseAmount = paymentData ? Number(paymentData.price) : 0;

let selectedCurrency="USD";


const rates={

USD:1,
GHS:15,
EUR:0.92,
GBP:0.78

};



function updateDisplay(){

const converted =
baseAmount * rates[selectedCurrency];


let symbol="$";

if(selectedCurrency==="GHS") symbol="₵";
if(selectedCurrency==="EUR") symbol="€";
if(selectedCurrency==="GBP") symbol="£";


document.getElementById("amount").innerHTML=
symbol + converted.toFixed(2);

}



function changeCurrency(){

selectedCurrency=
document.getElementById("currency").value;

updateDisplay();

}



updateDisplay();



/* ===============================
STRIPE
=============================== */

async function payStripe(){

try{

const btn=document.querySelector(".stripe");

btn.innerHTML="Processing...";

const res=await fetch(

"https://saybon-backend.onrender.com/create-stripe-session",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount:
baseAmount * rates[selectedCurrency],

currency:selectedCurrency,

type:paymentData.type

})

}

);


const data=await res.json();


if(data.url){

window.location.href=data.url;

}else{

alert("Stripe failed");

btn.innerHTML="Pay with Card (Stripe)";

}

}
catch{

alert("Stripe failed");

}

}



/* ===============================
PAYSTACK
=============================== */

async function payPaystack(){

try{

const btn=document.querySelector(".paystack");

btn.innerHTML="Processing...";


const res=await fetch(

"https://saybon-backend.onrender.com/create-paystack-session",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount:
baseAmount * rates[selectedCurrency],

currency:selectedCurrency,

email:"customer@saybonapp.com"

})

}

);


const data=await res.json();


if(data.url){

window.location.href=data.url;

}else{

alert("Paystack failed");

btn.innerHTML="Pay with Mobile Money / Bank";

}

}
catch{

alert("Paystack failed");

}

}



</script>



</body>
</html>
