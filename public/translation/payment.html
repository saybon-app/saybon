<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SayBon Payment</title>
  <link rel="stylesheet" href="/css/page-transition.css" />
  <script type="module" src="/js/nav-engine.js"></script>
</head>
<body>
<div style="max-width:700px;margin:60px auto;padding:32px;">
  <h1>Payment</h1>
  <div id="jobBox" style="margin:24px 0;padding:24px;border-radius:20px;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,0.08);">
    <p><strong>Job:</strong> <span id="jobId">-</span></p>
    <p><strong>Words:</strong> <span id="words">-</span></p>
    <p><strong>Plan:</strong> <span id="plan">-</span></p>
    <p><strong>Price:</strong> $<span id="price">-</span></p>
    <p><strong>Delivery:</strong> <span id="timeline">-</span></p>
  </div>
  <button id="payBtn">Proceed to Payment</button>
  <p id="status" style="margin-top:18px;"></p>
</div>
<script src="/js/payment.js"></script>
</body>
</html>
