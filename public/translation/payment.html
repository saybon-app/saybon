<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Payment</title>

<script src="https://js.stripe.com/v3/"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:linear-gradient(180deg,#eef2ff,#f8fafc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:white;
padding:35px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
width:420px;
text-align:center;

}

.amount{

font-size:32px;
font-weight:bold;
margin-top:10px;

}


/* BUTTON BASE */

button{

width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin-top:15px;
transition:all 0.15s ease;

}


/* STRIPE */

.stripe{

background:linear-gradient(145deg,#2563eb,#1d4ed8);
color:white;

box-shadow:
0 6px 0 #1e40af,
0 6px 12px rgba(0,0,0,0.2);

}


/* PAYSTACK */

.paystack{

background:linear-gradient(145deg,#10b981,#059669);
color:white;

box-shadow:
0 6px 0 #047857,
0 6px 12px rgba(0,0,0,0.2);

}


/* HOVER */

button:hover{

transform:translateY(-2px);

}


/* CLICK */

button:active{

transform:translateY(4px);

box-shadow:
0 2px 0 rgba(0,0,0,0.2);

}


.secure{

margin-top:20px;
font-size:12px;
color:#64748b;

}

</style>

</head>
<body>



<div class="card">

<h2>Complete Payment</h2>

<div class="amount" id="amount">

Loading...

</div>


<button class="stripe" onclick="payStripe()">

Pay with Card

</button>



<button class="paystack" onclick="payPaystack()">

Pay with Mobile Money / Bank

</button>


<div class="secure">

256-bit encryption • Secure • Confidential

</div>


</div>



<script>


/* LOAD PAYMENT DATA */

const paymentData = JSON.parse(
localStorage.getItem("saybon_payment")
);


let amount = paymentData.price;

document.getElementById("amount").innerHTML =
"$" + amount;




/* STRIPE PAYMENT */

async function payStripe(){

const res = await fetch(
"https://saybon-backend.onrender.com/create-stripe-session",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

amount:amount,

type:paymentData.type,

currency:"usd"

})
});

const data = await res.json();


window.location.href = data.url;


}




/* PAYSTACK PAYMENT */

async function payPaystack(){

const res = await fetch(
"https://saybon-backend.onrender.com/create-paystack-session",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

amount:amount,

currency:"GHS",

email:"customer@saybonapp.com"

})
});

const data = await res.json();


window.location.href = data.url;


}



</script>


</body>
</html>
