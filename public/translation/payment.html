<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SayBon Payment</title>

<style>

body{

font-family: system-ui;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.card{

background:white;
padding:40px;
border-radius:16px;
width:360px;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-top:12px;
font-size:16px;
cursor:pointer;

}

.stripe{

background:#635bff;
color:white;

}

.paystack{

background:#00c3a5;
color:white;

}

</style>

</head>

<body>


<div class="card">

<h2>TRANSLATION PAYMENT</h2>

<div id="summary"></div>

<select id="currency">

<option value="usd">USD</option>
<option value="ghs">GHS</option>

</select>


<button class="stripe" onclick="payStripe()">

PAY WITH STRIPE

</button>


<button class="paystack" onclick="payPaystack()">

PAY WITH PAYSTACK

</button>

</div>


<script>

const params=new URLSearchParams(location.search);

const words=params.get("words");

const plan=params.get("plan");

const rate=plan==="express"?0.05:0.025;

const total=Math.round(words*rate*100);


document.getElementById("summary").innerHTML=

`

PLAN: ${plan}<br>

WORDS: ${words}<br>

TOTAL: $${(total/100).toFixed(2)}

`;



async function payStripe(){

const currency=document.getElementById("currency").value;

const res=await fetch(

"https://us-central1-saybon-3e3c2.cloudfunctions.net/api/stripe",

{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

amount:total,

currency

})

}

);

const data=await res.json();

location.href=data.url;

}



async function payPaystack(){

const res=await fetch(

"https://us-central1-saybon-3e3c2.cloudfunctions.net/api/paystack",

{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

email:"customer@saybon.com",

amount:total

})

}

);

const data=await res.json();

location.href=data.data.authorization_url;

}

</script>


</body>
</html>
