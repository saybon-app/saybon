<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Payment</title>

<link rel="stylesheet" href="payment.css">

</head>
<body>


<div class="payment-container">

<h1>Payment</h1>

<div class="payment-card">

<div class="row">
<span>Words</span>
<span id="payWords">—</span>
</div>

<div class="row">
<span>Delivery</span>
<span id="payDelivery">—</span>
</div>

<div class="row">
<span>Currency</span>

<select id="currency">

<option value="USD">USD</option>
<option value="GHS">GHS</option>

</select>

</div>


<div class="row total">

<span>Amount</span>
<span id="payAmount">—</span>

</div>


<button id="stripeBtn">

Pay with Stripe

</button>


<button id="paystackBtn">

Pay with Paystack

</button>


</div>


</div>


<script src="payment.js"></script>


</body>
</html>
