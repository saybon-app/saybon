<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SayBon • Payment</title>

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/translation/payment.css">
</head>

<body>
  <main class="paywrap">
    <section class="paycard" aria-label="Payment">
      <div class="payhead">
        <div class="brand">SayBon</div>
        <div class="title">Payment</div>
      </div>

      <div class="summary">
        <div class="row">
          <div class="k">Words</div>
          <div class="v" id="wordsText">—</div>
        </div>
        <div class="row">
          <div class="k">Delivery</div>
          <div class="v" id="deliveryText">—</div>
        </div>

        <div class="row">
          <label class="k" for="currencySelect">Currency</label>
          <div class="v">
            <select id="currencySelect" class="currency">
              <option value="USD">USD</option>
              <option value="GHS">GHS</option>
              <option value="GBP">GBP</option>
              <option value="EUR">EUR</option>
              <option value="NGN">NGN</option>
            </select>
          </div>
        </div>

        <div class="amount">
          <div class="k">Amount</div>
          <div class="v big" id="amountText">—</div>
        </div>
      </div>

      <div class="actions">
        <button id="stripeBtn" class="btn stripe" type="button">
          <span class="btnlabel">Pay with Stripe</span>
          <span class="btnspin" aria-hidden="true"></span>
        </button>

        <button id="paystackBtn" class="btn paystack" type="button">
          <span class="btnlabel">Pay with Paystack</span>
          <span class="btnspin" aria-hidden="true"></span>
        </button>
      </div>

      <div class="note" id="hint">
        Select a payment method to continue.
      </div>

      <div class="error" id="errorBox" role="alert" aria-live="polite"></div>
    </section>
  </main>

  <script src="/translation/payment.js"></script>
</body>
</html>
