<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#6e6e73;
}

.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
padding:35px;
border-radius:25px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
font-weight:500;
letter-spacing:2px;
margin-bottom:25px;
text-align:center;
}

.row{
margin-bottom:10px;
font-size:14px;
}

.label{
font-weight:500;
}

.payBtn{
margin-top:25px;
width:100%;
background:#1e8e8e;
color:white;
border:none;
padding:14px;
border-radius:12px;
cursor:pointer;
font-weight:500;
transition:.2s;
}

.payBtn:hover{
transform:translateY(-2px);
}

.payBtn:active{
transform:translateY(2px);
}

.job{
font-size:12px;
margin-bottom:20px;
color:#999;
text-align:center;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
CONFIRM TRANSLATION
</div>

<div class="job" id="jobCode"></div>

<div class="row">
<span class="label">Plan:</span>
<span id="plan"></span>
</div>

<div class="row">
<span class="label">Word Count:</span>
<span id="words"></span>
</div>

<div class="row">
<span class="label">Price:</span>
<span id="price"></span>
</div>

<div class="row">
<span class="label">Target Language:</span>
<span id="language"></span>
</div>

<button class="payBtn" onclick="startPayment()">
PAY NOW
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const plan = params.get("plan")
const words = params.get("words")
const price = params.get("price")
const language = params.get("language")
const email = params.get("email")

const jobCode = "SB-" + Math.floor(Math.random()*900000 + 100000)

document.getElementById("jobCode").innerText =
"Job Code: " + jobCode

document.getElementById("plan").innerText =
plan.toUpperCase()

document.getElementById("words").innerText =
words

document.getElementById("price").innerText =
"$" + price

document.getElementById("language").innerText =
language


function startPayment(){

fetch("https://YOUR_RENDER_SERVER/create-checkout-session",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

plan,
words,
price,
language,
email,
jobCode

})

})
.then(res=>res.json())
.then(data=>{
window.location.href=data.url
})

}

</script>

</body>

</html>
