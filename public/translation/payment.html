<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#374151;
-webkit-font-smoothing:antialiased;
}

.checkout{

background:rgba(255,255,255,0.75);
backdrop-filter:blur(20px);
padding:45px;
border-radius:28px;
width:460px;
box-shadow:0 15px 45px rgba(0,0,0,0.08);

}

.header{
text-align:center;
margin-bottom:30px;
}

.title{
font-size:22px;
font-weight:600;
letter-spacing:1px;
}

.subtitle{
font-size:12px;
color:#9ca3af;
margin-top:6px;
}

.job{
margin-top:15px;
font-size:12px;
color:#6b7280;
}

.section{
margin-top:20px;
border-top:1px solid #eee;
padding-top:15px;
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
font-size:14px;
}

.label{
color:#6b7280;
font-weight:500;
}

.value{
font-weight:500;
}

.plan{
padding:4px 12px;
border-radius:20px;
font-size:12px;
font-weight:500;
}

.standard{
background:#e6f6f6;
color:#1e8e8e;
}

.express{
background:#fdecec;
color:#ea4335;
}

.priceRow{
display:flex;
justify-content:space-between;
margin-top:20px;
font-size:18px;
font-weight:600;
}

.price{
color:#1e8e8e;
}

.payBtn{

margin-top:25px;
width:100%;
background:#1e8e8e;
color:white;
border:none;
padding:15px;
border-radius:14px;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:.2s;

}

.payBtn:hover{
transform:translateY(-2px);
}

.payBtn:active{
transform:translateY(2px);
}

.secure{
margin-top:12px;
font-size:11px;
text-align:center;
color:#9ca3af;
}

</style>

</head>

<body>

<div class="checkout">

<div class="header">

<div class="title">
Confirm Your Translation
</div>

<div class="subtitle">
Review your order before payment
</div>

<div class="job" id="jobCode"></div>

</div>


<div class="section">

<div class="row">
<span class="label">Plan</span>
<span id="plan"></span>
</div>

<div class="row">
<span class="label">Word Count</span>
<span id="words"></span>
</div>

<div class="row">
<span class="label">Target Language</span>
<span id="language"></span>
</div>

</div>


<div class="priceRow">

<span>Total</span>
<span id="price" class="price"></span>

</div>


<button class="payBtn" onclick="startPayment()">
Pay Securely
</button>

<div class="secure">
Secure payment powered by Stripe
</div>

</div>



<script>

const params = new URLSearchParams(window.location.search)

const plan = params.get("plan")
const words = params.get("words")
const price = params.get("price")
const language = params.get("language")
const email = params.get("email")

const jobCode = "SB-" + Math.floor(Math.random()*900000 + 100000)

document.getElementById("jobCode").innerText =
"Job Code: " + jobCode


const planElement = document.getElementById("plan")

planElement.innerText = plan.toUpperCase()

if(plan==="standard"){
planElement.classList.add("plan","standard")
}

if(plan==="express"){
planElement.classList.add("plan","express")
}


document.getElementById("words").innerText = words
document.getElementById("price").innerText = "$" + price
document.getElementById("language").innerText = language



async function startPayment(){

try{

const response = await fetch("https://YOUR-RENDER-BACKEND/create-checkout-session",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

plan:plan,
words:words,
price:price,
language:language,
email:email,
jobCode:jobCode

})

})

const data = await response.json()

window.location.href = data.url

}catch(error){

alert("Payment connection failed.")

}

}

</script>

</body>
</html>
