<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#4b5563;
-webkit-font-smoothing:antialiased;
}

.card{

background:rgba(255,255,255,0.75);
backdrop-filter:blur(20px);
padding:40px;
border-radius:28px;
width:440px;
box-shadow:0 12px 35px rgba(0,0,0,0.08);

}

.title{
font-weight:600;
letter-spacing:2px;
font-size:20px;
margin-bottom:10px;
text-align:center;
color:#374151;
}

.subtitle{
text-align:center;
font-size:12px;
color:#9ca3af;
margin-bottom:25px;
}

.job{
font-size:12px;
color:#6b7280;
text-align:center;
margin-bottom:25px;
}

.row{

display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
font-size:14px;

}

.label{
font-weight:500;
color:#6b7280;
}

.value{
font-weight:500;
color:#374151;
}

.plan{

padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:500;

}

.standard{
background:#e6f6f6;
color:#1e8e8e;
}

.express{
background:#fdecec;
color:#ea4335;
}

.price{

font-size:18px;
font-weight:600;
color:#1e8e8e;

}

.payBtn{

margin-top:30px;
width:100%;
background:#1e8e8e;
color:white;
border:none;
padding:14px;
border-radius:14px;
cursor:pointer;
font-weight:500;
transition:.2s;
font-size:15px;

}

.payBtn:hover{
transform:translateY(-2px);
}

.payBtn:active{
transform:translateY(2px);
}

</style>

</head>

<body>

<div class="card">

<div class="title">
CONFIRM TRANSLATION
</div>

<div class="subtitle">
Review your translation request before payment
</div>

<div class="job" id="jobCode"></div>

<div class="row">
<span class="label">Plan</span>
<span id="plan" class="value"></span>
</div>

<div class="row">
<span class="label">Word Count</span>
<span id="words" class="value"></span>
</div>

<div class="row">
<span class="label">Target Language</span>
<span id="language" class="value"></span>
</div>

<div class="row">
<span class="label">Price</span>
<span id="price" class="price"></span>
</div>

<button class="payBtn" onclick="startPayment()">
Pay Now
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const plan = params.get("plan")
const words = params.get("words")
const price = params.get("price")
const language = params.get("language")
const email = params.get("email")

const jobCode = "SB-" + Math.floor(Math.random()*900000 + 100000)

document.getElementById("jobCode").innerText =
"Job Code: " + jobCode

const planElement = document.getElementById("plan")

planElement.innerText = plan.toUpperCase()

if(plan === "standard"){
planElement.classList.add("plan","standard")
}

if(plan === "express"){
planElement.classList.add("plan","express")
}

document.getElementById("words").innerText =
words

document.getElementById("price").innerText =
"$" + price

document.getElementById("language").innerText =
language


function startPayment(){

fetch("https://YOUR_RENDER_SERVER/create-checkout-session",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

plan,
words,
price,
language,
email,
jobCode

})

})
.then(res=>res.json())
.then(data=>{
window.location.href=data.url
})

}

</script>

</body>

</html>
