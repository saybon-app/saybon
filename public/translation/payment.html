<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>SayBon Payment Test</title>
</head>

<body>

<h2>Stripe Payment Test</h2>

<button id="pay">Pay $1</button>

<script>

document.getElementById("pay").onclick = async () => {

const res = await fetch(
"https://saybon-server.onrender.com/api/stripe",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
amount: 1,
words: 10,
plan: "test"
})
}
)

const data = await res.json()

location = data.url

}

</script>

</body>

</html>
