<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SayBon Payment</title>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://js.stripe.com/v3/"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e293b;
padding:40px;
border-radius:12px;
width:400px;
text-align:center;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.paystack{
background:#00c3f7;
color:black;
}

.stripe{
background:#635bff;
color:white;
}
</style>

</head>
<body>

<div class="card">

<h2>Complete Payment</h2>

<button class="paystack" onclick="payWithPaystack()">
Pay with Paystack
</button>

<button class="stripe" onclick="payWithStripe()">
Pay with Stripe
</button>

</div>

<script>

const PAYSTACK_PUBLIC =
"pk_live_adbd997a6cb7382da7c9e3e77c0ca487b93d73ab";

const STRIPE_PUBLIC =
"pk_live_51T1FlJoJoEwCiVdJNyh6goTKNXpeNEhxPlN85Eu7QGJab8Ztkiba1TAdhab3nGPjKBb608Zym61XearWWCUji4jN000HfV9XkDe";

function getParams(){

const url=new URL(window.location.href);

return{

plan:url.searchParams.get("plan"),

words:url.searchParams.get("words")

};

}

function getAmount(){

const p=getParams();

const words=parseInt(p.words);

if(p.plan==="standard") return words*0.025;

if(p.plan==="express") return words*0.05;

return 10;

}

function payWithPaystack(){

const amount=getAmount()*100;

let handler=PaystackPop.setup({

key:PAYSTACK_PUBLIC,

email:"customer@saybonapp.com",

amount:amount,

currency:"USD",

callback:function(response){

window.location.href="/translation/success.html";

}

});

handler.openIframe();

}

function payWithStripe(){

fetch(
"https://us-central1-saybon-3a3c2.cloudfunctions.net/createStripeCheckout",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

amount:getAmount(),

email:"customer@saybonapp.com"

})
})
.then(res=>res.json())
.then(data=>{

const stripe=Stripe(STRIPE_PUBLIC);

stripe.redirectToCheckout({

sessionId:data.id

});

});

}

</script>

</body>
</html>
