<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Payment</title>

<style>

body{

margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;

background:linear-gradient(180deg,#eef2ff,#f8fafc);

display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.card{

background:white;
padding:35px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);

width:420px;
text-align:center;

}

h1{

margin-bottom:5px;

}

.sub{

color:#64748b;
font-size:14px;
margin-bottom:25px;

}

.amountBox{

background:#f1f5f9;
padding:20px;
border-radius:10px;
margin-bottom:25px;

}

.amount{

font-size:32px;
font-weight:bold;
margin-top:5px;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
margin-top:12px;
transition:0.2s;

}

.stripe{

background:linear-gradient(145deg,#2563eb,#1d4ed8);
color:white;

box-shadow:
0 6px 12px rgba(0,0,0,0.15),
inset 0 -2px 4px rgba(0,0,0,0.2);

}

.stripe:hover{

transform:translateY(-2px);

}

.paystack{

background:linear-gradient(145deg,#10b981,#059669);
color:white;

box-shadow:
0 6px 12px rgba(0,0,0,0.15),
inset 0 -2px 4px rgba(0,0,0,0.2);

}

.paystack:hover{

transform:translateY(-2px);

}

.secure{

margin-top:20px;
font-size:12px;
color:#64748b;

}

</style>

</head>
<body>


<div class="card">


<h1>Complete Payment</h1>

<div class="sub">

Secure checkout powered by Stripe & Paystack

</div>


<div class="amountBox">

Service:

<div class="amount" id="amount">

$0.00

</div>

</div>



<button class="stripe" onclick="payStripe()">

Pay with Card (Stripe)

</button>



<button class="paystack" onclick="payPaystack()">

Pay with Mobile Money / Bank (Paystack)

</button>



<div class="secure">

256-bit encryption • Secure • Confidential

</div>


</div>



<script>


/* =========================================
LOAD PAYMENT DATA
========================================= */

const paymentData = JSON.parse(

localStorage.getItem("saybon_payment")

);


let amount = 0;
let type = "Translation";
let currency = "USD";


if(paymentData){

amount = Number(paymentData.price);
type = paymentData.type;

document.getElementById("amount").innerHTML =

"$" + amount.toFixed(2);

}else{

alert("Payment session expired");

}



/* =========================================
STRIPE PAYMENT
========================================= */

async function payStripe(){

try{

const res = await fetch(

"https://saybon-backend.onrender.com/create-stripe-session",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount,
type,
currency

})

}

);


const data = await res.json();


if(data.url){

window.location.href = data.url;

}else{

alert("Stripe failed");

}

}
catch(error){

alert("Stripe error");

}

}



/* =========================================
PAYSTACK PAYMENT
========================================= */

async function payPaystack(){

try{

const res = await fetch(

"https://saybon-backend.onrender.com/create-paystack-session",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount,
currency,
email:"customer@saybonapp.com"

})

}

);


const data = await res.json();


if(data.url){

window.location.href = data.url;

}else{

alert("Paystack failed");

}

}
catch(error){

alert("Paystack error");

}

}


</script>


</body>
</html>
