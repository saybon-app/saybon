<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Payment</title>


<!-- Stripe -->
<script src="https://js.stripe.com/v3/"></script>

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>


<style>

body{

margin:0;
padding:0;

font-family:
-apple-system,
BlinkMacSystemFont,
Segoe UI,
Roboto;

background:
linear-gradient(
180deg,
#f8fafc,
#eef2ff
);

display:flex;
justify-content:center;

}



.container{

width:100%;
max-width:600px;

padding:40px 20px;

}



.card{

background:white;

padding:30px;

border-radius:14px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

}



h1{

margin:0;
margin-bottom:20px;

}



.summary{

background:#f8fafc;

padding:15px;

border-radius:10px;

margin-bottom:25px;

}



.payBtn{

width:100%;

padding:14px;

border:none;

border-radius:8px;

margin-top:10px;

font-size:16px;

cursor:pointer;

color:white;

}



.stripe{

background:#635bff;

}



.paystack{

background:#00c3f7;

}



</style>


</head>
<body>



<div class="container">


<div class="card">


<h1>Complete Payment</h1>


<div id="summary" class="summary">

Loading...

</div>



<button
class="payBtn stripe"
onclick="payStripe()">

Pay with Card (Stripe)

</button>



<button
class="payBtn paystack"
onclick="payPaystack()">

Pay with Paystack

</button>



</div>


</div>



<script>


/*
LOAD JOB
*/


const job = JSON.parse(

localStorage.getItem("saybon_payment")

);



document.getElementById("summary").innerHTML =

`

Type: ${job.type}

<br><br>

Words: ${job.words}

<br><br>

Delivery: ${job.time}

<br><br>

<b>Total: $${job.price}</b>

`;



/*
STRIPE
*/


function payStripe(){


const stripe = Stripe(

"pk_live_REPLACE_WITH_YOUR_KEY"

);



fetch(

"https://saybon-backend.onrender.com/create-stripe-session",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount:job.price,
type:job.type,
words:job.words

})

}

)

.then(res=>res.json())

.then(data=>{

stripe.redirectToCheckout({

sessionId:data.id

});

});


}




/*
PAYSTACK
*/


function payPaystack(){


let handler = PaystackPop.setup({


key:

"pk_live_REPLACE_WITH_YOUR_KEY",


email:

"user@saybonapp.com",


amount:

job.price * 100,


currency:

"USD",


callback:

function(response){

window.location.href =

"/translation/success.html";

},


onClose:

function(){

alert("Payment cancelled");

}


});


handler.openIframe();


}



</script>



</body>
</html>
