<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SayBon Payment</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>


body{

font-family:"Poppins",sans-serif;

background:#f4f6f8;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}



.card{

background:white;

padding:50px;

border-radius:18px;

width:380px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

text-align:center;

}



h1{

margin-bottom:30px;

font-weight:600;

}



.summary{

margin-bottom:25px;

line-height:1.7;

font-size:15px;

color:#444;

}



select{

width:100%;

padding:12px;

border-radius:8px;

border:1px solid #ddd;

margin-top:10px;

margin-bottom:20px;

font-family:"Poppins";

font-size:15px;

}



button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

margin-top:15px;

font-size:16px;

cursor:pointer;

font-family:"Poppins";

transition:all .2s ease;

}



button:hover{

transform:translateY(-2px);

box-shadow:0 6px 15px rgba(0,0,0,0.15);

}



button:active{

transform:scale(.96);

box-shadow:none;

}



.stripe{

background:#635bff;

color:white;

}



.paystack{

background:#00c3a5;

color:white;

}


</style>

</head>

<body>



<div class="card">


<h1>

Translation Payment

</h1>


<div class="summary" id="summary"></div>



<select id="currency">

<option value="usd">USD</option>

<option value="eur">EUR</option>

<option value="gbp">GBP</option>

<option value="cad">CAD</option>

<option value="aud">AUD</option>

<option value="ghs">GHS</option>

</select>



<button class="stripe" onclick="payStripe()">

Pay with Stripe

</button>



<button class="paystack" onclick="payPaystack()">

Pay with Paystack

</button>



</div>



<script>


const params=new URLSearchParams(window.location.search);


const words=parseInt(params.get("words")||0);


const plan=params.get("plan")||"standard";


const rate=plan==="express"?0.05:0.025;


const total=Math.round(words*rate*100);



document.getElementById("summary").innerHTML=`

Plan: ${plan}<br>

Words: ${words}<br>

Total: $${(total/100).toFixed(2)}

`;



async function payStripe(){


const currency=document.getElementById("currency").value;


const button=document.querySelector(".stripe");


button.innerText="Processing...";


button.disabled=true;



try{


const res=await fetch(

"https://us-central1-saybon-3e3c2.cloudfunctions.net/api/stripe",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

amount:total,

currency

})

}

);


const data=await res.json();


if(data.url){

window.location=data.url;

}


}catch(e){

alert("Payment failed");

button.innerText="Pay with Stripe";

button.disabled=false;

}


}



async function payPaystack(){


const button=document.querySelector(".paystack");


button.innerText="Processing...";


button.disabled=true;



try{


const res=await fetch(

"https://us-central1-saybon-3e3c2.cloudfunctions.net/api/paystack",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

email:"customer@saybon.com",

amount:total

})

}

);


const data=await res.json();


window.location=data.data.authorization_url;


}catch(e){

alert("Payment failed");

button.innerText="Pay with Paystack";

button.disabled=false;

}


}



</script>



</body>

</html>
