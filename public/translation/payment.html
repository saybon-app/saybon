<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Payment</title>

<style>

body{

margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;

background:linear-gradient(180deg,#eef2ff,#f8fafc);

display:flex;
justify-content:center;
align-items:center;
height:100vh;

}


/* CARD */

.card{

background:white;

padding:35px;

border-radius:18px;

box-shadow:

0 20px 50px rgba(0,0,0,0.12);

width:420px;

text-align:center;

}


/* TEXT */

h1{

margin-bottom:5px;

}


.sub{

color:#64748b;

font-size:14px;

margin-bottom:20px;

}


/* AMOUNT BOX */

.amountBox{

background:#f1f5f9;

padding:20px;

border-radius:12px;

margin-bottom:20px;

}


.amount{

font-size:34px;

font-weight:bold;

margin-top:5px;

}


/* CURRENCY SELECTOR */

select{

width:100%;

padding:10px;

border-radius:8px;

border:1px solid #cbd5e1;

margin-top:10px;

font-size:14px;

}


/* BUTTON BASE */

button{

width:100%;

padding:13px;

border:none;

border-radius:10px;

font-size:15px;

cursor:pointer;

margin-top:14px;

transition:all 0.15s ease;

}


/* HOVER */

button:hover{

transform:translateY(-2px);

box-shadow:0 10px 18px rgba(0,0,0,0.18);

}


/* CLICK PRESS */

button:active{

transform:scale(0.97);

box-shadow:0 3px 8px rgba(0,0,0,0.25) inset;

}


/* STRIPE */

.stripe{

background:

linear-gradient(145deg,#2563eb,#1d4ed8);

color:white;

}


/* PAYSTACK */

.paystack{

background:

linear-gradient(145deg,#10b981,#059669);

color:white;

}


/* FOOTER */

.secure{

margin-top:20px;

font-size:12px;

color:#64748b;

}

</style>

</head>
<body>



<div class="card">


<h1>Complete Payment</h1>


<div class="sub">

Secure checkout powered by Stripe & Paystack

</div>



<div class="amountBox">

Service Amount

<div class="amount" id="amount">

$0.00

</div>


<select id="currency">

<option value="USD">$ USD</option>

<option value="GHS">₵ Ghana Cedis</option>

<option value="EUR">€ Euro</option>

<option value="GBP">£ Pound</option>

</select>


</div>



<button class="stripe" onclick="payStripe()">

Pay with Card (Stripe)

</button>



<button class="paystack" onclick="payPaystack()">

Pay with Mobile Money / Bank

</button>



<div class="secure">

256-bit encryption • Secure • Confidential

</div>


</div>




<script>


/* BACKEND */

const BACKEND = "https://saybon-backend.onrender.com";



/* LOAD PAYMENT */

const paymentData = JSON.parse(

localStorage.getItem("saybon_payment")

);


let baseAmount = paymentData ? paymentData.price : 0;

let currency = "USD";



/* CONVERSION RATES */

const rates = {

USD:1,

GHS:15,

EUR:0.92,

GBP:0.78

};



function updateAmount(){

currency = document.getElementById("currency").value;

let converted = baseAmount * rates[currency];

document.getElementById("amount").innerHTML =

currencySymbol(currency) + converted.toFixed(2);

}


function currencySymbol(cur){

if(cur=="USD")return "$";

if(cur=="GHS")return "₵";

if(cur=="EUR")return "€";

if(cur=="GBP")return "£";

}


updateAmount();


document.getElementById("currency")

.addEventListener("change",updateAmount);




/* STRIPE */

async function payStripe(){

try{

const res = await fetch(

BACKEND + "/create-stripe-session",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

amount: baseAmount,

type: paymentData.type,

currency: currency

})

}

);


const data = await res.json();

window.location.href = data.url;

}
catch{

alert("Stripe failed");

}

}




/* PAYSTACK */

async function payPaystack(){

try{

const res = await fetch(

BACKEND + "/create-paystack-session",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

amount: baseAmount,

currency: currency,

email:"customer@saybonapp.com"

})

}

);


const data = await res.json();

window.location.href = data.url;

}
catch{

alert("Paystack failed");

}

}


</script>



</body>
</html>
