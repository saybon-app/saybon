<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirm Translation – SayBon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
color:#6e6e73;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
-webkit-font-smoothing:antialiased;
}

.card{

background:rgba(255,255,255,0.6);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;

}

.title{

letter-spacing:3px;
font-weight:500;
margin-bottom:15px;

}

.job{

font-size:12px;
margin-bottom:20px;
color:#9aa0a6;

}

.row{

margin:10px 0;
font-size:14px;

}

.label{

color:#8a8a8a;

}

.value{

font-weight:500;

}

.price{

font-size:28px;
font-weight:600;
margin-top:15px;

}

.payBtn{

margin-top:25px;
width:100%;
background:#1e8e8e;
color:white;
border:none;
padding:14px;
border-radius:12px;
font-weight:500;
cursor:pointer;
transition:.2s;

}

.payBtn:hover{

transform:translateY(-2px);

}

.payBtn:active{

transform:translateY(2px);

}

.note{

font-size:11px;
margin-top:10px;
color:#9aa0a6;

}

</style>

</head>


<body>

<div class="card">

<div class="title">
CONFIRM TRANSLATION
</div>

<div class="job" id="jobCode"></div>

<div class="row">
<span class="label">Plan:</span>
<span class="value" id="plan"></span>
</div>

<div class="row">
<span class="label">Word Count:</span>
<span class="value" id="words"></span>
</div>

<div class="row">
<span class="label">Target Language:</span>
<span class="value" id="language"></span>
</div>

<div class="price" id="pricePreview">
Calculating price...
</div>

<button class="payBtn" onclick="startPayment()">
PAY SECURELY
</button>

<div class="note">
Payments processed securely via Stripe
</div>

</div>


<script>

const params = new URLSearchParams(window.location.search)

const plan = params.get("plan")
const words = parseInt(params.get("words"))
const language = params.get("language")
const email = params.get("email")

document.getElementById("plan").innerText = plan.toUpperCase()
document.getElementById("words").innerText = words
document.getElementById("language").innerText = language

// Generate job code

const job = "SB-" + Date.now().toString().slice(-6)

document.getElementById("jobCode").innerText = "Job Code: " + job

// Frontend estimate (server calculates real price)

let rate = plan === "express" ? 0.05 : 0.025
let total = Math.max(words,100) * rate

document.getElementById("pricePreview").innerText = "$" + total.toFixed(2)


// Start Stripe Checkout

async function startPayment(){

const res = await fetch(
"https://saybon-server-1.onrender.com/create-checkout-session",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

plan:plan,
words:words,
language:language,
email:email,
job:job

})

})

const data = await res.json()

window.location = data.url

}

</script>


</body>
</html>
