<!DOCTYPE html>
<html>
<head>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://js.stripe.com/v3/"></script>

</head>

<body>


<button onclick="payPaystack()">Pay with Paystack</button>

<button onclick="payStripe()">Pay with Stripe</button>


<script>


// INSERT YOUR REAL PUBLIC KEYS HERE

const PAYSTACK_PUBLIC_KEY = "pk_live_REPLACE";
const STRIPE_PUBLIC_KEY = "pk_live_REPLACE";



function payPaystack()
{

let handler = PaystackPop.setup({

key: PAYSTACK_PUBLIC_KEY,

email: "customer@saybon.com",

amount: 5000,

currency: "GHS",

callback: function(response)
{

window.location.href =
"/translation/success.html?ref=" + response.reference;

}

});

handler.openIframe();

}




async function payStripe()
{

const stripe = Stripe(STRIPE_PUBLIC_KEY);

const res =
await fetch("/create-stripe-session",
{

method: "POST"

});

const data = await res.json();

stripe.redirectToCheckout({

sessionId: data.id

});

}



</script>


</body>
</html>
