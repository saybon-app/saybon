<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="format-detection"
content="telephone=no, email=no, address=no, date=no">

<meta name="apple-mobile-web-app-capable"
content="yes">

<title>Payment</title>

<link rel="stylesheet" href="translation.css">

</head>

<body>


<div class="payment-card">


<h2>Translation Payment</h2>


<div class="summary">


<div class="row">

<div>Plan</div>

<div id="plan">standard</div>

</div>


<div class="row">

<div>Words</div>

<div id="words">172</div>

</div>


<div class="row">

<div>Total</div>

<div id="total">US.30</div>

</div>


</div>



<label>

Email (required for Paystack)

</label>


<input type="email"
placeholder="you@example.com">



<label>

Currency

</label>


<select>

<option>USD</option>

<option>GHS</option>

</select>



<button class="btn-stripe">

Pay with Stripe

</button>


<button class="btn-paystack">

Pay with Paystack

</button>



</div>



<script>

const params =
new URLSearchParams(window.location.search)

const words =
params.get("words")

const plan =
params.get("plan")

document.getElementById("plan")
.innerText = plan


document.getElementById("words")
.innerText = words


document.getElementById("total")
.innerText =

"US$" +
(words * 0.025).toFixed(2)

</script>


</body>

</html>
