<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Payment</title>

<style>

body{

margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;

background:linear-gradient(180deg,#eef2ff,#f8fafc);

display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.card{

background:white;
padding:35px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);

width:420px;
text-align:center;

}

h1{

margin-bottom:5px;

}

.sub{

color:#64748b;
font-size:14px;
margin-bottom:25px;

}

.amountBox{

background:#f1f5f9;
padding:20px;
border-radius:10px;
margin-bottom:15px;

}

.amount{

font-size:32px;
font-weight:bold;
margin-top:5px;

}

select{

width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #cbd5e1;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
margin-top:12px;
transition:0.2s;

}

.stripe{

background:linear-gradient(145deg,#2563eb,#1d4ed8);
color:white;

box-shadow:
0 6px 12px rgba(0,0,0,0.15),
inset 0 -2px 4px rgba(0,0,0,0.2);

}

.paystack{

background:linear-gradient(145deg,#10b981,#059669);
color:white;

box-shadow:
0 6px 12px rgba(0,0,0,0.15),
inset 0 -2px 4px rgba(0,0,0,0.2);

}

.secure{

margin-top:20px;
font-size:12px;
color:#64748b;

}

</style>

</head>
<body>


<div class="card">


<h1>Complete Payment</h1>

<div class="sub">

Secure checkout powered by Stripe & Paystack

</div>


<div class="amountBox">

Service:

<div class="amount" id="amount">

$0.00

</div>


<select id="currencySelect" onchange="updateCurrency()">

<option value="USD">USD ($)</option>

<option value="GHS">GHS (₵)</option>

<option value="EUR">EUR (€)</option>

<option value="GBP">GBP (£)</option>

</select>

</div>



<button class="stripe" onclick="payStripe()">

Pay with Card (Stripe)

</button>



<button class="paystack" onclick="payPaystack()">

Pay with Mobile Money / Bank (Paystack)

</button>



<div class="secure">

256-bit encryption • Secure • Confidential

</div>


</div>



<script>


/*
LOAD PAYMENT DATA
*/

const paymentData =
JSON.parse(localStorage.getItem("saybon_payment"));


let baseAmount =
paymentData ? Number(paymentData.price) : 0;


let currency="USD";


/*
Conversion rates
*/

const rates={

USD:1,

GHS:15,

EUR:0.92,

GBP:0.78

};



function updateCurrency(){

currency=
document.getElementById("currencySelect").value;

const converted=
baseAmount*rates[currency];


document.getElementById("amount").innerHTML=

currencySymbol(currency)+
converted.toFixed(2);

}


function currencySymbol(cur){

if(cur==="USD") return "$";

if(cur==="GHS") return "₵";

if(cur==="EUR") return "€";

if(cur==="GBP") return "£";

}


updateCurrency();



/*
STRIPE PAYMENT
*/

async function payStripe(){

const amount=
baseAmount*rates[currency];


const res=
await fetch(

"https://saybon-backend.onrender.com/create-stripe-session",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount,

currency,

type:"Translation"

})

}

);


const data=
await res.json();


window.location.href=data.url;

}



/*
PAYSTACK PAYMENT
*/

async function payPaystack(){

const amount=
baseAmount*rates[currency];


const res=
await fetch(

"https://saybon-backend.onrender.com/create-paystack-session",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount,

currency,

email:"customer@saybonapp.com"

})

}

);


const data=
await res.json();


window.location.href=data.url;

}


</script>


</body>
</html>
