<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Payment</title>

<script src="https://js.stripe.com/v3/"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{

margin:0;
padding:0;

font-family:
-apple-system,
BlinkMacSystemFont,
Segoe UI,
Roboto;

background:
linear-gradient(
180deg,
#f1f5f9,
#e0e7ff
);

display:flex;
justify-content:center;

}


/* CARD */

.container{

max-width:600px;
width:100%;
padding:40px 20px;

}


.card{

background:white;

border-radius:16px;

padding:30px;

box-shadow:
0 20px 60px rgba(0,0,0,0.15);

}


/* HEADER */

h1{

margin:0;
margin-bottom:10px;

font-size:28px;

}


.sub{

color:#64748b;
margin-bottom:25px;

}


/* SUMMARY */

.summary{

background:#f8fafc;

padding:20px;

border-radius:10px;

margin-bottom:25px;

}


.price{

font-size:28px;
font-weight:bold;
margin-top:10px;

}


/* SMALLER BUTTONS */

.payBtn{

width:100%;

padding:12px;

border-radius:10px;

border:none;

font-size:15px;

margin-top:12px;

cursor:pointer;

transition:0.2s;

}


/* STRIPE */

.stripe{

background:
linear-gradient(
145deg,
#635bff,
#4338ca
);

color:white;

box-shadow:
0 4px 0 #312e81,
0 10px 20px rgba(0,0,0,0.2);

}


.stripe:hover{

transform:translateY(1px);

}


/* PAYSTACK */

.paystack{

background:
linear-gradient(
145deg,
#00c3a3,
#059669
);

color:white;

box-shadow:
0 4px 0 #065f46,
0 10px 20px rgba(0,0,0,0.2);

}


.paystack:hover{

transform:translateY(1px);

}


.secure{

margin-top:20px;
font-size:13px;
color:#64748b;

}

</style>

</head>
<body>


<div class="container">

<div class="card">

<h1>Complete Payment</h1>

<div class="sub">

Secure checkout powered by Stripe & Paystack

</div>


<div class="summary">

Service:
<b id="type">Loading...</b>

<div class="price">

$<span id="amount">0.00</span>

</div>

</div>



<button class="payBtn stripe"
onclick="payWithStripe()">

Pay with Card (Stripe)

</button>



<button class="payBtn paystack"
onclick="payWithPaystack()">

Pay with Mobile Money / Bank (Paystack)

</button>



<div class="secure">

256-bit encryption • Secure • Confidential

</div>


</div>

</div>



<script>


/*
FIXED PARAM READING
*/

const params = new URLSearchParams(window.location.search);

const amount = params.get("amount") || "0";

const type = params.get("type") || "Translation";


document.getElementById("amount").innerText =
Number(amount).toFixed(2);

document.getElementById("type").innerText =
type;



/* STRIPE */

async function payWithStripe(){

const res = await fetch(

"https://saybon-backend.onrender.com/create-stripe-payment",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount:amount,
type:type

})

});


const data = await res.json();

window.location = data.url;

}



/* PAYSTACK */

function payWithPaystack(){

let handler = PaystackPop.setup({

key:"pk_live_REPLACE_THIS",

email:"customer@saybonapp.com",

amount:amount * 100,

currency:"USD",

callback:function(response){

alert("Payment successful");

window.location="success.html";

},

onClose:function(){

alert("Payment cancelled");

}

});


handler.openIframe();

}


</script>


</body>
</html>
