<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Translator Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
padding:40px;
color:#444;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:40px;
}

.field{
margin-bottom:25px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

.notice{
font-size:13px;
margin-top:6px;
}

.accept{color:green}
.reject{color:red}

/* Upload bucket */

#uploadBucket{
border:1px solid #ddd;
border-radius:8px;
padding:12px;
background:#fafafa;
min-height:60px;
font-size:14px;
}

/* buttons */

.buttons{
margin-top:30px;
display:flex;
gap:20px;
}

.btn{
padding:12px 20px;
border-radius:8px;
border:none;
font-size:15px;
cursor:pointer;
box-shadow:0 6px 0 rgba(0,0,0,0.25);
transition:all .15s ease;
}

.btn:disabled{
opacity:0.5;
cursor:not-allowed;
box-shadow:none;
}

.btn:hover:not(:disabled){
transform:translateY(-2px);
}

.btn:active:not(:disabled){
transform:translateY(4px);
box-shadow:0 2px 0 rgba(0,0,0,0.25);
}

.testBtn{background:#22c55e;color:white}
.submitBtn{background:#2563eb;color:white}

.removeBtn{
background:none;
border:none;
color:red;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Translator Registration</h1>

<div class="field">
<label>Email</label>
<input id="email">
</div>

<div class="field">
<label>Phone</label>
<input id="phone">
</div>

<div class="field">
<label>Country</label>
<input id="country">
</div>

<div class="field">
<label>Years of Translation Experience</label>
<input id="experience" type="number">
</div>

<div class="field">
<label>Upload National ID</label>
<input type="file" id="idUpload">
<div class="notice" id="idNotice"></div>
</div>

<div class="field">
<label>Upload Certification</label>
<input type="file" id="certUpload" multiple>
<div class="notice" id="certNotice"></div>
</div>

<div class="field">
<label>Upload CV</label>
<input type="file" id="cvUpload" multiple>
<div class="notice" id="cvNotice"></div>
</div>

<div class="field">
<label>Uploaded Documents</label>
<div id="uploadBucket"></div>
</div>

<div class="buttons">

<button id="testBtn" class="btn testBtn" disabled>
Begin Translator Test
</button>

<button id="submitBtn" class="btn submitBtn" disabled>
Submit Application
</button>

</div>

</div>

<script>

/* ======================
FIELDS
====================== */

const fields=[
document.getElementById("email"),
document.getElementById("phone"),
document.getElementById("country"),
document.getElementById("experience")
]

const idUpload=document.getElementById("idUpload")
const certUpload=document.getElementById("certUpload")
const cvUpload=document.getElementById("cvUpload")

const idNotice=document.getElementById("idNotice")
const certNotice=document.getElementById("certNotice")
const cvNotice=document.getElementById("cvNotice")

const uploadBucket=document.getElementById("uploadBucket")

const testBtn=document.getElementById("testBtn")
const submitBtn=document.getElementById("submitBtn")

/* ======================
VALIDATION
====================== */

const allowed=["pdf","doc","docx","png","jpg","jpeg"]

let idValid=false
let certValid=false
let cvValid=false

function validateFiles(files,notice){

let valid=true
notice.innerHTML=""

for(let file of files){

let ext=file.name.split(".").pop().toLowerCase()

if(!allowed.includes(ext)){
notice.innerHTML+="✖ "+file.name+" invalid<br>"
valid=false
continue
}

if(file.size>10000000){
notice.innerHTML+="✖ "+file.name+" too large<br>"
valid=false
continue
}

notice.innerHTML+="✓ "+file.name+" accepted<br>"

}

notice.className=valid?"notice accept":"notice reject"

return valid

}

/* ======================
UPLOAD BUCKET
====================== */

let uploaded=[]

function renderBucket(){

uploadBucket.innerHTML=""

uploaded.forEach((file,index)=>{

let row=document.createElement("div")

let name=document.createElement("span")
name.innerHTML="📄 "+file.name

let remove=document.createElement("button")
remove.innerHTML="✕"
remove.className="removeBtn"

remove.onclick=()=>{
uploaded.splice(index,1)
renderBucket()
}

row.appendChild(name)
row.appendChild(remove)

uploadBucket.appendChild(row)

})

}

function addToBucket(files){

for(let file of files){
uploaded.push(file)
}

renderBucket()

}

/* ======================
UPLOAD EVENTS
====================== */

idUpload.onchange=()=>{
idValid=validateFiles(idUpload.files,idNotice)
addToBucket(idUpload.files)
checkForm()
}

certUpload.onchange=()=>{
certValid=validateFiles(certUpload.files,certNotice)
addToBucket(certUpload.files)
checkForm()
}

cvUpload.onchange=()=>{
cvValid=validateFiles(cvUpload.files,cvNotice)
addToBucket(cvUpload.files)
checkForm()
}

/* ======================
FORM CHECK
====================== */

fields.forEach(f=>{
f.oninput=checkForm
})

function checkForm(){

let filled=true

fields.forEach(f=>{
if(!f.value) filled=false
})

if(filled && idValid && certValid && cvValid){
testBtn.disabled=false
submitBtn.disabled=false
}else{
testBtn.disabled=true
submitBtn.disabled=true
}

}

/* ======================
BUTTONS
====================== */

testBtn.onclick=()=>{
window.location="/translation/translator-test.html"
}

submitBtn.onclick=()=>{
alert("Application submitted")
window.location="/translation/translators.html"
}

</script>

</body>
</html>
<script type="module" src="/translation/translator-register.js"></script>
