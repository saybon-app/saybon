<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Translator Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
padding:40px;
color:#444;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:40px;
}

.field{
margin-bottom:25px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

.notice{
font-size:13px;
margin-top:6px;
}

.accept{ color:green }
.reject{ color:red }

/* ======================
UPLOAD BUCKET
====================== */

#uploadBucket{

border:1px solid #ddd;
border-radius:8px;
padding:12px;
background:#fafafa;
min-height:60px;
font-size:14px;

}

#uploadBucket div{
padding:6px 8px;
border-bottom:1px solid #eee;
}

#uploadBucket div:last-child{
border-bottom:none;
}

/* ======================
BUTTONS
====================== */

.buttons{
margin-top:30px;
display:flex;
gap:20px;
}

/* 3D BUTTON STYLE */

.btn{

padding:12px 20px;
border-radius:8px;
border:none;
font-size:15px;
cursor:pointer;

box-shadow:0 6px 0 rgba(0,0,0,0.25);
transition:all .15s ease;

}

.btn:disabled{
opacity:0.5;
cursor:not-allowed;
box-shadow:none;
}

.btn:hover:not(:disabled){
transform:translateY(-2px);
}

.btn:active:not(:disabled){
transform:translateY(4px);
box-shadow:0 2px 0 rgba(0,0,0,0.25);
}

.testBtn{
background:#22c55e;
color:white;
}

.submitBtn{
background:#2563eb;
color:white;
}

</style>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">

/* =================================
FIREBASE INIT
================================= */

const firebaseConfig={
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()
const storage=firebase.storage()

/* =================================
UPLOAD FUNCTION
================================= */

async function uploadFile(path,file){

const ref=storage.ref().child(path)

await ref.put(file)

return await ref.getDownloadURL()

}

/* =================================
SUBMIT APPLICATION
================================= */

submitBtn.onclick=async()=>{

submitBtn.innerText="Uploading..."
submitBtn.disabled=true

const email=document.getElementById("email").value
const phone=document.getElementById("phone").value
const country=document.getElementById("country").value
const experience=document.getElementById("experience").value

try{

/* NATIONAL ID */

let idFile=idUpload.files[0]

let idURL=await uploadFile(
"translator-applications/"+email+"/id/"+idFile.name,
idFile
)

/* CV FILES */

let cvURLs=[]

for(let file of cvUpload.files){

let url=await uploadFile(
"translator-applications/"+email+"/cv/"+file.name,
file
)

cvURLs.push(url)

}

/* CERTIFICATIONS */

let certURLs=[]

for(let file of certUpload.files){

let url=await uploadFile(
"translator-applications/"+email+"/certificates/"+file.name,
file
)

certURLs.push(url)

}

/* CREATE APPLICATION */

await db.collection("translatorApplications").add({

email,
phone,
country,
experience,

idFile:idURL,
cvFiles:cvURLs,
certificates:certURLs,

status:"pending",
createdAt:new Date()

})

alert("Application submitted successfully")

window.location="/translation/translators.html"

}catch(err){

console.error(err)

alert("Upload failed. Please try again.")

submitBtn.innerText="Submit Application"
submitBtn.disabled=false

}

}

<body>

<div class="container">

<h1>Translator Registration</h1>

<div class="field">
<label>Email</label>
<input id="email">
</div>

<div class="field">
<label>Phone</label>
<input id="phone">
</div>

<div class="field">
<label>Country</label>
<input id="country">
</div>

<div class="field">
<label>Years of Translation Experience</label>
<input id="experience" type="number">
</div>

<div class="field">
<label>Upload National ID</label>
<input type="file" id="idUpload">
<div class="notice" id="idNotice"></div>
</div>

<div class="field">
<label>Upload Certification</label>
<input type="file" id="certUpload" multiple>
<div class="notice" id="certNotice"></div>
</div>

<div class="field">
<label>Upload CV / Resume</label>
<input type="file" id="cvUpload" multiple>
<div class="notice" id="cvNotice"></div>
</div>

<div class="field">

<label>Uploaded Documents</label>

<div id="uploadBucket">

</div>

</div>

<div class="buttons">

<button id="testBtn" class="btn testBtn" disabled>
Begin Translator Test
</button>

<button id="submitBtn" class="btn submitBtn" disabled>
Submit Application
</button>

</div>

</div>

<script>

/* ================================
FIELDS
================================ */

const fields=[
document.getElementById("email"),
document.getElementById("phone"),
document.getElementById("country"),
document.getElementById("experience")
]

const idUpload=document.getElementById("idUpload")
const certUpload=document.getElementById("certUpload")
const cvUpload=document.getElementById("cvUpload")

const idNotice=document.getElementById("idNotice")
const certNotice=document.getElementById("certNotice")
const cvNotice=document.getElementById("cvNotice")

const uploadBucket=document.getElementById("uploadBucket")

const testBtn=document.getElementById("testBtn")
const submitBtn=document.getElementById("submitBtn")

/* ================================
FILE RULES
================================ */

const allowed=["pdf","doc","docx","png","jpg","jpeg"]

let idValid=false
let certValid=false
let cvValid=false

/* ================================
VALIDATE FILES
================================ */

function validateFiles(files,notice){

let valid=true

notice.innerHTML=""

for(let file of files){

let ext=file.name.split(".").pop().toLowerCase()

if(!allowed.includes(ext)){

notice.innerHTML+="? "+file.name+" invalid file type<br>"
valid=false
continue

}

if(file.size>10000000){

notice.innerHTML+="? "+file.name+" too large (max 10MB)<br>"
valid=false
continue

}

notice.innerHTML+="? "+file.name+" accepted<br>"

}

notice.className= valid ? "notice accept":"notice reject"

return valid

}

/* ================================
UPLOAD BUCKET
================================ */

let uploaded=[]

function addToBucket(files){

if(uploadBucket.innerHTML===""){

uploadBucket.innerHTML=""

}

for(let file of files){

uploaded.push(file)

let row=document.createElement("div")

row.innerHTML="?? "+file.name

uploadBucket.appendChild(row)

}

}

/* ================================
UPLOAD EVENTS
================================ */

idUpload.onchange=()=>{

idValid=validateFiles(idUpload.files,idNotice)

addToBucket(idUpload.files,"id")

checkForm()

}

certUpload.onchange=()=>{

certValid=validateFiles(certUpload.files,certNotice)

addToBucket(certUpload.files,"cert")

checkForm()

}

cvUpload.onchange=()=>{

cvValid=validateFiles(cvUpload.files,cvNotice)

addToBucket(cvUpload.files,"cv")

checkForm()

}

/* ================================
FORM CHECK
================================ */

fields.forEach(f=>{
f.oninput=checkForm
})

function checkForm(){

let filled=true

fields.forEach(f=>{
if(!f.value) filled=false
})

if(filled && idValid && certValid && cvValid){

testBtn.disabled=false
submitBtn.disabled=false

}else{

testBtn.disabled=true
submitBtn.disabled=true

}

}

/* ================================
BUTTON ACTIONS
================================ */

testBtn.onclick=()=>{

window.location="/translation/translator-test.html"

}

submitBtn.onclick=()=>{

alert("Application submitted. Our team will review your documents.")

window.location="/translation/translators.html"

}
