
<html>
<body>

<h2>Translator Access</h2>

<input id="key" placeholder="Enter Passkey">

<button onclick="login()">Enter</button>

<script>

async function login(){

const key=document.getElementById("key").value

const res=await fetch("/api/verifyTranslatorKey",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({key})

})

const data=await res.json()

if(data.valid){

sessionStorage.setItem("translatorKey",key)

window.location="/translation/translator-dashboard.html"

}else{

alert("Invalid key")

}

}

</script>

</body>
</html>
