<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful • SayBon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:#444;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
max-width:420px;
}

h1{
margin-top:0;
color:#1e8e8e;
}

p{
line-height:1.6;
}

.button{
margin-top:20px;
display:inline-block;
background:#1e8e8e;
color:white;
padding:12px 22px;
border-radius:10px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

<h1>Payment Successful</h1>

<p>
Thank you for your translation request.
</p>

<p>
Our team has received your order and will begin processing your document shortly.
</p>

<p id="session"></p>

<a class="button" href="/translation/request.html">
Submit Another Document
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const sessionId = params.get("session_id")

if(sessionId){
document.getElementById("session").innerText =
"Order reference: " + sessionId
}

</script>

</body>
</html>
