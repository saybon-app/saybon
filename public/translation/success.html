<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Success</title>

<style>

body{
font-family:Poppins,Arial;
background:#f6f8ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:400px;
}

h1{
color:#2d8cff;
}

</style>

</head>

<body>

<div class="card">

<h1>Payment Successful</h1>

<p id="details">Loading payment...</p>

</div>

<script>

const qs = new URLSearchParams(location.search)

const sessionId = qs.get("session_id")

if(!sessionId){

alert("Missing Stripe session ID")

}else{

fetch("https://saybon-server.onrender.com/api/stripeSession/"+sessionId)
.then(r=>r.json())
.then(data=>{

document.getElementById("details").innerHTML =
"Amount Paid: $" + (data.amount/100).toFixed(2) +
"<br>" +
data.metadata.words + " words"

})
.catch(()=>{

document.getElementById("details").innerHTML="Payment confirmed"

})

}

</script>

</body>
</html>
