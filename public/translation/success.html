<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment Successful — SayBon</title>
<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
    color:#6e6e73;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:min(720px, 100%);
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(18px);
    border-radius:28px;
    box-shadow:0 16px 40px rgba(0,0,0,0.10);
    padding:28px;
  }
  h1{
    margin:0 0 10px 0;
    letter-spacing:1px;
    color:#3a3a3c;
    font-size:28px;
  }
  .sub{
    margin:0 0 18px 0;
    font-size:13px;
    letter-spacing:1px;
    color:#6e6e73;
  }
  .status{
    margin-top:14px;
    padding:14px;
    border-radius:14px;
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(255,255,255,0.55);
    font-size:14px;
    line-height:1.45;
  }
  .row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:16px;
  }
  .btn{
    border:none;
    border-radius:12px;
    padding:12px 16px;
    cursor:pointer;
    font-weight:600;
  }
  .primary{
    background:#1e8e8e;
    color:white;
  }
  .ghost{
    background:transparent;
    border:1px solid rgba(0,0,0,0.12);
    color:#3a3a3c;
  }
  .small{
    font-size:12px;
    opacity:0.85;
    margin-top:10px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Payment Completed</h1>
  <p class="sub">Thank you — your payment is being verified securely.</p>

  <div class="status" id="statusBox">
    Verifying payment…
  </div>

  <div class="row">
    <button class="btn primary" onclick="goSaybon()">Back to SayBon</button>
    <button class="btn ghost" onclick="verifyNow()">Verify Now</button>
  </div>

  <div class="small">
    If verification takes a moment, you can still go back to SayBon — we will record the order once verified.
  </div>
</div>

<script>
  function qp(name){
    const u = new URL(window.location.href);
    return u.searchParams.get(name) || "";
  }

  function goSaybon(){
    window.location.href = "/dashboard.html";
  }

  function setStatus(msg){
    document.getElementById("statusBox").innerText = msg;
  }

  async function verifyNow(){
    const provider = (qp("provider") || "").toLowerCase();
    const plan = qp("plan");
    const words = qp("words");
    const email = qp("email");
    const currency = qp("currency");
    const amount = qp("amount");

    try{
      if(provider === "stripe"){
        const session_id = qp("session_id");
        if(!session_id){
          setStatus("Payment completed. Missing Stripe session id — unable to verify automatically.");
          return;
        }

        const r = await fetch("/api/verify/stripe", {
          method:"POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({ session_id, plan, words, email, currency, amount })
        });

        const j = await r.json();
        if(!r.ok) throw new Error(j.error || "Stripe verification failed.");

        setStatus("Verified ✅\nYour translation order has been recorded.\nReference: " + (j.reference || "stripe"));

        return;
      }

      if(provider === "paystack"){
        const reference = qp("reference") || qp("trxref");
        if(!reference){
          setStatus("Payment completed. Missing Paystack reference — unable to verify automatically.");
          return;
        }

        const r = await fetch("/api/verify/paystack", {
          method:"POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({ reference, plan, words, email, currency, amount })
        });

        const j = await r.json();
        if(!r.ok) throw new Error(j.error || "Paystack verification failed.");

        setStatus("Verified ✅\nYour translation order has been recorded.\nReference: " + (j.reference || reference));

        return;
      }

      setStatus("Payment completed. Provider not detected — unable to verify automatically.");
    }catch(e){
      setStatus("Verification pending…\n" + (e.message || "Could not verify now."));
    }
  }

  // auto verify on load
  verifyNow();
</script>

</body>
</html>
