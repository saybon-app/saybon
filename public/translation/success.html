<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
background:#e7e4de;
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
letter-spacing:.08em;
line-height:1.7;
}

.invoice{

width:640px;
background:#1b1f27;
padding:55px;
border-radius:16px;
color:white;

box-shadow:0 20px 60px rgba(0,0,0,.35);

position:relative;

}

.pdfBtn{

position:absolute;
top:18px;
right:22px;

font-size:28px;
cursor:pointer;
transition:.2s;

}

.pdfBtn:hover{

transform:scale(1.2);

}

.pdfBtn:active{

transform:scale(.9);

}

.brand{

text-align:center;
font-size:22px;
letter-spacing:.35em;
color:#d4b16a;
margin-bottom:8px;

}

.company{

text-align:center;
font-size:12px;
opacity:.7;
margin-bottom:40px;

}

.section{

background:#141820;
padding:18px;
border-radius:10px;
margin-bottom:35px;
font-size:13px;

}

.row{

display:flex;
justify-content:space-between;
margin:6px 0;

}

.table{

width:100%;
border-collapse:collapse;
margin-top:25px;
font-size:13px;

}

.table th{

text-align:left;
border-bottom:2px solid #caa458;
padding-bottom:10px;

}

.table td{

padding:14px 0;
border-bottom:1px solid #333;

}

.summary{

margin-top:30px;
display:flex;
justify-content:flex-end;
font-size:13px;

}

.summaryBox{

text-align:right;
line-height:2;

}

.total{

font-size:18px;
font-weight:600;

}

.deskButton{

margin-top:40px;
width:100%;
padding:18px;
border-radius:18px;
border:none;

font-family:Quicksand;
font-weight:600;
letter-spacing:.35em;
font-size:14px;

color:white;

background:linear-gradient(135deg,#38b6b6,#2a8c8c);

box-shadow:
0 15px 40px rgba(0,0,0,.25),
inset 0 1px rgba(255,255,255,.25);

cursor:pointer;
transition:.25s;

}

.deskButton:hover{

transform:translateY(-3px);

}

.deskButton:active{

transform:scale(.96);

}

</style>

</head>

<body>

<div class="invoice" id="invoice">

<div class="pdfBtn" onclick="downloadInvoice()">📄</div>

<div class="brand">
SAYBON TRANSLATION SERVICES
</div>

<div class="company">
Accra, Ghana<br>
support@saybonapp.com<br>
saybonapp.com
</div>

<div class="section">

<div class="row">
<div>Invoice ID</div>
<div id="job"></div>
</div>

<div class="row">
<div>Client</div>
<div id="email"></div>
</div>

<div class="row">
<div>Plan</div>
<div id="plan"></div>
</div>

<div class="row">
<div>Target Language</div>
<div id="Target Language"></div>
</div>

<div class="row">
<div>Delivery Timeline</div>
<div id="timeline"></div>
</div>

</div>

<table class="table">

<tr>
<th>Item</th>
<th>Rate</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>

<tr>
<td>Professional Translation</td>
<td id="rate"></td>
<td id="words"></td>
<td id="price"></td>
</tr>

</table>

<div class="summary">

<div class="summaryBox">

<div>Subtotal: <span id="subtotal"></span></div>

<div class="total">TOTAL: <span id="total"></span></div>

</div>

</div>

<button class="deskButton" onclick="openDesk()">
TRANSLATION DESK
</button>

</div>


<script>

const firebaseConfig={

apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"

}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const params=new URLSearchParams(window.location.search)

const job=params.get("job")

db.collection("translationJobs").doc(job).get().then(doc=>{

const data=doc.data()

document.getElementById("job").innerText=data.jobId
document.getElementById("email").innerText=data.email
document.getElementById("plan").innerText=data.plan
document.getElementById("Target Language").innerText=data.targetTarget Language

let rate=data.plan==="express"?0.05:0.025

document.getElementById("rate").innerText="$"+rate
document.getElementById("words").innerText=data.wordCount

document.getElementById("price").innerText="$"+data.price.toFixed(2)

document.getElementById("subtotal").innerText="$"+data.price.toFixed(2)

document.getElementById("total").innerText="$"+data.price.toFixed(2)

if(data.plan==="express"){

document.getElementById("timeline").innerText="24 Hours"

}else{

document.getElementById("timeline").innerText="2-3 Days"

}

})

function openDesk(){

const job=new URLSearchParams(window.location.search).get("job")

window.location="/translation/desk.html?job="+job

}

function downloadInvoice(){

html2pdf().from(document.getElementById("invoice")).save("SayBon-Invoice.pdf")

}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
