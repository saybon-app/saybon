<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Poppins;
background:#eef2f6;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.invoice{

width:720px;
background:white;
padding:50px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;

}

.brand{

font-size:26px;
font-weight:600;
letter-spacing:1px;

}

.invoiceTitle{

font-size:20px;
font-weight:500;

}

.section{

margin-bottom:25px;

}

.table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

.table th{

text-align:left;
border-bottom:1px solid #ddd;
padding:10px;

}

.table td{

padding:10px;

}

.total{

text-align:right;
font-size:18px;
font-weight:600;
margin-top:20px;

}

.status{

margin-top:20px;
font-weight:500;
color:#1e8e8e;

}

.buttons{

margin-top:30px;
display:flex;
gap:15px;

}

button{

padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e8e8e;
color:white;
font-size:14px;

}

.secondary{

background:#444;

}

</style>

</head>

<body>

<div class="invoice" id="invoice">

<div class="header">

<div class="brand">
SayBon
</div>

<div class="invoiceTitle">
TRANSLATION INVOICE
</div>

</div>

<div class="section">

<div>
Invoice Number: <span id="jobId"></span>
</div>

<div>
Date: <span id="date"></span>
</div>

<div>
Client: <span id="email"></span>
</div>

</div>

<table class="table">

<tr>
<th>Description</th>
<th>Words</th>
<th>Rate</th>
<th>Total</th>
</tr>

<tr>
<td id="description"></td>
<td id="words"></td>
<td id="rate"></td>
<td id="price"></td>
</tr>

</table>

<div class="total">

TOTAL: $<span id="total"></span>

</div>

<div class="status">

Payment Status: <span id="status"></span>

</div>

<div class="buttons">

<button onclick="downloadPDF()">
Download PDF
</button>

<button class="secondary"
onclick="location.href='/translation/desk.html'">

Translation Desk

</button>

</div>

</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

const params = new URLSearchParams(window.location.search)

const jobId = params.get("job")

async function loadInvoice(){

const doc = await db.collection("translationJobs").doc(jobId).get()

const data = doc.data()

document.getElementById("jobId").innerText=data.jobId
document.getElementById("date").innerText=new Date(data.createdAt.seconds*1000).toDateString()
document.getElementById("email").innerText=data.email

document.getElementById("description").innerText=data.targetLanguage+" Translation"
document.getElementById("words").innerText=data.wordCount

let rate=data.plan==="express"?0.05:0.025

document.getElementById("rate").innerText="$"+rate

document.getElementById("price").innerText="$"+data.price
document.getElementById("total").innerText=data.price

document.getElementById("status").innerText=data.status

}

loadInvoice()

function downloadPDF(){

const element=document.getElementById("invoice")

html2pdf().from(element).save("SayBon-Invoice-"+jobId+".pdf")

}

</script>

</body>

</html>
