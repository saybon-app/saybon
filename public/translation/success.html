<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Payment Successful • SayBon</title>

<style>

body{
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:linear-gradient(180deg,#ecfdf5,#f0fdf4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
max-width:500px;
width:90%;
text-align:center;

}

.icon{

font-size:60px;
margin-bottom:20px;

}

h1{

margin:0;
margin-bottom:10px;
color:#16a34a;

}

.details{

margin-top:20px;
background:#f8fafc;
padding:15px;
border-radius:10px;
font-size:14px;

}

button{

margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#2563eb,#4f46e5);
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

opacity:0.9;

}

.small{

margin-top:10px;
font-size:13px;
color:#64748b;

}

</style>

</head>
<body>

<div class="card">

<div class="icon">
✅
</div>

<h1>
Payment Successful
</h1>

<div>
Thank you. Your translation order has been received.
</div>


<div class="details" id="details">

Loading order details...

</div>


<button onclick="goHome()">

Return Home

</button>


<div class="small">

A confirmation email will be sent.

</div>


</div>


<script>


function getSessionId(){

const params=new URLSearchParams(window.location.search);

return params.get("session_id");

}


async function loadSession(){

const sessionId=getSessionId();

if(!sessionId){

document.getElementById("details").innerHTML=

"No session information found.";

return;

}


try{


const res=await fetch(

"https://saybon-backend.onrender.com/stripe/session/"+sessionId

);


const data=await res.json();


if(!data.success){

throw new Error();

}


document.getElementById("details").innerHTML=

`

Amount Paid:

<b>$${(data.amount/100).toFixed(2)}</b>

<br><br>

Status:

<b>${data.status}</b>

<br><br>

Reference:

<br>

${data.id}

`;


}
catch{

document.getElementById("details").innerHTML=

"Payment confirmed.";

}


}


function goHome(){

window.location.href="/translation/request.html";

}


loadSession();


</script>


</body>
</html>
