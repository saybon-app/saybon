<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful — SayBon</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{

background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);

padding:40px;
border-radius:20px;

width:500px;
max-width:90%;

text-align:center;

box-shadow:
0 0 40px rgba(0,0,0,0.3),
inset 0 0 20px rgba(255,255,255,0.05);

}

.check{

font-size:70px;
margin-bottom:20px;

}

h1{

margin:0;
margin-bottom:10px;

}

p{

opacity:0.8;

}

.button{

margin-top:25px;

background: linear-gradient(90deg,#6366f1,#06b6d4);

border:none;
color:white;

padding:15px 30px;
border-radius:12px;

font-size:16px;

cursor:pointer;

}

.button:hover{

opacity:0.9;

}

.small{

margin-top:15px;
font-size:13px;
opacity:0.6;

}

</style>

</head>

<body>

<div class="card">

<div class="check">✓</div>

<h1>Payment Successful</h1>

<p>Your SayBon translation order has been received.</p>

<div id="ref" class="small"></div>

<button class="button"
onclick="window.location.href='/translation/request.html'">

Submit Another Translation

</button>

</div>


<script>

const params = new URLSearchParams(window.location.search);

const stripeSession = params.get("session_id");

const paystackRef = params.get("reference");

if(stripeSession){

document.getElementById("ref").innerText =
"Stripe reference: " + stripeSession;

}

else if(paystackRef){

document.getElementById("ref").innerText =
"Paystack reference: " + paystackRef;

}

else{

document.getElementById("ref").innerText =
"Payment reference received.";

}

</script>

</body>
</html>
