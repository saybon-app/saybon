<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f2f4f7;
padding:40px;
}

.invoice{
background:white;
max-width:900px;
margin:auto;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header{
display:flex;
justify-content:space-between;
background:#4c5c72;
color:white;
padding:28px;
margin-bottom:30px;
}

.total{
font-size:34px;
font-weight:600;
text-align:right;
}

.actions{
margin-top:30px;
text-align:center;
}

button{
padding:12px 22px;
border:none;
border-radius:6px;
cursor:pointer;
margin:8px;
}

</style>

</head>

<body>

<div class="invoice">

<div class="header">

<h1>SayBon Language Services</h1>
<h2>Invoice</h2>

</div>

<div>

Job Code: <span id="jobCode"></span><br>
Date: <span id="date"></span>

</div>

<br>

<div class="total">

$<span id="total"></span>

</div>

<div class="actions">

<button onclick="window.print()">Download PDF</button>

<button onclick="openDesk()">Open Translation Desk</button>

</div>

</div>

<script>

const params = new URLSearchParams(location.search);

const sessionId = params.get("session_id");

let jobCode="";

async function init(){

const confirm = await fetch(
"https://saybon-server.onrender.com/api/confirmPayment/"+sessionId
);

const job = await confirm.json();

jobCode = job.jobCode;

document.getElementById("jobCode").innerText = job.jobCode;

document.getElementById("total").innerText = job.amount;

document.getElementById("date").innerText =
new Date().toLocaleDateString();

}

function openDesk(){

location="/translation/translation-desk.html?job="+jobCode;

}

init();

</script>

</body>

</html>
