<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:#0f1115;
display:flex;
justify-content:center;
padding:60px;
color:#e8e8e8;
}

.invoice{

width:760px;
background:#1b1f27;
padding:50px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;

}

.brand{

font-size:26px;
font-weight:600;
letter-spacing:1px;

}

.invoiceTitle{

font-size:18px;
color:#9aa4b2;

}

.section{

margin-bottom:25px;
line-height:1.8;

}

table{

width:100%;
border-collapse:collapse;
margin-top:25px;

}

th{

text-align:left;
padding:12px;
background:#12151c;
border-bottom:2px solid #2f3642;

}

td{

padding:12px;
border-bottom:1px solid #2f3642;

}

.totalRow{

font-weight:600;
font-size:16px;

}

.status{

margin-top:20px;
font-weight:500;
color:#3ddc97;

}

.buttons{

margin-top:40px;
display:flex;
gap:15px;

}

button{

padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e8e8e;
color:white;
font-size:14px;

}

.secondary{

background:#444;

}

.download{

background:#3a7afe;

}

</style>

</head>


<body>

<div class="invoice" id="invoice">

<div class="header">

<div class="brand">
SayBon Translation Services
</div>

<div class="invoiceTitle">
PROFESSIONAL TRANSLATION INVOICE
</div>

</div>

<div class="section">

<div>Invoice Number: <span id="jobId"></span></div>
<div>Client: <span id="email"></span></div>
<div>Date: <span id="date"></span></div>

</div>


<table>

<thead>

<tr>
<th>Description</th>
<th>Words</th>
<th>Rate</th>
<th>Total</th>
</tr>

</thead>

<tbody>

<tr>
<td id="description"></td>
<td id="words"></td>
<td id="rate"></td>
<td id="price"></td>
</tr>

<tr class="totalRow">
<td colspan="3">TOTAL</td>
<td id="total"></td>
</tr>

</tbody>

</table>

<div class="section">

<div>Source Language: <span id="source"></span></div>
<div>Target Language: <span id="target"></span></div>
<div>Document Name: <span id="document"></span></div>
<div>Delivery Deadline: <span id="deadline"></span></div>

</div>

<div class="status">

Payment Status: <span id="status"></span>

</div>

<div class="buttons">

<button class="download" onclick="downloadPDF()">
Download Invoice PDF
</button>

<button onclick="downloadFile()">
Download Document
</button>

<button class="secondary"
onclick="location.href='/translation/desk.html'">

Translation Desk

</button>

</div>

</div>



<script>

const firebaseConfig={

apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"

}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const params=new URLSearchParams(window.location.search)

const jobId=params.get("job")

let documentURL=""

async function loadInvoice(){

const doc=await db.collection("translationJobs").doc(jobId).get()

const data=doc.data()

document.getElementById("jobId").innerText=data.jobId
document.getElementById("email").innerText=data.email
document.getElementById("date").innerText=new Date(data.createdAt.seconds*1000).toDateString()

document.getElementById("source").innerText=data.sourceLanguage
document.getElementById("target").innerText=data.targetLanguage

document.getElementById("document").innerText=data.documentName

document.getElementById("deadline").innerText=data.deadline

document.getElementById("description").innerText=data.targetLanguage+" Translation"

document.getElementById("words").innerText=data.wordCount

let rate=data.plan==="express"?0.05:0.025

document.getElementById("rate").innerText="$"+rate

document.getElementById("price").innerText="$"+data.price
document.getElementById("total").innerText="$"+data.price

document.getElementById("status").innerText=data.status

documentURL=data.documentURL

}

loadInvoice()


function downloadFile(){

window.open(documentURL,"_blank")

}

function downloadPDF(){

const element=document.getElementById("invoice")

html2pdf().from(element).save("SayBon-Invoice-"+jobId+".pdf")

}

</script>


</body>
</html>
