<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SayBon | Payment Success</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#f6f7fb; }
    .wrap { max-width: 780px; margin: 60px auto; padding: 0 16px; }
    .card { background:#fff; border:1px solid rgba(0,0,0,0.08); border-radius:14px; padding:22px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    h1 { margin:0 0 10px 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .muted { color:#444; }
    .ok { color:#0a7a44; font-weight:700; }
    .err { color:#b00020; white-space:pre-wrap; }
    a { color:#635bff; }
    button { border:none; background:#111; color:#fff; padding:10px 12px; border-radius:12px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="ok">Payment Completed (Verification Pending)</h1>
      <div class="muted">
        Provider: <span class="mono" id="provider">—</span><br/>
        This page can also verify your payment by calling the backend.
      </div>

      <div style="height:14px;"></div>

      <button id="verifyBtn" type="button">Verify Payment</button>

      <div style="height:14px;"></div>
      <div id="out" class="mono"></div>
      <div id="err" class="err"></div>

      <div style="height:18px;"></div>
      <a href="./request.html">Back to Translation Request</a>
    </div>
  </div>

<script>
(function(){
  const url = new URL(window.location.href);
  const provider = url.searchParams.get("provider") || "unknown";
  document.getElementById("provider").textContent = provider;

  const out = document.getElementById("out");
  const err = document.getElementById("err");

  async function verify() {
    out.textContent = "";
    err.textContent = "";

    try {
      let verifyUrl = "";
      if (provider === "stripe") {
        const session_id = url.searchParams.get("session_id");
        if (!session_id) throw new Error("Missing session_id. Stripe should return with ?session_id=...");
        verifyUrl = `/api/verify/stripe?session_id=${encodeURIComponent(session_id)}`;
      } else if (provider === "paystack") {
        const reference = url.searchParams.get("reference");
        if (!reference) throw new Error("Missing reference. Paystack should return with ?reference=...");
        verifyUrl = `/api/verify/paystack?reference=${encodeURIComponent(reference)}`;
      } else {
        throw new Error("Unknown provider. Cannot verify.");
      }

      const res = await fetch(verifyUrl);
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || ("Verify failed: HTTP " + res.status));
      out.textContent = JSON.stringify(data, null, 2);
    } catch(e) {
      err.textContent = String(e.message || e);
    }
  }

  document.getElementById("verifyBtn").addEventListener("click", verify);
})();
</script>

</body>
</html>
