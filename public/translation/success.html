<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SayBon Translation Invoice</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{

font-family:Poppins;
background:#eef2f6;
display:flex;
justify-content:center;
padding:40px;

}

.invoice{

background:white;
padding:40px;
width:600px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);

}

h1{

text-align:center;
margin-bottom:20px;

}

.row{

margin:10px 0;

}

button{

margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#1e8e8e;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<div class="invoice" id="invoice">

<h1>SayBon Translation Invoice</h1>

<div class="row">Job Code: <span id="job"></span></div>

<div class="row">Plan: <span id="plan"></span></div>

<div class="row">Word Count: <span id="words"></span></div>

<div class="row">Language: <span id="language"></span></div>

<div class="row">Price: $<span id="price"></span></div>

<div class="row">Status: <span id="status"></span></div>

<div class="row">Date: <span id="date"></span></div>

<button onclick="downloadPDF()">Download Invoice PDF</button>

<button onclick="location.href='/translation/dashboard.html'">
Translation Desk
</button>

</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

const params = new URLSearchParams(window.location.search)

const jobId = params.get("job")

async function loadJob(){

const doc = await db.collection("translationJobs")
.doc(jobId)
.get()

const data = doc.data()

document.getElementById("job").innerText=data.jobId
document.getElementById("plan").innerText=data.plan
document.getElementById("words").innerText=data.wordCount
document.getElementById("language").innerText=data.targetLanguage
document.getElementById("price").innerText=data.price
document.getElementById("status").innerText=data.status
document.getElementById("date").innerText=data.createdAt.toDate().toDateString()

}

loadJob()

function downloadPDF(){

const element = document.getElementById("invoice")

html2pdf().from(element).save("SayBon-Invoice.pdf")

}

</script>

</body>

</html>
