<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{

margin:0;
font-family:Poppins;
background:#0f1117;
display:flex;
justify-content:center;
padding:60px;
color:#e8ecf3;

}

.invoice{

width:620px;
background:#1c2130;
padding:45px;
border-radius:12px;
box-shadow:0 0 40px rgba(30,142,142,0.15);

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

}

.brand{

font-size:22px;
font-weight:600;
letter-spacing:0.5px;

}

.pdf{

font-size:22px;
cursor:pointer;

}

.section{

margin-bottom:20px;
line-height:1.8;
color:#9aa4b2;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th{

text-align:left;
padding:12px;
background:#12151c;
border-bottom:2px solid #2f3642;

}

td{

padding:12px;
border-bottom:1px solid #2f3642;

}

.totalRow{

font-weight:600;
font-size:15px;

}

.status{

margin-top:20px;
color:#4fd1c5;
font-weight:500;

}

.glassButton{

margin-top:35px;
padding:12px 22px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
backdrop-filter:blur(6px);
color:white;
cursor:pointer;
transition:0.2s;

}

.glassButton:hover{

transform:translateY(-2px);
background:rgba(255,255,255,0.12);

}

</style>

</head>

<body>

<div class="invoice" id="invoice">

<div class="header">

<div class="brand">
SayBon Translation Services
</div>

<div class="pdf" onclick="downloadPDF()">??</div>

</div>

<div class="section">

<div>Invoice Number: <span id="jobId"></span></div>
<div>Client Email: <span id="email"></span></div>
<div>Date: <span id="date"></span></div>

</div>

<table>

<thead>

<tr>
<th>Description</th>
<th>Words</th>
<th>Rate</th>
<th>Total</th>
</tr>

</thead>

<tbody>

<tr>

<td id="description"></td>
<td id="words"></td>
<td id="rate"></td>
<td id="price"></td>

</tr>

<tr class="totalRow">

<td colspan="3">TOTAL</td>
<td id="total"></td>

</tr>

</tbody>

</table>

<div class="section">

<div>Source Language: <span id="source"></span></div>
<div>Target Language: <span id="target"></span></div>
<div>Document Name: <span id="document"></span></div>
<div>Delivery Timeline: <span id="timeline"></span></div>

</div>

<div class="status">

Payment Status: <span id="status"></span>

</div>

<button class="glassButton"
onclick="location.href='/translation/desk.html'">

Translation Desk

</button>

</div>


<script>

const firebaseConfig={

apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"

}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()


async function loadInvoice(){

const snapshot=await db.collection("translationJobs")
.orderBy("createdAt","desc")
.limit(1)
.get()

if(snapshot.empty){

alert("No translation job found")

return

}

const data=snapshot.docs[0].data()

document.getElementById("jobId").innerText=data.jobId
document.getElementById("email").innerText=data.email

document.getElementById("date").innerText=new Date(data.createdAt.toDate()).toDateString()

document.getElementById("description").innerText=data.targetLanguage+" Translation"

document.getElementById("words").innerText=data.wordCount

let rate=data.plan==="express"?0.05:0.025

document.getElementById("rate").innerText="$"+rate

document.getElementById("price").innerText="$"+data.price
document.getElementById("total").innerText="$"+data.price

document.getElementById("source").innerText=data.sourceLanguage
document.getElementById("target").innerText=data.targetLanguage
document.getElementById("document").innerText=data.documentName
document.getElementById("timeline").innerText=data.deadline

document.getElementById("status").innerText=data.status

}

loadInvoice()


function downloadPDF(){

const element=document.getElementById("invoice")

html2pdf().from(element).save("SayBon-Invoice.pdf")

}

</script>

</body>
</html>
