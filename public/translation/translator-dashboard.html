<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translator Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#f4f6fb;
}

header{
background:#1f2a44;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
}

button{
padding:8px 14px;
border:none;
background:#2c7be5;
color:white;
border-radius:6px;
cursor:pointer;
}

button:disabled{
background:#999;
}

</style>

</head>

<body>

<header>

<h2>SAYBON TRANSLATOR DASHBOARD</h2>

</header>

<div class="container">

<h3>Available Jobs</h3>

<table>

<tr>
<th>Job ID</th>
<th>Words</th>
<th>Deadline</th>
<th>Plan</th>
<th>Accepted</th>
<th></th>
</tr>

<tbody id="jobRows">

</tbody>

</table>

</div>

<script src="job-engine.js"></script>

</body>

</html>
