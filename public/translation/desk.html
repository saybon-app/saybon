<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Desk</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Inter;
height:100vh;
background:url("https://images.unsplash.com/photo-1618221195710-dd6b41faaea6") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.35);
}

.card{

position:relative;
z-index:2;

width:760px;

background:rgba(255,255,255,0.93);

border-radius:22px;

padding:50px;

box-shadow:
0 40px 100px rgba(0,0,0,0.45);

}

.title{
font-family:"Playfair Display";
font-size:28px;
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:40px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.label{
color:#888;
}

.value{
font-weight:600;
}

.progress{
margin-top:40px;
}

.step{
display:flex;
align-items:center;
margin:12px 0;
font-size:14px;
}

.check{

width:20px;
height:20px;
border-radius:50%;
border:2px solid #bbb;
margin-right:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;

}

.done{
border-color:#3aa46f;
background:#3aa46f;
color:white;
animation:pop .4s ease;
}

@keyframes pop{
0%{transform:scale(.4)}
100%{transform:scale(1)}
}

.timerWrapper{
margin-top:40px;
display:flex;
justify-content:center;
}

.timer{

width:120px;
height:120px;

border-radius:50%;

border:8px solid #ddd;

display:flex;
align-items:center;
justify-content:center;

font-weight:600;

font-size:18px;

position:relative;

}

.timer::after{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:8px solid rgba(0,0,0,0.1);
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{transform:scale(1);opacity:.8}
50%{transform:scale(1.08);opacity:.4}
100%{transform:scale(1);opacity:.8}

}

.dashboardButton{

position:fixed;
bottom:30px;

left:50%;
transform:translateX(-50%);

background:white;

padding:14px 28px;

border-radius:30px;

font-size:14px;

text-decoration:none;

color:#333;

box-shadow:0 10px 30px rgba(0,0,0,.35);

transition:.25s;

}

.dashboardButton:hover{

transform:translateX(-50%) translateY(-3px);
box-shadow:0 18px 40px rgba(0,0,0,.45);

}

.dashboardButton:active{

transform:translateX(-50%) scale(.96);

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="card">

<div class="title">
SayBon Translation Desk
</div>

<div class="subtitle">
Welcome back. Your translation is being carefully prepared.
</div>

<div class="row">
<div class="label">Job Code</div>
<div class="value" id="jobId"></div>
</div>

<div class="row">
<div class="label">Client</div>
<div class="value" id="email"></div>
</div>

<div class="row">
<div class="label">Word Count</div>
<div class="value" id="words"></div>
</div>

<div class="row">
<div class="label">Target Language</div>
<div class="value" id="language"></div>
</div>

<div class="row">
<div class="label">Plan</div>
<div class="value" id="plan"></div>
</div>

<div class="row">
<div class="label">Price</div>
<div class="value" id="price"></div>
</div>

<div class="progress">

<div class="step">
<div class="check done">✓</div>
Payment received
</div>

<div class="step">
<div class="check done">✓</div>
Translation queued
</div>

<div class="step">
<div class="check" id="progressCheck"></div>
Translation in progress
</div>

<div class="step">
<div class="check"></div>
Quality review
</div>

<div class="step">
<div class="check"></div>
Delivery
</div>

</div>

<div class="timerWrapper">
<div class="timer" id="timer">--</div>
</div>

</div>

<a href="/dashboard/index.html" class="dashboardButton">
Return to Dashboard
</a>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"
};

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const params=new URLSearchParams(window.location.search)
const jobId=params.get("job")

let countdown

function startTimer(minutes){

let time=minutes*60

countdown=setInterval(()=>{

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=m+":"+String(s).padStart(2,"0")

time--

if(time<=0){
clearInterval(countdown)
}

},1000)

}

async function loadJob(){

const doc=await db.collection("translationJobs").doc(jobId).get()

if(!doc.exists){
alert("Job not found")
return
}

const data=doc.data()

document.getElementById("jobId").innerText=jobId
document.getElementById("email").innerText=data.email
document.getElementById("words").innerText=data.wordCount
document.getElementById("language").innerText=data.targetLanguage
document.getElementById("plan").innerText=data.plan
document.getElementById("price").innerText="$"+data.price

const minutes=data.wordCount*0.6

startTimer(minutes)

document.getElementById("progressCheck").classList.add("done")
document.getElementById("progressCheck").innerText="✓"

}

loadJob()

</script>

</body>
</html>
