<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Study</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:"Merriweather",serif;
background-image:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#2b2b2b;
}

.overlay{
background:rgba(0,0,0,0.45);
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

.container{

position:relative;
z-index:2;

width:820px;

background:#f6f1e7;

padding:50px;

border-radius:12px;

box-shadow:0 30px 80px rgba(0,0,0,.6);

}

.title{

font-family:"Libre Baskerville";

font-size:28px;

text-align:center;

margin-bottom:10px;

color:#3a2a1e;

}

.subtitle{

text-align:center;

margin-bottom:40px;

font-size:14px;

color:#6c5a4d;

}

.row{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px solid #e3d8c8;

}

.label{

color:#8a7767;

}

.value{

font-weight:600;

}

.progress{

margin-top:40px;

}

.progress h3{

font-size:16px;

margin-bottom:12px;

}

.step{

margin:6px 0;

font-size:14px;

}

.done{

color:#3f7a45;

}

.pending{

color:#999;

}

.timer{

margin-top:30px;

text-align:center;

font-weight:600;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="title">
SayBon Translation Study
</div>

<div class="subtitle">
Your document is being carefully prepared by our translators
</div>

<div class="row">
<div class="label">Job Code</div>
<div class="value" id="jobId"></div>
</div>

<div class="row">
<div class="label">Client</div>
<div class="value" id="email"></div>
</div>

<div class="row">
<div class="label">Word Count</div>
<div class="value" id="words"></div>
</div>

<div class="row">
<div class="label">Target Language</div>
<div class="value" id="language"></div>
</div>

<div class="row">
<div class="label">Plan</div>
<div class="value" id="plan"></div>
</div>

<div class="row">
<div class="label">Price</div>
<div class="value" id="price"></div>
</div>

<div class="progress">

<h3>Translation Journey</h3>

<div class="step done">✓ Payment received</div>
<div class="step done">✓ Document received</div>
<div class="step">● Translation in progress</div>
<div class="step pending">○ Quality review</div>
<div class="step pending">○ Delivery</div>

</div>

<div class="timer" id="timer">
Estimated delivery calculating...
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"
};

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const params=new URLSearchParams(window.location.search)
const jobId=params.get("job")

async function loadJob(){

const doc=await db.collection("translationJobs").doc(jobId).get()

if(!doc.exists){
alert("Job not found")
return
}

const data=doc.data()

document.getElementById("jobId").innerText=jobId
document.getElementById("email").innerText=data.email
document.getElementById("words").innerText=data.wordCount
document.getElementById("language").innerText=data.targetLanguage
document.getElementById("plan").innerText=data.plan
document.getElementById("price").innerText="$"+data.price

let minutes = data.wordCount * 0.6

let hours = Math.floor(minutes/60)
let mins = Math.floor(minutes%60)

document.getElementById("timer").innerText =
"Estimated Delivery: "+hours+"h "+mins+"m"

}

loadJob()

</script>

</body>

</html>
