<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Desk</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:linear-gradient(180deg,#1a1d23,#0f1116);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:950px;
background:rgba(35,38,45,0.85);
border-radius:18px;
padding:50px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.title{
text-align:center;
font-family:Poppins;
font-size:26px;
letter-spacing:.18em;
margin-bottom:30px;
color:#8ad2c8;
}

.greeting{
text-align:center;
margin-bottom:40px;
opacity:.8;
}

.jobPanel{
margin-top:30px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.06);
}

.label{
opacity:.6;
}

.value{
color:#d7e6e3;
}

.progressContainer{
margin-top:40px;
}

.progressTitle{
margin-bottom:10px;
font-size:14px;
letter-spacing:.1em;
opacity:.8;
}

.progressBar{
width:100%;
height:10px;
background:#111826;
border-radius:20px;
overflow:hidden;
}

.progressFill{
height:100%;
width:20%;
background:linear-gradient(90deg,#6bbfb2,#a6e3d8);
transition:width 1s ease;
}

.activity{
margin-top:40px;
}

.activityTitle{
font-size:14px;
letter-spacing:.1em;
margin-bottom:12px;
opacity:.8;
}

.log{
font-size:13px;
margin:4px 0;
opacity:.7;
}

.timer{
margin-top:40px;
text-align:center;
font-size:18px;
letter-spacing:.08em;
color:#8ad2c8;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
SAYBON TRANSLATION DESK
</div>

<div id="greeting" class="greeting">
Loading your translation...
</div>

<div id="jobPanel" class="jobPanel" style="display:none">

<div class="row">
<div class="label">JOB CODE</div>
<div class="value" id="jobId"></div>
</div>

<div class="row">
<div class="label">CLIENT</div>
<div class="value" id="email"></div>
</div>

<div class="row">
<div class="label">WORD COUNT</div>
<div class="value" id="words"></div>
</div>

<div class="row">
<div class="label">TARGET LANGUAGE</div>
<div class="value" id="language"></div>
</div>

<div class="row">
<div class="label">PLAN</div>
<div class="value" id="plan"></div>
</div>

<div class="row">
<div class="label">PRICE</div>
<div class="value" id="price"></div>
</div>

<div class="progressContainer">

<div class="progressTitle">
TRANSLATION PROGRESS
</div>

<div class="progressBar">
<div id="progressFill" class="progressFill"></div>
</div>

</div>

<div class="activity">

<div class="activityTitle">
ACTIVITY
</div>

<div class="log">✓ Payment received</div>
<div class="log">• Translation queued</div>
<div class="log">• Waiting for translator</div>

</div>

<div class="timer" id="timer">
Estimated Delivery: Calculating...
</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2",
storageBucket:"saybon-3e3c2.firebasestorage.app",
messagingSenderId:"75085012344",
appId:"1:75085012344:web:0b18581cb0a30c3df47c8d"
};

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const params=new URLSearchParams(window.location.search)
const jobId=params.get("job")

async function loadJob(){

const doc=await db.collection("translationJobs").doc(jobId).get()

if(!doc.exists){

document.getElementById("greeting").innerText="Job not found"
return

}

const data=doc.data()

document.getElementById("jobId").innerText=jobId
document.getElementById("email").innerText=data.email
document.getElementById("words").innerText=data.wordCount
document.getElementById("language").innerText=data.targetLanguage
document.getElementById("plan").innerText=data.plan
document.getElementById("price").innerText="$"+data.price

document.getElementById("greeting").innerText=
"Welcome back. Your translation is currently being prepared."

document.getElementById("jobPanel").style.display="block"

calculateTimer(data.wordCount)

}

function calculateTimer(words){

let minutes = words * 0.6

let hours = Math.floor(minutes / 60)
let mins = Math.floor(minutes % 60)

document.getElementById("timer").innerText=
"Estimated Delivery: "+hours+"h "+mins+"m"

}

loadJob()

</script>

</body>
</html>
