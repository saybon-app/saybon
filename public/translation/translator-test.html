
<!DOCTYPE html>
<html>

<head>

<title>SayBon Translator Test</title>

<style>

body{
font-family:Poppins;
background:#f5f7fb;
padding:40px
}

.box{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 8px 25px rgba(0,0,0,0.08)
}

textarea{
width:100%;
height:150px;
font-size:16px;
padding:10px
}

.timer{
font-size:20px;
color:#b91c1c;
text-align:center;
margin-bottom:10px
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px
}

</style>

</head>

<body>

<div class="box">

<div id="timer1" class="timer">5:00</div>

<div id="frenchText"></div>

<textarea id="box1"></textarea>

</div>

<div class="box">

<div id="timer2" class="timer">5:00</div>

<div id="englishText"></div>

<textarea id="box2"></textarea>

</div>

<button id="submitTest">Submit Translation</button>

<script>

let frenchTest=""
let englishTest=""

/* LOAD ROTATING TEST */

fetch("/api/getTranslationTest")
.then(r=>r.json())
.then(data=>{

frenchTest=data.frenchTest
englishTest=data.englishTest

document.getElementById("frenchText").innerText=frenchTest
document.getElementById("englishText").innerText=englishTest

})

/* TIMERS */

function startTimer(box,timer){

let time=300

const interval=setInterval(()=>{

time--

let min=Math.floor(time/60)
let sec=time%60

timer.innerText=min+":"+(sec<10?"0":"")+sec

if(time<=0){
clearInterval(interval)
box.disabled=true
}

},1000)

}

document.getElementById("box1")
.addEventListener("focus",()=>{

startTimer(
document.getElementById("box1"),
document.getElementById("timer1")
)

},{once:true})

document.getElementById("box2")
.addEventListener("focus",()=>{

startTimer(
document.getElementById("box2"),
document.getElementById("timer2")
)

},{once:true})

/* SUBMIT */

document.getElementById("submitTest").onclick=async()=>{

const englishAnswer=document.getElementById("box1").value
const frenchAnswer=document.getElementById("box2").value

const res=await fetch("/api/gradeTranslationTest",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
englishAnswer,
frenchAnswer,
frenchTest,
englishTest
})

})

const result=await res.json()

alert("Score: "+result.score+"/100\n\n"+result.feedback)

}

</script>

</body>

</html>
