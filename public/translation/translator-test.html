<!DOCTYPE html>
<html>

<head>

<title>SayBon Translator Test</title>

<style>

body{
font-family:Poppins;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.source{
font-size:18px;
margin-bottom:15px;
line-height:1.6;
}

textarea{
box-sizing:border-box;
width:100%;
height:160px;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.timer{
text-align:center;
font-size:22px;
color:#991b1b;
margin-bottom:10px;
}

button{

padding:14px 26px;
border-radius:10px;
border:none;
font-size:16px;
cursor:pointer;

background:#2563eb;
color:white;

box-shadow:0 6px 0 rgba(0,0,0,0.25);
transition:all .15s ease;

}
padding:14px 22px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
transform:translateY(-2px);
}

button:active{
transform:translateY(4px);
box-shadow:0 2px 0 rgba(0,0,0,0.25);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div id="timer1" class="timer">5:00</div>

<div id="frenchText" class="source"></div>

<textarea id="box1" placeholder="Type your English translation here..."></textarea>

</div>


<div class="card">

<div id="timer2" class="timer">5:00</div>

<div id="englishText" class="source"></div>

<textarea id="box2" placeholder="Tapez votre traduction française ici..."></textarea>

</div>

<button id="submitTest">Submit Translation</button>

</div>


<script>

/* ======================================
TEST BANK
====================================== */

const frenchTests=[

"L’application doit pouvoir traiter les requêtes en temps réel tout en garantissant la sécurité des données et la conformité aux normes de protection de la vie privée.",

"L’optimisation des processus internes a permis de réduire les coûts opérationnels tout en améliorant la qualité du service offert aux clients.",

"Toute utilisation non autorisée de ce document est strictement interdite et peut entraîner des poursuites conformément aux lois applicables."

]

const englishTests=[

"The system automatically encrypts all sensitive information before it is transmitted to the server.",

"Failure to comply with these guidelines may result in the suspension of the user's account.",

"The success of the project depends largely on effective communication between the development team and the stakeholders."

]

/* ======================================
SELECT RANDOM TEST
====================================== */

const frenchTest=frenchTests[Math.floor(Math.random()*frenchTests.length)]
const englishTest=englishTests[Math.floor(Math.random()*englishTests.length)]

document.getElementById("frenchText").innerText=frenchTest
document.getElementById("englishText").innerText=englishTest

/* ======================================
TIMERS
====================================== */

function startTimer(box,timer){

let time=300

const interval=setInterval(()=>{

time--

let min=Math.floor(time/60)
let sec=time%60

timer.innerText=min+":"+(sec<10?"0":"")+sec

if(time<=0){

clearInterval(interval)
box.disabled=true

}

},1000)

}

document.getElementById("box1").addEventListener("focus",()=>{

startTimer(
document.getElementById("box1"),
document.getElementById("timer1")
)

},{once:true})


document.getElementById("box2").addEventListener("focus",()=>{

startTimer(
document.getElementById("box2"),
document.getElementById("timer2")
)

},{once:true})


/* ======================================
SUBMIT
====================================== */

document.getElementById("submitTest").onclick=()=>{

const englishAnswer=document.getElementById("box1").value
const frenchAnswer=document.getElementById("box2").value

if(!englishAnswer || !frenchAnswer){

alert("Please complete both translations.")
return

}

const btn=document.getElementById("submitTest")

btn.innerText="Submitting..."
btn.disabled=true

setTimeout(()=>{

alert("Test submitted successfully.")

window.location="/translation/translator-registration.html"

},1200)

}

</script>

</body>

</html>
