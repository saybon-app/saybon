<!DOCTYPE html>
<html>

<head>
<script type='module' src='/js/auth-guard.js'></script>

<title>SayBon Translator Jobs</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.job{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
background:#4f46e5;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Available Translation Jobs</h1>

<div id="jobs"></div>

<script type="module">

import { db } from "../js/firebase-config.js";

import {
collection,
getDocs,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function loadJobs(){

const container = document.getElementById("jobs");

const snapshot = await getDocs(
collection(db,"translationJobs")
);

snapshot.forEach(job=>{

const data = job.data();

if(data.status === "open"){

const div = document.createElement("div");

div.className="job";

div.innerHTML = `
<h3>${data.clientFile}</h3>

<p>
${data.sourceLanguage}
?
${data.targetLanguage}
</p>

<button onclick="acceptJob('${job.id}')">
Accept Job
</button>
`;

container.appendChild(div);

}

});

}

window.acceptJob = async function(id){

await updateDoc(
doc(db,"translationJobs",id),
{
status:"assigned"
}
);

alert("Job accepted");

location.reload();

}

loadJobs();

</script>

</body>

</html>
