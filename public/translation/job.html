<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Translation Job Created</title>
</head>

<body style="font-family:Arial;padding:40px">

<h1>Translation Job Created</h1>

<p id="jobId">Generating Job...</p>

<script>

const params = new URLSearchParams(window.location.search)

const plan = params.get("plan")
const words = params.get("words")

/* generate simple temporary job id */

const jobId = "JOB-" + Date.now()

document.getElementById("jobId").innerText =
"Your Job ID: " + jobId +
" | Plan: " + plan +
" | Words: " + words

</script>

</body>
</html>
