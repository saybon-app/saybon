<!DOCTYPE html>
<html>
<head>
<title>Translation Job</title>
<style>
body{font-family:Arial;background:#eef3f8;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:white;padding:30px;border-radius:10px;width:320px}
button{width:100%;padding:12px;background:#6fa4c7;border:none;color:white;border-radius:6px;margin-top:20px}
</style>
</head>

<body>

<div class="card">

<h2>Translation Job</h2>

<div id="jobInfo"></div>

<button id="payBtn">Proceed to Payment</button>

</div>

<script>

const params = new URLSearchParams(location.search)

const jobCode = params.get("jobCode")

document.getElementById("jobInfo").innerHTML =
"Job Code: "+jobCode

document.getElementById("payBtn").onclick = async ()=>{

const res = await fetch(
"https://saybon-server.onrender.com/api/createCheckout",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({jobCode})
})

const data = await res.json()

if(data.url){
window.location = data.url
}else{
alert("Payment error")
}

}

</script>

</body>
</html>
