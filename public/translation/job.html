<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Translation Job</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#e9eef5,#dfe6ee);
color:#6e6e73;
}

.page{
max-width:700px;
margin:auto;
padding:30px;
}

.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
text-align:center;
margin-bottom:20px;
}

.summary{
margin-bottom:20px;
line-height:1.8;
}

.jobCode{
margin-top:15px;
font-weight:600;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1e8e8e;
color:white;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="page">

<h2 class="title">Translation Job Summary</h2>

<div class="card">

<div class="summary">

<p id="wordCount"></p>
<p id="plan"></p>
<p id="price"></p>
<p id="delivery"></p>

</div>

<p class="jobCode" id="jobCode"></p>

<button id="payBtn">

Proceed to Payment

</button>

</div>

</div>

<script>

const API="https://saybon-server.onrender.com"

const params=new URLSearchParams(window.location.search)

const words=parseInt(params.get("words"))
const plan=params.get("plan")

const rate=plan==="express"?0.05:0.025
const price=(words*rate).toFixed(2)

function deliveryEstimate(words){

if(words<=300)return"1 - 3 hrs"
if(words<=1000)return"3 - 6 hrs"
if(words<=3000)return"6 - 12 hrs"
if(words<=6000)return"12 - 24 hrs"
if(words<=10000)return"24 - 48 hrs"
if(words<=20000)return"2 - 4 days"

return"Custom"

}

document.getElementById("wordCount").innerText="Word Count: "+words
document.getElementById("plan").innerText="Plan: "+plan
document.getElementById("price").innerText="Total Price: $"+price
document.getElementById("delivery").innerText="Estimated Delivery: "+deliveryEstimate(words)

async function createJob(){

try{

const res=await fetch(API+"/api/createJob",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

fileId:"temp",
words,
plan,
price

})

})

const data=await res.json()

document.getElementById("jobCode").innerText="Job Code: "+data.jobCode

return data.jobCode

}catch(err){

document.getElementById("jobCode").innerText="Unable to create job"

console.error(err)

}

}

let jobCode

createJob().then(code=>{

jobCode=code

})

document.getElementById("payBtn").onclick=async()=>{

try{

const res=await fetch(API+"/api/createCheckout",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

jobCode

})

})

const data=await res.json()

window.location.href=data.url

}catch(err){

alert("Payment system error")

console.error(err)

}

}

</script>

</body>

</html>
