<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SayBon Translation Job</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#eef3f8,#dfe7ef);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:340px;
}

h2{
margin-top:0;
color:#2f3a45;
}

.info{
margin:8px 0;
color:#5a6a78;
font-size:14px;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#7ea8c9;
color:white;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#6d9bc0;
}

</style>

</head>

<body>

<div class="card">

<h2>Translation Job Summary</h2>

<div class="info" id="wordCount"></div>
<div class="info" id="plan"></div>
<div class="info" id="price"></div>
<div class="info" id="delivery"></div>
<div class="info" id="jobCode"></div>

<button id="payBtn">Proceed to Payment</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const words = Number(params.get("words")) || 0
const plan = params.get("plan") || "standard"
const jobCode = params.get("job") || null

let rate = plan === "express" ? 0.05 : 0.025
let price = (words * rate).toFixed(2)

let delivery = plan === "express"
? "30 min – 2 hrs"
: words <= 500
? "1 – 3 hrs"
: words <= 2000
? "3 – 12 hrs"
: "24 hrs"

document.getElementById("wordCount").innerText = "Word Count: " + words
document.getElementById("plan").innerText = "Plan: " + plan
document.getElementById("price").innerText = "Total Price: $" + price
document.getElementById("delivery").innerText = "Estimated Delivery: " + delivery
document.getElementById("jobCode").innerText = "Job Code: " + jobCode

document.getElementById("payBtn").onclick = async () => {

if(!jobCode){
alert("Job code missing")
return
}

try{

const response = await fetch("https://saybon-server.onrender.com/api/createCheckout",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
jobCode:jobCode
})

})

const data = await response.json()

if(data.url){

window.location.href = data.url

}else{

alert("Payment system error")

}

}catch(err){

console.error(err)
alert("Payment connection failed")

}

}

</script>

</body>
</html>
