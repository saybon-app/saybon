<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Translation Job</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#eef3f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:14px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#7ea8c9;
color:white;
font-size:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Translation Job</h2>

<div id="jobCode"></div>

<button id="payBtn">
Proceed to Payment
</button>

</div>

<script>

const params=new URLSearchParams(location.search)

const jobCode=params.get("jobCode")

document.getElementById("jobCode").innerText="Job Code: "+jobCode

document.getElementById("payBtn").onclick=async()=>{

const res=await fetch(
"https://saybon-server.onrender.com/api/createCheckout",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({jobCode})
})

const data=await res.json()

if(data.url){

window.location.href=data.url

}else{

alert("Payment error")

}

}

</script>

</body>

</html>
