<script>

let storedWords=0;

function timelineStandard(words){

if(words<=300) return "1¢3 hrs";
if(words<=1000) return "3¢6 hrs";
if(words<=3000) return "6¢12 hrs";
if(words<=6000) return "12¢24 hrs";
if(words<=10000) return "24¢48 hrs";
if(words<=20000) return "2¢4 days";
return "Custom";

}

function timelineExpress(words){

if(words<=300) return "30¢60 mins";
if(words<=1000) return "1¢3 hrs";
if(words<=3000) return "3¢6 hrs";
if(words<=6000) return "6¢12 hrs";
if(words<=10000) return "12¢24 hrs";
if(words<=20000) return "24¢48 hrs";
return "Custom";

}

function calculate(){

let file=document.getElementById("file").files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(e){

let text=e.target.result;

// CLEAN TEXT PROPERLY
text=text
.replace(/\r\n/g," ")
.replace(/\n/g," ")
.replace(/\t/g," ")
.replace(/\s+/g," ")
.trim();

let words=0;

if(text.length>0){

words=text.split(" ").length;

}

storedWords=words;

document.getElementById("wordCount").innerText=
"WORDS: "+words;

document.getElementById("standardQuote").innerText=
"STANDARD $"+(words*0.025).toFixed(2)
+" Ģ "+timelineStandard(words);

document.getElementById("expressQuote").innerText=
"EXPRESS $"+(words*0.05).toFixed(2)
+" Ģ "+timelineExpress(words);

}

reader.readAsText(file);

}

function goPayment(plan){

if(storedWords===0){

alert("Please upload document first");
return;

}

window.location.href=
"/translation/payment.html?plan="+plan+"&words="+storedWords;

}

</script>
