<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SayBon Translation Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Poppins;
background:#f4f6fb;
padding:40px;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1f6feb;
color:white;
}

button:hover{
opacity:.9;
}

/* DRAWER */

.drawer{
position:fixed;
right:-420px;
top:0;
width:420px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.15);
padding:25px;
transition:.3s;
overflow:auto;
}

.drawer.open{
right:0;
}

.close{
background:#ef4444;
margin-bottom:10px;
}

.upload{
background:#16a34a;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>SAYBON TRANSLATION ADMIN</h1>

<table>

<tr>
<th>Job ID</th>
<th>Words</th>
<th>Plan</th>
<th>Status</th>
<th>Actions</th>
</tr>

<tbody id="jobs"></tbody>

</table>

</div>


<div id="drawer" class="drawer">

<button class="close" onclick="closeDrawer()">Close</button>

<h2 id="dJob"></h2>

<p><strong>Email:</strong> <span id="dEmail"></span></p>

<p><strong>Words:</strong> <span id="dWords"></span></p>

<p><strong>Plan:</strong> <span id="dPlan"></span></p>

<p><strong>Deadline:</strong> <span id="dDeadline"></span></p>

<p><strong>Status:</strong> <span id="dStatus"></span></p>

<hr>

<p><strong>Accepted Translators</strong></p>

<ul id="dAccepted"></ul>

<hr>

<p><strong>Submissions</strong></p>

<ul id="dSubmissions"></ul>

<hr>

<input type="file" id="finalFile">

<button class="upload" onclick="uploadFinal()">Upload Final Translation</button>

<button onclick="deliverJob()">Mark Delivered</button>

</div>



<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyB2aKUdE1NSt0kN332BwTYSX52D0lxj1g0",
authDomain:"saybon-3e3c2.firebaseapp.com",
projectId:"saybon-3e3c2"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();


/* LOAD JOBS */

async function loadJobs(){

let snap=await db.collection("translationJobs").get();

let table=document.getElementById("jobs");

table.innerHTML="";

snap.forEach(doc=>{

let job=doc.data();

let row=document.createElement("tr");

row.innerHTML=`

<td>${doc.id}</td>
<td>${job.wordCount||"-"}</td>
<td>${job.plan||"-"}</td>
<td>${job.status||"-"}</td>

<td>
<button onclick="viewJob('${doc.id}')">View</button>
</td>

`;

table.appendChild(row);

});

}

loadJobs();


let currentJob="";


async function viewJob(id){

currentJob=id;

let doc=await db.collection("translationJobs").doc(id).get();

let job=doc.data();

document.getElementById("dJob").innerText=id;
document.getElementById("dEmail").innerText=job.email||"-";
document.getElementById("dWords").innerText=job.wordCount||"-";
document.getElementById("dPlan").innerText=job.plan||"-";
document.getElementById("dDeadline").innerText=job.deadline||"-";
document.getElementById("dStatus").innerText=job.status||"-";

/* accepted translators */

let accepted=document.getElementById("dAccepted");
accepted.innerHTML="";

(job.acceptedTranslators||[]).forEach(t=>{
let li=document.createElement("li");
li.innerText=t;
accepted.appendChild(li);
});


/* submissions */

let subs=document.getElementById("dSubmissions");
subs.innerHTML="";

(job.submissions||[]).forEach(s=>{
let li=document.createElement("li");
li.innerText=s.translatorId;
subs.appendChild(li);
});


document.getElementById("drawer").classList.add("open");

}


function closeDrawer(){

document.getElementById("drawer").classList.remove("open");

}


/* UPLOAD FINAL */

function uploadFinal(){

alert("Final translation uploaded");

}


/* MARK DELIVERED */

async function deliverJob(){

await db.collection("translationJobs")
.doc(currentJob)
.update({
status:"delivered"
});

alert("Job marked delivered");

closeDrawer();

loadJobs();

}

</script>

</body>
</html>
