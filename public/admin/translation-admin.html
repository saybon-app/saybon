<!DOCTYPE html>
<html>

<head>

<title>SayBon Translation Admin</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

.card{

max-width:1200px;
margin:auto;

background:white;

border-radius:12px;

padding:30px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

}

h1{
margin-bottom:20px;
}

.job{

padding:16px;

border-bottom:1px solid #eee;

}

button{

padding:8px 16px;

background:#4a6cf7;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>SAYBON TRANSLATION ADMIN</h1>

<div id="jobs"></div>

</div>


<script>

async function loadJobs(){

const response = await fetch("/api/editor/jobs");

const jobs = await response.json();

const container = document.getElementById("jobs");

container.innerHTML="";

jobs.forEach(job=>{

const div = document.createElement("div");

div.className="job";

div.innerHTML=

<b>\</b><br>

Words: \<br>

Delivery: \<br>

Progress: \%<br>

<button onclick="viewJob('\')">

View Job

</button>

;

container.appendChild(div);

});

}

function viewJob(code){

window.location = "/translation-desk.html?job=" + code;

}

loadJobs();

</script>

</body>

</html>
